<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register Family - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(180deg, #6f7df0 0%, #8a7ce8 100%);
            padding: 0;
            min-height: 100vh;
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px;
            box-sizing: border-box;
        }

        @media (min-width: 760px) {
            .login-page {
                justify-content: center;
            }
        }

        .login-shell {
            width: 100%;
            max-width: 440px;
        }

        .brand-block {
            text-align: center;
            color: #fff;
            margin-bottom: 16px;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            margin: 0 auto 8px;
            display: block;
            box-shadow: 0 8px 22px rgba(40, 30, 90, 0.25);
        }

        .brand-title {
            font-size: 1.7rem;
            font-weight: 800;
            margin: 0 0 4px;
            letter-spacing: -0.4px;
            line-height: 1.1;
        }

        .brand-tagline {
            font-size: 0.9rem;
            margin: 0 0 8px;
            opacity: 0.92;
        }

        .brand-subjects {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.95;
        }

        .brand-subjects .subject {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .brand-subjects .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18);
        }

        .auth-card {
            background: #fff;
            border-radius: 22px;
            padding: 28px 26px 24px;
            box-shadow: 0 20px 50px rgba(30, 20, 80, 0.18);
        }

        .auth-card-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.35rem;
            font-weight: 700;
            color: #1f2647;
            margin: 0 0 22px;
        }

        .auth-card-title svg {
            width: 24px;
            height: 24px;
            color: #6f7df0;
        }

        .auth-field {
            margin-bottom: 16px;
        }

        .auth-field label {
            display: block;
            font-size: 0.92rem;
            font-weight: 600;
            color: #1f2647;
            margin-bottom: 8px;
        }

        .auth-input-wrap {
            position: relative;
        }

        .auth-input-wrap .lead-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #6f7df0;
            pointer-events: none;
        }

        .auth-input-wrap input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 14px 14px 42px;
            border-radius: 12px;
            border: 1.5px solid #e3e6f3;
            background: #fff;
            font-size: 0.98rem;
            color: #1f2647;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .auth-input-wrap input::placeholder {
            color: #a3a8c3;
        }

        .auth-input-wrap input:focus {
            outline: none;
            border-color: #6f7df0;
            box-shadow: 0 0 0 3px rgba(111, 125, 240, 0.18);
        }

        .auth-input-wrap.has-toggle input {
            padding-right: 42px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 0;
            padding: 4px;
            cursor: pointer;
            color: #6f7df0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        .signin-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 16px;
            border: 0;
            border-radius: 12px;
            background: #6f7df0;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.15s ease, transform 0.05s ease;
        }

        .signin-btn:hover {
            background: #5d6bdf;
        }

        .signin-btn:active {
            transform: translateY(1px);
        }

        .signin-btn svg {
            width: 20px;
            height: 20px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0 16px;
            color: #9aa0bd;
            font-size: 0.88rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e3e6f3;
        }

        .auth-register {
            text-align: center;
            font-size: 0.95rem;
            color: #1f2647;
        }

        .auth-register a {
            color: #6f7df0;
            font-weight: 700;
            text-decoration: none;
        }

        .auth-register a:hover {
            text-decoration: underline;
        }

        @media (max-width: 420px) {
            .brand-title { font-size: 1.5rem; }
            .auth-card { padding: 22px 18px 20px; }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-shell">
            <header class="brand-block">
                <img src="apple-touch-icon.png" alt="Kids Daily Chores" class="brand-logo">
                <h1 class="brand-title">Kids Daily Chores</h1>
                <p class="brand-tagline">Daily learning for kids, simple tracking for parents.</p>
                <div class="brand-subjects">
                    <span class="subject"><span class="dot" style="background:#ffd166;"></span>Chinese</span>
                    <span class="subject"><span class="dot" style="background:#3ec9c2;"></span>Math</span>
                    <span class="subject"><span class="dot" style="background:#34d399;"></span>Worksheets</span>
                    <span class="subject"><span class="dot" style="background:#f97361;"></span>Progress tracking</span>
                </div>
            </header>

            <main>
                <section class="auth-card">
                    <h2 class="auth-card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <line x1="19" y1="8" x2="19" y2="14"/>
                            <line x1="22" y1="11" x2="16" y2="11"/>
                        </svg>
                        Create your family
                    </h2>
                    <form id="familyRegisterForm" novalidate>
                        <div class="auth-field">
                            <label for="registerUsername">Family Username</label>
                            <div class="auth-input-wrap">
                                <svg class="lead-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                <input type="text" id="registerUsername" autocomplete="username" placeholder="Choose a family username" required>
                            </div>
                        </div>

                        <div class="auth-field">
                            <label for="registerPassword">Password</label>
                            <div class="auth-input-wrap has-toggle">
                                <svg class="lead-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                <input type="password" id="registerPassword" autocomplete="new-password" placeholder="Create a password" required>
                                <button type="button" class="password-toggle" data-target="registerPassword" data-icon="registerEyeIcon" aria-label="Show password">
                                    <svg id="registerEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="auth-field">
                            <label for="registerPasswordConfirm">Repeat Password</label>
                            <div class="auth-input-wrap has-toggle">
                                <svg class="lead-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                <input type="password" id="registerPasswordConfirm" autocomplete="new-password" placeholder="Repeat your password" required>
                                <button type="button" class="password-toggle" data-target="registerPasswordConfirm" data-icon="registerConfirmEyeIcon" aria-label="Show password">
                                    <svg id="registerConfirmEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="signin-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <line x1="19" y1="8" x2="19" y2="14"/>
                                <line x1="22" y1="11" x2="16" y2="11"/>
                            </svg>
                            Register
                        </button>
                    </form>

                    <div class="auth-divider">or</div>

                    <p class="auth-register">
                        Already have an account? <a href="/index.html">Sign in</a>
                    </p>
                </section>

                <div id="errorMessage" class="error hidden"></div>
            </main>
        </div>
    </div>

    <script>
        (function setupPasswordToggles() {
            const eyeOpen = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            const eyeOff = '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.77 19.77 0 0 1 4.22-5.19"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a19.69 19.69 0 0 1-3.16 4.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>';
            document.querySelectorAll('.password-toggle').forEach((btn) => {
                const input = document.getElementById(btn.dataset.target);
                const icon = document.getElementById(btn.dataset.icon);
                if (!input || !icon) return;
                btn.addEventListener('click', () => {
                    const show = input.type === 'password';
                    input.type = show ? 'text' : 'password';
                    icon.innerHTML = show ? eyeOff : eyeOpen;
                    btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
                });
            });
        })();
    </script>
    <script src="family-register.js"></script>
</body>
</html>
