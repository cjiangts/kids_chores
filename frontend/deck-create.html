<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Deck - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .deck-page {
            max-width: 1000px;
            margin: 0 auto;
        }

        .deck-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .deck-panel h2 {
            margin-bottom: var(--card-section-title-margin-bottom);
        }

        .deck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 0.8rem;
        }

        .first-tag-field {
            grid-column: 1 / -1;
        }

        fieldset.form-group {
            border: 0;
            padding: 0;
            margin: 0;
            min-width: 0;
        }

        fieldset.form-group legend {
            font-size: 0.92rem;
            font-weight: 600;
            color: #2f3c7e;
            margin-bottom: 0.35rem;
        }

        .deck-row {
            display: flex;
            gap: 0.6rem;
            align-items: end;
            flex-wrap: wrap;
        }

        .deck-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .deck-row .btn-secondary,
        .deck-row .btn-primary {
            white-space: nowrap;
        }

        .add-tag-row {
            flex-wrap: nowrap;
            align-items: center;
        }

        .add-tag-row input {
            flex: 1 1 auto;
            min-width: 0;
        }

        .add-tag-row .btn-secondary {
            flex: 0 0 auto;
        }

        .deck-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

        .deck-tag {
            background: #eef3ff;
            color: #2f3c7e;
            border-radius: 999px;
            padding: 0.35rem 0.7rem;
            font-size: 0.88rem;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .deck-tag button {
            border: 0;
            background: transparent;
            cursor: pointer;
            color: #2f3c7e;
            font-size: 0.92rem;
            line-height: 1;
            padding: 0;
        }

        .deck-meta-name {
            margin-top: 0.8rem;
            font-size: 0.95rem;
            color: #555;
        }

        .deck-meta-name code {
            background: #f1f3f5;
            padding: 0.15rem 0.35rem;
            border-radius: 5px;
        }

        .deck-name-status {
            margin-top: 0.45rem;
            font-size: 0.9rem;
        }

        .deck-name-status.ok {
            color: #2b8a3e;
        }

        .deck-name-status.error {
            color: #c92a2a;
        }

        .deck-name-status.note {
            color: #555;
        }

        .deck-review-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 0.7rem;
        }

        .deck-dedupe {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            color: #444;
            line-height: 1.35;
        }

        .deck-dedupe h3 {
            font-size: 0.95rem;
            color: #2f3c7e;
            margin: 0 0 0.35rem 0;
        }

        .deck-dedupe p {
            margin: 0.2rem 0;
        }

        .deck-row-status-ok {
            color: #2b8a3e;
            font-weight: 600;
        }

        .deck-row-status-warn {
            color: #c92a2a;
            font-weight: 600;
        }

        .deck-review-table td.deck-row-status-ok {
            color: #2b8a3e;
            font-weight: 700;
        }

        .deck-review-table td.deck-row-status-warn {
            color: #c92a2a;
            font-weight: 700;
        }

        .deck-row-status-note {
            display: block;
            margin-top: 0.2rem;
            color: #5a6478;
            font-size: 0.85rem;
            line-height: 1.3;
            font-weight: 600;
        }

        .deck-row-status-note-warn {
            display: block;
            margin-top: 0.2rem;
            color: #b7791f;
            font-size: 0.85rem;
            line-height: 1.3;
            font-weight: 700;
        }

        #firstTagToggle {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.55rem;
            border: 1px solid #d7deee;
            border-radius: 10px;
            background: #fbfcff;
            padding: 0.55rem;
            max-height: 300px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #firstTagToggle .first-tag-option {
            border: 1px solid #c8d1e1;
            border-radius: 10px;
            background: #fff;
            color: #233044;
            text-align: left;
            cursor: pointer;
            padding: 0.68rem 0.75rem;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        #firstTagToggle .first-tag-option:hover {
            border-color: #4f83ff;
            transform: translateY(-1px);
        }

        #firstTagToggle .first-tag-option.active {
            border-color: #4f83ff;
            box-shadow: 0 0 0 3px rgba(79, 131, 255, 0.16);
            background: #f7faff;
        }

        #firstTagToggle.category-locked .first-tag-option {
            cursor: default;
            transform: none;
        }

        #firstTagToggle .first-tag-option.lock-hidden {
            display: none;
        }

        .category-preselect-note {
            margin-top: 0.38rem;
            font-size: 0.83rem;
            color: #4b5a70;
        }

        .first-tag-option-title {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: #233044;
            margin-bottom: 0.18rem;
            word-break: break-word;
        }

        .first-tag-option-desc {
            display: block;
            font-size: 0.82rem;
            line-height: 1.35;
            color: #4b5a70;
        }
    </style>
</head>
<body class="manage-page">
    <div class="container deck-page">
        <header class="page-header-with-back">
            <div class="page-header-row">
                <h1>➕ Create Deck</h1>
                <a href="/deck-manage.html" class="back-btn btn-secondary page-header-back-btn">← Back</a>
            </div>
        </header>

        <main>
            <section class="deck-panel">
                <h2>1) Deck Metadata</h2>
                <div class="deck-grid">
                    <fieldset class="form-group first-tag-field">
                        <div id="firstTagToggle" aria-label="First tag">
                            <span class="settings-note">Loading categories...</span>
                        </div>
                        <p id="categoryPreselectNote" class="category-preselect-note hidden"></p>
                    </fieldset>
                    <div class="form-group">
                        <label for="newTagInput">Add tag</label>
                        <div class="deck-row add-tag-row">
                            <input type="text" id="newTagInput" list="existingTagOptions" placeholder="e.g. grade3, unit1, maliping">
                            <datalist id="existingTagOptions"></datalist>
                            <button type="button" id="addTagBtn" class="btn-secondary">Add Tag</button>
                        </div>
                    </div>
                </div>
                <div id="tagsContainer" class="deck-tags"></div>
                <div class="deck-meta-name">Generated name: <code id="generatedName">(auto)</code></div>
                <div id="nameStatus" class="deck-name-status note">Checking name availability...</div>
            </section>

            <section class="deck-panel">
                <h2 id="cardsInputSectionTitle">2) Paste Cards CSV</h2>
                <p id="cardsInputHelpText" class="muted-help-text">Format: one card per line as <code>front,back</code>. Spaces around <code>front</code>/<code>back</code> are automatically trimmed.</p>
                <textarea id="cardsCsv" class="deck-csv-textarea input-mono" placeholder="1+1,2&#10;2+3,5"></textarea>
                <div class="deck-row mt-07">
                    <button type="button" id="previewBtn" class="btn-primary">Preview Deck</button>
                    <button type="button" id="clearCsvBtn" class="btn-secondary">Clear</button>
                </div>
            </section>

            <section id="reviewSection" class="deck-panel hidden">
                <h2>3) Review & Confirm</h2>
                <div class="deck-review-head">
                    <div id="reviewMeta"></div>
                    <button type="button" id="createDeckBtn" class="btn-primary">Confirm & Create Deck</button>
                </div>
                <div id="dedupeSummary" class="deck-dedupe hidden"></div>
                <div class="deck-review-table-wrap">
                    <table class="deck-review-table">
                        <thead>
                            <tr>
                                <th class="table-col-80">Line</th>
                                <th>Front</th>
                                <th>Back</th>
                                <th class="table-col-320">Status</th>
                            </tr>
                        </thead>
                        <tbody id="reviewTableBody"></tbody>
                    </table>
                </div>
            </section>

            <div id="successMessage" class="success hidden"></div>
            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="deck-create-common.js"></script>
    <script src="deck-create.js"></script>
</body>
</html>
