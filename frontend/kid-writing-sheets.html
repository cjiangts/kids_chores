<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Practice Sheets - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .sheet-list {
            display: grid;
            gap: 0.9rem;
        }

        .sheet-item {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            padding: 1rem;
        }

        .sheet-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .status {
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
        }

        .status.pending {
            background: #ffe9b3;
            color: #7b5a00;
        }

        .status.done {
            background: #d6f5dc;
            color: #206633;
        }

        .sheet-cards {
            color: #444;
            margin-bottom: 0.7rem;
            line-height: 1.35;
        }

        .sheet-meta {
            color: #666;
            font-size: 0.84rem;
            margin-bottom: 0.65rem;
            line-height: 1.35;
        }

    </style>
</head>
<body class="practice-page">
    <div class="container">
        <header class="page-header-with-back">
            <div class="page-header-row">
                <h1>
                    <svg class="icon page-title-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
                    <span id="kidName">Chinese Writing Sheets</span>
                </h1>
                <a id="backBtn" href="/kid-practice.html" class="back-btn btn-secondary page-header-back-btn"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back</a>
            </div>
        </header>
        <div id="errorMessage" class="error hidden"></div>
        <div id="sheetList" class="sheet-list"></div>
    </div>
    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="icons.js"></script>
    <script src="subject-icons.js"></script>
    <script src="kid-writing-sheets.js"></script>
</body>
</html>
