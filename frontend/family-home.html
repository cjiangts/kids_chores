<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <style>
        .family-home-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 0;
        }

        .family-home-loading-spinner {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, 0.25);
            border-top-color: #6366f1;
            animation: familyHomeLoadingSpin 0.85s linear infinite;
        }

        @keyframes familyHomeLoadingSpin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="family-home-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1>🧸 Kids Daily Chores</h1>
                <div class="page-header-actions">
                    <a href="/admin.html" class="back-btn btn-secondary page-header-back-btn header-action-btn" aria-label="Parent Mode" title="Parent Mode">
                        <span class="header-action-icon" aria-hidden="true">
                            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15H6a4 4 0 0 0-4 4v2"/><path d="m14.305 16.53.923-.382"/><path d="m15.228 13.852-.923-.383"/><path d="m16.852 12.228-.383-.923"/><path d="m16.852 17.772-.383.924"/><path d="m19.148 12.228.383-.923"/><path d="m19.53 18.696-.382-.924"/><path d="m20.772 13.852.924-.383"/><path d="m20.772 16.148.924.383"/><circle cx="18" cy="15" r="3"/><circle cx="9" cy="7" r="4"/></svg>
                        </span>
                        <span class="header-action-label">Parent Mode</span>
                    </a>
                </div>
            </div>
        </header>

        <main>
            <div id="kidsList" class="redesign-kid-grid">
                <div class="family-home-loading" role="status" aria-label="Loading kids">
                    <div class="family-home-loading-spinner"></div>
                </div>
            </div>

            <div id="errorMessage" class="error redesign-error hidden"></div>
        </main>
    </div>

    <script src="icons.js"></script>
    <script src="subject-icons.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="practice-star-badge-common.js"></script>
    <script src="app.js"></script>
</body>
</html>
