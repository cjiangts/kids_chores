<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kid Badges - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <link rel="stylesheet" href="kid-badges.css">
</head>
<body class="practice-page kid-badges-page">
    <div class="container">
        <header class="page-header-with-back kid-badge-header">
            <div class="page-header-row">
                <h1>
                    <svg class="icon page-title-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/><circle cx="12" cy="8" r="6"/></svg>
                    <span id="kidBadgeTitle">Badges</span>
                </h1>
                <a id="kidBadgeBackBtn" href="/" class="back-btn btn-secondary page-header-back-btn"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back</a>
            </div>
        </header>

        <div id="kidBadgeError" class="error redesign-error kid-badge-error hidden"></div>
        <div id="kidBadgeLoading" class="kid-badge-loading">Loading badges...</div>

        <section id="kidBadgeStartPanel" class="kid-badge-start-panel hidden">
            <h2 class="kid-badge-start-title">Rewards Off</h2>
            <p class="kid-badge-start-text">
                Rewards are off. Ask parent to turn them on in Settings.
            </p>
        </section>

        <section id="kidBadgeSummary" class="kid-badge-summary hidden"></section>

        <section class="kid-badge-section">
            <div class="kid-badge-section-head">
                <h2 class="kid-badge-section-title">Earned</h2>
                <span id="kidBadgeEarnedCount" class="kid-badge-section-sub">0</span>
            </div>
            <div id="kidBadgeEarnedGrid" class="kid-badge-grid"></div>
        </section>

        <section class="kid-badge-section">
            <div class="kid-badge-section-head">
                <h2 class="kid-badge-section-title">Next</h2>
                <span id="kidBadgeComingCount" class="kid-badge-section-sub">0</span>
            </div>
            <div id="kidBadgeComingGrid" class="kid-badge-grid"></div>
        </section>
    </div>

    <div id="kidBadgeDetailModal" class="modal hidden" onclick="window.KidBadgesPage && window.KidBadgesPage.handleBackdrop(event)">
        <div class="modal-content kid-badge-detail-modal">
            <div class="kid-badge-detail-head">
                <h2>Details</h2>
                <button id="kidBadgeDetailCloseBtn" type="button" class="back-btn">Close</button>
            </div>
            <div id="kidBadgeDetailBody" class="kid-badge-detail-body">
                <div id="kidBadgeDetailArt" class="kid-badge-detail-art"></div>
                <div>
                    <div class="kid-badge-detail-title-row">
                        <div id="kidBadgeDetailTitle" class="kid-badge-detail-title"></div>
                        <span id="kidBadgeDetailState" class="kid-badge-detail-state"></span>
                    </div>
                    <div id="kidBadgeDetailMeta" class="kid-badge-detail-meta"></div>
                    <div id="kidBadgeDetailText" class="kid-badge-detail-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="kid-badges.js"></script>
</body>
</html>
