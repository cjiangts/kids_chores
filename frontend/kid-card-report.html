<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Report - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .header h1 { color: #fff; }

        .summary-shell {
            background: var(--dashboard-panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 12px;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.7rem;
            margin-bottom: 0;
        }

        .summary-card {
            background: var(--dashboard-chip-bg);
            border-radius: 12px;
            padding: 0.75rem;
            box-shadow: var(--dashboard-chip-shadow);
        }

        .summary-card .label { color: #666; font-size: 0.82rem; }
        .summary-card .value { color: #2f3c7e; font-size: 1.1rem; font-weight: 700; margin-top: 0.2rem; }

        .chart-card,
        .history-card {
            background: var(--dashboard-panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
            margin-bottom: 0.9rem;
        }

        .chart-card h2,
        .history-card h2 {
            margin-bottom: var(--card-section-title-margin-bottom);
        }

        .chart-wrap {
            overflow-x: auto;
            padding: 0;
        }

        .chart-empty {
            color: #666;
            font-size: 0.88rem;
        }

        .trend-bars {
            min-width: 100%;
            display: flex;
            gap: 3px;
            align-items: end;
            height: 190px;
            padding: 8px 6px 4px;
            border-radius: 12px;
            background: var(--dashboard-chip-bg);
            border: 1px solid #e6ecff;
            box-shadow: var(--dashboard-chip-shadow);
        }

        .trend-col {
            height: 100%;
            width: 29px;
            min-width: 29px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: 3px;
        }

        .trend-value {
            font-size: 0.64rem;
            color: #5b6787;
            line-height: 1;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .trend-bar {
            width: 11px;
            min-width: 11px;
            border-radius: 6px 6px 0 0;
            background: #4cb780;
            opacity: 0.92;
        }

        .trend-bar.wrong {
            background: #d95b5b;
        }

        .trend-bar.fixed {
            background: #e0ac2b;
        }

        .trend-bar.pending {
            background: #9aa4bb;
        }

        .chart-legend {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #666;
        }

        .history-list {
            display: grid;
            gap: 0.45rem;
        }

        .history-item {
            border: 1px solid #eceff6;
            border-radius: 12px;
            padding: 0.6rem 0.7rem;
            font-size: 0.88rem;
            color: #333;
            background: var(--dashboard-chip-bg);
            box-shadow: var(--dashboard-chip-shadow);
            scroll-margin-top: 88px;
            transition: box-shadow 180ms ease, border-color 180ms ease, transform 180ms ease;
        }

        .history-item.targeted-history-item {
            border-color: #7c96e8;
            box-shadow: 0 0 0 3px rgba(124, 150, 232, 0.18), var(--dashboard-chip-shadow);
            transform: translateY(-1px);
        }

        .history-item .meta {
            margin-top: 0.2rem;
            font-size: 0.79rem;
            color: #666;
        }

        .history-head-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .history-head-row > div:first-child {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .history-title-stack {
            min-width: 0;
            flex: 1 1 auto;
        }

        .history-primary {
            font-size: 1.02rem;
            font-weight: 700;
            color: #2f3c7e;
            line-height: 1.14;
            overflow-wrap: anywhere;
        }

        .history-status-side {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .history-time-badge {
            font-size: 0.76rem;
            font-weight: 700;
            color: #5b6787;
            background: #eef2fb;
            border-radius: 999px;
            padding: 0.16rem 0.48rem;
            white-space: nowrap;
        }

        .history-type4-details {
            margin-top: 0.3rem;
            display: grid;
            gap: 0.16rem;
        }

        .history-type4-row {
            display: grid;
            grid-template-columns: 2.6rem minmax(0, 1fr);
            gap: 0.38rem;
            align-items: start;
            font-size: 0.8rem;
            line-height: 1.2;
        }

        .history-type4-key {
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #6e7998;
        }

        .history-type4-value {
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: thin;
            color: #2e395f;
            font-weight: 700;
        }

        .audio-history-row {
            margin-top: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .audio-history-row .simple-audio-player {
            margin-top: 0;
            flex: 1;
            min-width: 0;
        }

        .audio-download-link {
            white-space: nowrap;
            margin-left: auto;
        }

        @media (max-width: 560px) {
            .history-head-row {
                align-items: flex-start;
            }

            .audio-download-link {
                margin-left: 0;
            }
        }

        .pill {
            display: inline-block;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.14rem 0.45rem;
            margin-left: 0.35rem;
        }

        .pill.right {
            background: #e6f8ea;
            color: #176b2e;
        }

        .pill.fixed {
            background: #fff5dc;
            color: #9a6200;
        }

        .pill.wrong {
            background: #fdeaea;
            color: #9d2e2e;
        }

        .pill.pending {
            background: #eef2fb;
            color: #5b6787;
        }
    </style>
</head>
<body class="report-page">
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">Card Report</h1>
            <a id="backBtn" href="/admin.html" class="back-btn btn-secondary">← Back</a>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <section class="summary-shell">
            <div class="summary-grid" id="summaryGrid"></div>
        </section>

        <section class="chart-card">
            <h2>Response Time Trend</h2>
            <div id="trendChart" class="chart-wrap"></div>
        </section>

        <section class="history-card">
            <h2>Practice History</h2>
            <div id="historyList" class="history-list"></div>
        </section>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="simple-audio-player.js"></script>
    <script src="lesson-reading-duration-backfill.js"></script>
    <script src="report-back-button-common.js"></script>
    <script src="kid-card-report.js"></script>
</body>
</html>
