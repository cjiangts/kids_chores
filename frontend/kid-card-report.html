<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Card Report - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        .chart-wrap {
            overflow-x: auto;
            padding: 0;
        }

        .chart-empty {
            color: #666;
            font-size: 0.88rem;
        }

        .trend-numberline {
            padding: 0.4rem 1rem 0 0.4rem;
        }

        .trend-numberline-stage {
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 0.3rem;
        }

        .trend-yaxis-col {
            flex: 0 0 auto;
            width: 2.6rem;
            position: relative;
        }

        .trend-yaxis-label {
            position: absolute;
            right: 0;
            transform: translateY(50%);
            font-size: 0.66rem;
            font-weight: 600;
            color: #5b6787;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .trend-plot-col {
            flex: 1 1 auto;
            min-width: 0;
            position: relative;
        }

        .trend-numberline-arrows {
            position: relative;
            width: 100%;
        }

        .trend-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .trend-grid-line-h {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: #ecf0f8;
        }

        .trend-grid-line-v {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #ecf0f8;
            transform: translateX(-50%);
        }

        .trend-marker {
            position: absolute;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: currentColor;
            transform: translate(-50%, 50%);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9);
        }

        .trend-marker.right { color: #4cb780; }
        .trend-marker.wrong { color: #d95b5b; }
        .trend-marker.fixed { color: #e0ac2b; }
        .trend-marker.half { color: #8b6fc0; }
        .trend-marker.pending { color: #b0b8cc; }

        .trend-numberline-axis {
            position: relative;
            height: 2px;
            background: #b6bfd5;
            border-radius: 1px;
        }

        .trend-numberline-tick-labels {
            position: relative;
            height: 1.1rem;
            margin-top: 0.3rem;
        }

        .trend-numberline-tick-label {
            position: absolute;
            top: 0;
            transform: translateX(-50%);
            font-size: 0.68rem;
            font-weight: 700;
            color: #5b6787;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .trend-numberline-tick-label:first-child { color: #2f9e44; }

        .trend-legend {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .trend-legend-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 2px;
        }

        .trend-legend-dot.right { background: #4cb780; }
        .trend-legend-dot.wrong { background: #d95b5b; }
        .trend-legend-dot.fixed { background: #e0ac2b; }
        .trend-legend-dot.half { background: #8b6fc0; }
        .trend-legend-dot.pending { background: #c0c8d8; }

        .trend-legend-sep {
            color: #ccc;
            margin: 0 0.1rem;
        }

        .chart-legend {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #666;
        }

        .history-list {
            display: grid;
            gap: 0.45rem;
        }

        .history-item {
            border: 1px solid #eceff6;
            border-radius: 12px;
            padding: 0.6rem 0.7rem;
            font-size: 0.88rem;
            color: #333;
            background: var(--dashboard-chip-bg);
            box-shadow: var(--dashboard-chip-shadow);
            scroll-margin-top: 88px;
            transition: box-shadow 180ms ease, border-color 180ms ease, transform 180ms ease;
        }

        .history-item.targeted-history-item {
            border-color: #7c96e8;
            box-shadow: 0 0 0 3px rgba(124, 150, 232, 0.18), var(--dashboard-chip-shadow);
            transform: translateY(-1px);
        }

        .history-item-link {
            position: relative;
            display: block;
            padding-right: 1.8rem;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .history-item-link:hover {
            border-color: #c8d2ee;
            box-shadow: 0 3px 10px rgba(31, 45, 98, 0.12);
        }

        .history-chevron {
            position: absolute;
            right: 0.65rem;
            top: 50%;
            transform: translateY(-50%);
            color: #c4c9d7;
            font-size: 1.35rem;
            line-height: 1;
            pointer-events: none;
        }

        .history-item .meta {
            margin-top: 0.2rem;
            font-size: 0.79rem;
            color: #666;
        }

        .history-item .meta .history-days-ago {
            color: #2f5db8;
            font-weight: 600;
        }

        .history-head-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .answer-head-actions {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.38rem;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .history-head-row > div:first-child {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .history-title-stack {
            min-width: 0;
            flex: 1 1 auto;
        }

        .history-primary {
            font-size: 0.88rem;
            font-weight: 700;
            color: #2f3c7e;
            line-height: 1.14;
            overflow-wrap: anywhere;
        }

        .meta-inline {
            margin-top: 0.14rem;
            font-size: 0.79rem;
            color: #666;
        }

        .history-status-side {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-wrap: wrap;
        }

        .history-primary.chinese-specific {
            font-family: var(--font-kaiti);
            font-weight: 400;
        }

        .history-time-badge {
            font-size: 0.72rem;
            font-weight: 700;
            color: #5b6787;
            background: #eef2fb;
            border-radius: 999px;
            padding: 0.14rem 0.45rem;
            white-space: nowrap;
        }

        .history-retry-badge {
            font-size: 0.72rem;
            font-weight: 700;
            color: #9a6200;
            background: #fff5dc;
            border-radius: 999px;
            padding: 0.14rem 0.45rem;
            white-space: nowrap;
        }

        .history-type4-details {
            margin-top: 0.3rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            align-items: center;
        }

        .history-type4-submitted-label {
            font-size: 0.72rem;
            color: #888;
        }

        .history-type4-pill-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            vertical-align: middle;
        }

        .history-type4-pill {
            display: inline-block;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.15rem 0.55rem;
            white-space: nowrap;
        }

        .history-audio-assist-marker {
            position: absolute;
            top: 0;
            right: 0;
            transform: translate(30%, -28%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 0.82rem;
            height: 0.82rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 1px 3px rgba(31, 45, 98, 0.16);
            pointer-events: none;
        }

        .history-audio-assist-marker svg {
            display: block;
        }

        .history-type4-pill.answer-pill {
            background: #e6f8ea;
            color: #176b2e;
        }

        .history-type4-pill.tried-pill {
            background: #fdeaea;
            color: #9d2e2e;
        }

        .history-type4-pill.partial-pill {
            background: #f3eeff;
            color: #5b3e99;
        }

        .audio-history-row {
            margin-top: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .audio-history-row .simple-audio-player {
            margin-top: 0;
            flex: 1;
            min-width: 0;
        }

        .history-item .audio-play-btn,
        .history-item .audio-speed-btn {
            height: 26px;
            min-height: 26px;
            padding: 0 0.58rem;
            font-size: 0.78rem;
        }

        .history-item .audio-play-btn {
            min-width: 54px;
        }

        .history-item .audio-speed-btn {
            min-width: 42px;
        }

        .history-item .audio-progress,
        .history-item .simple-audio-player {
            min-width: 0;
        }

        .type3-history-item .history-head-row {
            align-items: flex-start;
        }

        .type3-history-item .history-title-stack,
        .type3-history-item .answer-head-actions {
            min-width: 0;
        }

        .type3-history-item .audio-history-row {
            margin-top: 0.45rem;
        }

        .type3-history-item .meta {
            margin-top: 0.32rem;
        }

        .answer-type3-details {
            margin-top: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.18rem 0.32rem;
        }

        .answer-type3-back {
            color: #33406f;
            font-size: 0.82rem;
            line-height: 1.25;
            font-weight: 500;
            white-space: nowrap;
        }

        .answer-type3-sep {
            color: #a2abc6;
            font-size: 0.74rem;
            line-height: 1;
        }

        .answer-type3-source {
            color: #6a7596;
            font-size: 0.76rem;
            line-height: 1.25;
            font-weight: 600;
        }

        .answer-report-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            padding: 0 0.58rem;
            font-size: 0.78rem;
            line-height: 1;
            white-space: nowrap;
        }

        .grade-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            font-size: 0.78rem;
            border-radius: var(--control-radius);
            padding: 0 0.58rem;
            line-height: 1;
            background: #fff;
            border: 1px solid #d5dcee;
            white-space: nowrap;
        }

        .grade-status.pass {
            color: #2f9e44;
            border-color: #9dd6aa;
        }

        .grade-status.fail {
            color: #d63636;
            border-color: #efb0a8;
        }

        .grade-status.pending {
            color: #5b6787;
            border-color: #d5dcee;
        }

        .audio-download-link {
            white-space: nowrap;
        }

        @media (max-width: 560px) {
            .history-head-row {
                align-items: flex-start;
            }

            .answer-type3-back {
                font-size: 0.76rem;
                line-height: 1.2;
            }

            .answer-type3-source {
                font-size: 0.7rem;
            }

            .answer-type3-sep {
                font-size: 0.68rem;
            }
        }

        .pill {
            display: inline-block;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.14rem 0.45rem;
        }

        .pill.right {
            background: #e6f8ea;
            color: #176b2e;
        }

        .pill.fixed {
            background: #fff5dc;
            color: #9a6200;
        }

        .pill.half {
            background: #f3eeff;
            color: #5b3e99;
        }

        .pill.wrong {
            background: #fdeaea;
            color: #9d2e2e;
        }

        .pill.pending {
            background: #eef2fb;
            color: #5b6787;
        }
    </style>
</head>
<body class="report-page">
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">Card Report</h1>
            <a id="backBtn" href="/admin.html" class="back-btn btn-secondary"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back</a>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <section class="chart-card">
            <h2>Response Time Trend</h2>
            <div id="trendChart" class="chart-wrap"></div>
        </section>

        <section class="history-card">
            <h2>Practice History</h2>
            <div id="historyList" class="history-list"></div>
        </section>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="simple-audio-player.js"></script>
    <script src="lesson-reading-duration-backfill.js"></script>
    <script src="report-back-button-common.js"></script>
    <script src="kid-card-report.js"></script>
</body>
</html>
