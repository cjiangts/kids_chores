<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=mommy-icon2-20260607">
    <link rel="shortcut icon" href="favicon.ico?v=mommy-icon2-20260607">
    <link rel="manifest" href="site.webmanifest?v=mommy-icon2-20260607">
    <script src="idle-home-redirect.js"></script>
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Card Report - The Mommy App</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="paradigm.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <link rel="stylesheet" href="audio-history-common.css">
    <link rel="stylesheet" href="report-hero-action.css">
    <link rel="stylesheet" href="report-hero-meta.css">
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        .chart-wrap {
            overflow-x: auto;
            padding: 0;
        }

        .chart-empty {
            color: #666;
            font-size: 0.88rem;
        }

        .card-report-hero {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.9rem;
            align-items: stretch;
        }

        .card-report-hero-empty {
            color: #666;
            font-size: 0.88rem;
        }

        .card-report-hero-icon {
            width: 96px;
            height: 96px;
            background: #f3f5fb;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .card-report-hero-icon-text {
            color: #2f3c7e;
            font-weight: 600;
            text-align: center;
            line-height: 1.15;
            padding: 0 0.3rem;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .card-report-hero-icon-text.chinese-specific {
            font-family: var(--font-kaiti);
            font-weight: 400;
        }

        .card-report-hero-icon-text.size-xl { font-size: 2.6rem; line-height: 1; }
        .card-report-hero-icon-text.size-lg { font-size: 1.8rem; }
        .card-report-hero-icon-text.size-md { font-size: 1.25rem; }
        .card-report-hero-icon-text.size-sm { font-size: 0.92rem; }

        .card-report-hero-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.55rem;
            min-width: 0;
        }

        .card-report-hero-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.42rem;
        }

        .hero-stat {
            background: #eef0f8;
            border-radius: 10px;
            padding: 0.4rem 0.45rem;
            display: flex;
            flex-direction: column;
            gap: 0.12rem;
            min-width: 0;
        }

        .hero-stat-iconbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.7);
            color: #5b6787;
        }

        .hero-stat-iconbox svg {
            display: block;
        }

        .hero-stat-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: #2f3c7e;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hero-stat-label {
            font-size: 0.7rem;
            color: #5b6787;
            line-height: 1.15;
        }

        .hero-stat--right { background: #e6f8ea; }
        .hero-stat--right .hero-stat-iconbox { background: rgba(255, 255, 255, 0.85); color: #2f9e44; }
        .hero-stat--fixed { background: #fff5dc; }
        .hero-stat--fixed .hero-stat-iconbox { background: rgba(255, 255, 255, 0.85); color: #b07a00; }
        .hero-stat--wrong { background: #fdeaea; }
        .hero-stat--wrong .hero-stat-iconbox { background: rgba(255, 255, 255, 0.85); color: #d63636; }
        .hero-stat--pending { background: #e0f2fe; }
        .hero-stat--pending .hero-stat-iconbox { background: rgba(255, 255, 255, 0.85); color: #0369a1; }

        @media (max-width: 560px) {
            .card-report-hero {
                grid-template-columns: 80px 1fr;
                gap: 0.62rem;
            }
            .card-report-hero-icon {
                width: 80px;
                height: 80px;
                border-radius: 14px;
            }
            .card-report-hero-icon-text.size-xl { font-size: 2.2rem; }
            .card-report-hero-icon-text.size-lg { font-size: 1.5rem; }
            .card-report-hero-icon-text.size-md { font-size: 1.05rem; }
            .card-report-hero-icon-text.size-sm { font-size: 0.82rem; }
            .card-report-hero-stats {
                gap: 0.34rem;
            }
            .hero-stat {
                padding: 0.34rem 0.38rem;
            }
            .hero-stat-value {
                font-size: 0.96rem;
            }
            .hero-stat-label {
                font-size: 0.66rem;
            }
        }

        .chart-card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 0.55rem;
        }

        .chart-card-head h2 {
            margin: 0;
        }

        .chart-card-subhead {
            font-size: 0.78rem;
            color: #6a7596;
            margin-top: 0.18rem;
        }

        .trend-footnote {
            margin-top: 0.55rem;
        }

        .trend-footnote:empty {
            display: none;
        }

        .chart-card-head .trend-legend {
            margin-bottom: 0;
            margin-left: auto;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .history-item.current-session-item {
            border-color: #b7c2ec;
            box-shadow: 0 0 0 2px rgba(124, 150, 232, 0.16), var(--dashboard-chip-shadow);
        }

        .trend-numberline {
            padding: 0.4rem 2.4rem 0 0.4rem;
        }

        .trend-numberline-stage {
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 0.3rem;
        }

        .trend-yaxis-col {
            flex: 0 0 auto;
            width: 2.6rem;
            position: relative;
        }

        .trend-yaxis-label {
            position: absolute;
            right: 0;
            transform: translateY(50%);
            font-size: 0.66rem;
            font-weight: 600;
            color: #5b6787;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .trend-plot-col {
            flex: 1 1 auto;
            min-width: 0;
            position: relative;
        }

        .trend-numberline-arrows {
            position: relative;
            width: 100%;
        }

        .trend-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .trend-grid-line-h {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: #ecf0f8;
        }

        .trend-grid-line-v {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #ecf0f8;
            transform: translateX(-50%);
        }

        .trend-marker {
            position: absolute;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: currentColor;
            transform: translate(-50%, 50%);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9);
        }

        .trend-marker.right { color: #4cb780; }
        .trend-marker.wrong { color: #d95b5b; }
        .trend-marker.fixed { color: #e0ac2b; }
        .trend-marker.half { color: #8b6fc0; }
        .trend-marker.pending { color: #b0b8cc; }

        .trend-numberline-axis {
            position: relative;
            height: 2px;
            background: #b6bfd5;
            border-radius: 1px;
        }

        .trend-numberline-tick-labels {
            position: relative;
            height: 1.1rem;
            margin-top: 0.3rem;
        }

        .trend-numberline-tick-label {
            position: absolute;
            top: 0;
            transform: translateX(-50%);
            font-size: 0.68rem;
            font-weight: 700;
            color: #5b6787;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .trend-numberline-tick-label:last-child { color: #2f9e44; }

        .trend-legend {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .trend-legend-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 2px;
        }

        .trend-legend-dot.right { background: #4cb780; }
        .trend-legend-dot.wrong { background: #d95b5b; }
        .trend-legend-dot.fixed { background: #e0ac2b; }
        .trend-legend-dot.half { background: #8b6fc0; }
        .trend-legend-dot.pending { background: #c0c8d8; }

        .trend-legend-line {
            display: inline-block;
            width: 16px;
            height: 2px;
            background: #5b6acf;
            border-radius: 1px;
            margin-right: 4px;
            vertical-align: middle;
        }

        .trend-legend-sep {
            color: #ccc;
            margin: 0 0.1rem;
        }

        .trend-legend-line.ema {
            background: #e07a3d;
        }

        .trend-period-btns {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.3rem;
            margin: 0 0 0.5rem;
        }

        .trend-period-btn {
            background: #fff;
            border: 1px solid #d2d9eb;
            border-radius: 999px;
            padding: 0.2rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #5b6acf;
            cursor: pointer;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }

        .trend-period-btn:hover {
            background: #f4f6fc;
        }

        .trend-period-btn.active {
            background: #5b6acf;
            border-color: #5b6acf;
            color: #fff;
        }

        .trend-period-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .chart-legend {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #666;
        }

        .history-list {
            display: grid;
            grid-template-columns: minmax(0, 1fr) max-content;
            row-gap: 0.45rem;
            column-gap: 0;
        }

        .history-item {
            position: relative;
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: subgrid;
            align-items: center;
            border: 1px solid #eceff6;
            border-radius: 12px;
            padding: 0.6rem 0.7rem 0.6rem 1rem;
            font-size: 0.88rem;
            color: #333;
            background: var(--dashboard-chip-bg);
            box-shadow: var(--dashboard-chip-shadow);
            scroll-margin-top: 88px;
            transition: box-shadow 180ms ease, border-color 180ms ease;
        }

        .history-item.type3-history-item {
            display: block;
        }

        .history-item[class*="tone-"]::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            border-radius: 2px;
            background: var(--row-tone-color, transparent);
            pointer-events: none;
        }

        .history-item.tone-right { --row-tone-color: #4cb780; }
        .history-item.tone-fixed { --row-tone-color: #e0ac2b; }
        .history-item.tone-half { --row-tone-color: #8b6fc0; }
        .history-item.tone-wrong { --row-tone-color: #d95b5b; }
        .history-item.tone-pending { --row-tone-color: #b0b8cc; }

        .history-item.targeted-history-item {
            border-color: #7c96e8;
            box-shadow: 0 0 0 3px rgba(124, 150, 232, 0.18), var(--dashboard-chip-shadow);
        }

        .history-item-link {
            position: relative;
            padding-right: 1.8rem;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .history-item-link:hover {
            border-color: #c8d2ee;
            box-shadow: 0 3px 10px rgba(31, 45, 98, 0.12);
        }

        .history-chevron {
            position: absolute;
            right: 0.65rem;
            top: 50%;
            transform: translateY(-50%);
            color: #c4c9d7;
            font-size: 1.35rem;
            line-height: 1;
            pointer-events: none;
        }

        .history-head-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: nowrap;
        }

        .answer-head-actions {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.38rem;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .history-head-row > div:first-child {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .history-title-stack {
            min-width: 0;
            flex: 1 1 auto;
        }

        .history-primary {
            font-size: 0.88rem;
            font-weight: 700;
            color: #2f3c7e;
            line-height: 1.14;
            overflow-wrap: anywhere;
        }

        .meta-inline {
            margin-top: 0.14rem;
            font-size: 0.79rem;
            color: #666;
        }

        .history-status-side {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-wrap: wrap;
        }

        .history-primary.chinese-specific {
            font-family: var(--font-kaiti);
            font-weight: 400;
        }

        .history-time-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: #33406f;
            background: #f1f3f9;
            border-radius: 999px;
            padding: 0.15rem 0.55rem;
            white-space: nowrap;
        }

        .history-days-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: #33406f;
            background: #f1f3f9;
            border-radius: 999px;
            padding: 0.15rem 0.55rem;
            white-space: nowrap;
        }

        .history-days-badge.is-today {
            color: #5b6acf;
        }

        .history-type4-details {
            display: contents;
        }

        .history-details-main {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.6rem;
            align-items: center;
            min-width: 0;
        }

        .history-detail-group {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            flex-wrap: nowrap;
            min-width: 0;
        }

        .history-detail-group.submitted-group {
            flex-wrap: wrap;
            row-gap: 0.25rem;
        }

        .history-time-group {
            padding-left: 0.6rem;
            border-left: 1px solid rgba(47, 60, 126, 0.18);
            flex-wrap: wrap;
            row-gap: 0.25rem;
            align-self: stretch;
        }

        .history-item > .history-type4-details,
        .history-title-stack > .history-type4-details:first-child {
            margin-top: 0;
        }

        .history-type4-submitted-label {
            font-size: 0.72rem;
            color: #888;
        }

        .history-type4-pill-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            vertical-align: middle;
        }

        .history-type4-pill {
            display: inline-block;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.15rem 0.55rem;
            white-space: nowrap;
            color: #33406f;
            background: #f1f3f9;
        }

        .history-audio-assist-marker {
            position: absolute;
            top: 0;
            right: 0;
            transform: translate(30%, -28%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 0.82rem;
            height: 0.82rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 1px 3px rgba(31, 45, 98, 0.16);
            pointer-events: none;
        }

        .history-audio-assist-marker svg {
            display: block;
        }

        .submitted-group .history-type4-pill.answer-pill {
            color: #176b2e;
        }

        .submitted-group .history-type4-pill.tried-pill {
            color: #9d2e2e;
        }

        .submitted-group .history-type4-pill.partial-pill {
            color: #5b3e99;
        }

        .submitted-group .history-type4-pill.idk-pill {
            font-style: italic;
            font-weight: 600;
        }

        .history-item .audio-play-btn,
        .history-item .audio-speed-btn {
            height: 32px;
            min-height: 32px;
            padding: 0 0.58rem;
            font-size: 0.8rem;
        }

        .history-item .audio-play-btn {
            min-width: 56px;
        }

        .history-item .audio-speed-btn {
            min-width: 44px;
        }

        .history-item .audio-progress {
            min-width: 0;
        }

        .type3-history-item .history-head-row {
            align-items: flex-start;
        }

        .type3-history-item .history-title-stack,
        .type3-history-item .answer-head-actions {
            min-width: 0;
        }

        .answer-type3-details {
            margin-top: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.18rem 0.32rem;
        }

        .answer-type3-back {
            color: #33406f;
            font-size: 0.82rem;
            line-height: 1.25;
            font-weight: 500;
            white-space: nowrap;
        }

        .answer-type3-sep {
            color: #a2abc6;
            font-size: 0.74rem;
            line-height: 1;
        }

        .answer-type3-source {
            color: #6a7596;
            font-size: 0.76rem;
            line-height: 1.25;
            font-weight: 600;
        }

        .answer-report-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            padding: 0 0.58rem;
            font-size: 0.78rem;
            line-height: 1;
            white-space: nowrap;
        }

        @media (max-width: 560px) {
            .history-head-row {
                align-items: flex-start;
            }

            .answer-type3-back {
                font-size: 0.76rem;
                line-height: 1.2;
            }

            .answer-type3-source {
                font-size: 0.7rem;
            }

            .answer-type3-sep {
                font-size: 0.68rem;
            }
        }

        .pill {
            display: inline-block;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.14rem 0.45rem;
        }

        .pill.right {
            background: #e6f8ea;
            color: #176b2e;
        }

        .pill.fixed {
            background: #fff5dc;
            color: #9a6200;
        }

        .pill.half {
            background: #f3eeff;
            color: #5b3e99;
        }

        .pill.wrong {
            background: #fdeaea;
            color: #9d2e2e;
        }

        .pill.pending {
            background: #eef2fb;
            color: #5b6787;
        }
    </style>
</head>
<body class="report-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1>
                    <span class="page-title-icon" aria-hidden="true">📊</span>
                    <span id="pageTitle">Card Report</span>
                </h1>
                <div class="page-header-actions" data-family-user-switcher></div>
            </div>
        </header>

        <div id="errorMessage" class="error hidden"></div>

        <section class="paradigm-settings-panel paradigm-settings-panel--content-first section-stack">
            <div id="cardReportHero"></div>
        </section>

        <section class="paradigm-settings-panel section-stack">
            <div class="chart-card-head">
                <div>
                    <h2 class="paradigm-panel-title"><span class="paradigm-panel-title-icon"><span class="icon" data-icon="bar-chart-3" data-icon-size="22"></span></span><span class="paradigm-panel-heading">Speed Over Time</span></h2>
                    <div class="chart-card-subhead">Each dot = one attempt</div>
                </div>
                <div id="trendLegend" class="trend-legend"></div>
            </div>
            <div id="trendPeriodBtns" class="trend-period-btns" hidden></div>
            <div id="trendChart" class="chart-wrap"></div>
            <div id="trendFootnote" class="chart-card-subhead trend-footnote"></div>
        </section>

        <section class="paradigm-settings-panel">
            <h2 class="paradigm-panel-title"><span class="paradigm-panel-title-icon"><span class="icon" data-icon="history" data-icon-size="22"></span></span><span class="paradigm-panel-heading">Attempt History</span></h2>
            <div id="historyList" class="history-list"></div>
        </section>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="icons.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="subject-icons.js"></script>
    <script src="simple-audio-player.js"></script>
    <script src="lesson-reading-duration-backfill.js"></script>
    <script src="audio-history-common.js"></script>
    <script src="report-hero-action-common.js"></script>
    <script src="kid-card-report.js"></script>
</body>
</html>
