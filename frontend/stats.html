<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=mommy-icon2-20260607">
    <link rel="shortcut icon" href="favicon.ico?v=mommy-icon2-20260607">
    <link rel="manifest" href="site.webmanifest?v=mommy-icon2-20260607">
    <script src="idle-home-redirect.js"></script>
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stats - The Mommy App</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="paradigm.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <link rel="stylesheet" href="stats.css">
</head>
<body class="manage-page stats-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions stats-header">
            <div class="page-header-row">
                <h1>
                    <span class="page-title-icon icon" data-icon="bar-chart-3" data-icon-size="24" data-icon-stroke="2.6" aria-hidden="true"></span>
                    Stats
                </h1>
                <div class="page-header-end">
                    <div id="statsKidAvatarSwitcher" class="kid-avatar-switcher hidden" role="tablist" aria-label="Kids"></div>
                    <div class="page-header-actions" data-family-user-switcher></div>
                </div>
            </div>
        </header>

        <main class="stats-layout">
            <div id="statsError" class="error hidden"></div>

            <section class="settings-card settings-section paradigm-settings-panel--content-first">
                <div class="settings-card-body stats-workbench">
                    <div id="statsTabs" class="cards-view-toggle-group cards-view-toggle-group-centered" role="tablist" aria-label="Stats sections"></div>

                    <div class="stats-heading">
                        <h2 class="paradigm-panel-title">
                            <span class="paradigm-panel-title-icon"><span class="icon" data-icon="trending-up" data-icon-size="18"></span></span>
                            <span class="paradigm-panel-heading">Trend</span>
                            <span id="statsTrendMeta" class="stats-trend-meta"></span>
                        </h2>
                        <p id="statsTrendSubtitle" class="hidden">Daily points</p>
                    </div>

                    <div class="stats-toolbar">
                        <div class="stats-toolbar-end">
                            <div id="statsPeriodControls" class="stats-period-controls paradigm-chip-toggle-group" role="group" aria-label="Stats granularity">
                                <button type="button" class="paradigm-chip-toggle active" data-stats-granularity="daily" aria-pressed="true">Daily</button>
                                <button type="button" class="paradigm-chip-toggle" data-stats-granularity="weekly" aria-pressed="false">Weekly</button>
                                <button type="button" class="paradigm-chip-toggle" data-stats-granularity="monthly" aria-pressed="false">Monthly</button>
                            </div>
                            <div id="statsRangeControls" class="stats-range-controls paradigm-chip-toggle-group" role="group" aria-label="Stats date range">
                                <button type="button" class="paradigm-chip-toggle active" data-stats-range="14d" aria-pressed="true">14d</button>
                                <button type="button" class="paradigm-chip-toggle" data-stats-range="all" aria-pressed="false">All</button>
                            </div>
                        </div>
                    </div>

                    <div id="statsTrendChart" class="stats-chart" aria-label="Stats trend chart"></div>

                    <div id="statsTopItemsHeading" class="stats-heading stats-heading--items">
                        <h2 class="paradigm-panel-title">
                            <span class="paradigm-panel-title-icon"><span class="icon" data-icon="clipboard-list" data-icon-size="18"></span></span>
                            <span class="paradigm-panel-heading">Top items</span>
                        </h2>
                        <div class="search-bar stats-top-search">
                            <span class="search-bar-icon icon" data-icon="search" data-icon-size="15" data-icon-stroke="2.4" aria-hidden="true"></span>
                            <input id="statsTopItemSearchInput" class="paradigm-search-input" type="search" autocomplete="off" placeholder="Search event..." aria-label="Search top item event names">
                        </div>
                    </div>

                    <div id="statsTopItems" class="stats-item-list"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="icons.js"></script>
    <script src="subject-icons.js"></script>
    <script src="search-bar.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="stats.js"></script>
</body>
</html>
