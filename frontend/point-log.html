<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <script src="idle-home-redirect.js"></script>
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log Points - The mommy app</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <link rel="stylesheet" href="point-log.css">
</head>
<body class="manage-page point-log-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions point-log-header">
            <div class="page-header-row">
                <h1>
                    <span class="page-title-icon" aria-hidden="true">📝</span>
                    Log Points
                </h1>
                <div class="page-header-actions" data-family-user-switcher></div>
            </div>
        </header>

        <main class="point-log-layout">
            <section id="kidTabs" class="kid-nav-group" role="tablist" aria-label="Kids"></section>
            <div id="logError" class="error hidden"></div>

            <section class="settings-card settings-section point-log-workbench">
                <div class="settings-card-body">
                    <div class="point-log-mode-row">
                        <div class="cards-view-toggle-group cards-view-toggle-group-centered" role="group" aria-label="Point log modes">
                            <button type="button" class="cards-view-toggle-btn active" data-mode="bonus"><span class="cards-view-toggle-btn-icon" data-icon="thumbs-up" data-icon-size="16" data-icon-stroke="2.4"></span><span class="point-rule-tab-long">Bonus Events</span><span class="point-rule-tab-short">Bonus</span></button>
                            <button type="button" class="cards-view-toggle-btn" data-mode="deduction"><span class="cards-view-toggle-btn-icon" data-icon="thumbs-down" data-icon-size="16" data-icon-stroke="2.4"></span><span class="point-rule-tab-long">Deduction Events</span><span class="point-rule-tab-short">Deduction</span></button>
                        </div>
                        <a href="/point-rules.html" class="point-rules-link" aria-label="Open rules" title="Rules"><span class="icon" data-icon="pencil" data-icon-size="17"></span><span class="point-rules-link-text">Rules</span></a>
                    </div>

                    <form id="pointLogForm" class="point-log-form">
                        <div class="point-log-entry-row">
                            <div class="form-group point-log-emoji-group">
                                <label for="pointEmoji">Emoji</label>
                                <input id="pointEmoji" type="text" autocomplete="off" inputmode="text" maxlength="8">
                            </div>
                            <div class="form-group point-log-name-group">
                                <label for="pointRuleName">Name</label>
                                <input id="pointRuleName" type="text" autocomplete="off" placeholder="What happened?">
                            </div>
                            <div class="form-group point-log-points-group">
                                <label for="pointPoints">Points</label>
                                <div class="point-log-stepper" role="group" aria-label="Points">
                                    <button type="button" class="point-log-stepper-btn" data-point-step="-1" aria-label="Decrease points">
                                        <span class="icon" data-icon="minus" data-icon-size="16" data-icon-stroke="2.6"></span>
                                    </button>
                                    <input id="pointPoints" class="point-log-stepper-input" type="number" autocomplete="off" inputmode="numeric" min="1" step="1">
                                    <button type="button" class="point-log-stepper-btn" data-point-step="1" aria-label="Increase points">
                                        <span class="icon" data-icon="plus" data-icon-size="16" data-icon-stroke="2.6"></span>
                                    </button>
                                </div>
                            </div>
                            <div id="noteGroup" class="form-group">
                                <label for="pointNote">Note <span>(optional)</span></label>
                                <input id="pointNote" type="text" autocomplete="off" placeholder="Details">
                            </div>
                            <div class="point-log-actions">
                                <button id="submitPointLogBtn" type="submit" class="btn-primary point-apply-btn" disabled><span class="point-apply-icon icon" data-icon="check" data-icon-size="17" data-icon-stroke="2.7"></span><span class="point-apply-label">Confirm</span></button>
                            </div>
                        </div>
                    </form>

                    <div id="templateList" class="point-template-list"></div>

                    <div id="selectionPanel" class="point-selection-panel hidden"></div>
                </div>
            </section>

            <section class="settings-card settings-section point-history-section">
                <div class="settings-card-body">
                    <div class="point-panel-title">
                        <span class="point-panel-title-icon"><span class="icon" data-icon="clock" data-icon-size="22" data-icon-stroke="2.7"></span></span>
                        <h2>Recent Activity</h2>
                        <span class="point-history-current-day" data-point-history-day-label></span>
                        <button id="pullTodaySessionsBtn" type="button" class="semantic-outline-btn point-pull-sessions-btn" aria-label="Pull today" title="Pull today"><span class="icon" data-icon="refresh-cw" data-icon-size="16"></span></button>
                    </div>
                    <div id="pointHistory" class="point-history"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="icons.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="subject-icons.js"></script>
    <script src="point-history-common.js"></script>
    <script src="point-rule-template-common.js"></script>
    <script src="point-log.js"></script>
</body>
</html>
