<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Deck Category - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .deck-page {
            max-width: 1000px;
            margin: 0 auto;
        }

        .deck-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .deck-panel h2 {
            margin-bottom: var(--card-section-title-margin-bottom);
        }

        .deck-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.8rem;
        }

        .deck-row {
            display: flex;
            gap: 0.6rem;
            align-items: end;
            flex-wrap: wrap;
        }

        .field-behavior {
            grid-column: 1 / -1;
        }

        .field-chinese-logic {
            grid-column: 1 / -1;
        }

        fieldset.form-group {
            border: 0;
            padding: 0;
            margin: 0;
            min-width: 0;
        }

        fieldset.form-group legend {
            font-size: 0.92rem;
            font-weight: 600;
            color: #2f3c7e;
            margin-bottom: 0.35rem;
        }

        .behavior-picker {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.55rem;
            margin-top: 0.2rem;
        }

        .logic-picker {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
            margin-top: 0.2rem;
        }

        .behavior-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .behavior-option-label {
            display: block;
            border: 1px solid #c8d1e1;
            border-radius: 10px;
            padding: 0.65rem 0.75rem;
            background: #fff;
            cursor: pointer;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .behavior-option-label:hover {
            border-color: #4f83ff;
            transform: translateY(-1px);
        }

        .behavior-option input[type="radio"]:checked + .behavior-option-label {
            border-color: #4f83ff;
            box-shadow: 0 0 0 3px rgba(79, 131, 255, 0.16);
            background: #f7faff;
        }

        .behavior-option-title {
            font-weight: 700;
            color: #233044;
            margin-bottom: 0.2rem;
        }

        .behavior-option-desc {
            font-size: 0.86rem;
            color: #4b5a70;
            line-height: 1.35;
        }

        @media (max-width: 980px) {
            .deck-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 680px) {
            .deck-grid {
                grid-template-columns: 1fr;
            }

            .logic-picker {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="manage-page">
    <div class="container deck-page">
        <header class="page-header-with-back">
            <div class="page-header-row">
                <h1>🧩 Manage Deck Category</h1>
                <a href="/deck-manage.html" class="back-btn btn-secondary page-header-back-btn">← Back</a>
            </div>
        </header>

        <main>
            <section class="deck-panel">
                <h2>New Category</h2>
                <form id="createCategoryForm">
                    <div class="deck-grid">
                        <div class="form-group">
                            <label for="categoryKeyInput">Category key</label>
                            <input type="text" id="categoryKeyInput" placeholder="e.g. science_reading" required>
                        </div>
                        <div class="form-group">
                            <label for="displayNameInput">Display name</label>
                            <input type="text" id="displayNameInput" placeholder="e.g. Science Reading">
                        </div>
                        <div class="form-group">
                            <label for="emojiInput">Emoji</label>
                            <input type="text" id="emojiInput" placeholder="e.g. 🧪">
                        </div>
                        <fieldset class="form-group field-behavior">
                            <legend>Behavior type</legend>
                            <div class="behavior-picker" id="behaviorTypePicker">
                                <label class="behavior-option">
                                    <input type="radio" name="behaviorType" value="type_i" checked required>
                                    <span class="behavior-option-label">
                                        <span class="behavior-option-title">Type I</span>
                                        <span class="behavior-option-desc">Front text -> Done -> Back text -> Right/Wrong</span>
                                    </span>
                                </label>
                                <label class="behavior-option">
                                    <input type="radio" name="behaviorType" value="type_ii" required>
                                    <span class="behavior-option-label">
                                        <span class="behavior-option-title">Type II</span>
                                        <span class="behavior-option-desc">Prompt front as audio -> Done -> Back text -> Right/Wrong</span>
                                    </span>
                                </label>
                                <label class="behavior-option">
                                    <input type="radio" name="behaviorType" value="type_iii" required>
                                    <span class="behavior-option-label">
                                        <span class="behavior-option-title">Type III</span>
                                        <span class="behavior-option-desc">Front + Back shown -> kid recording workflow</span>
                                    </span>
                                </label>
                                <label class="behavior-option">
                                    <input type="radio" name="behaviorType" value="type_iv" required>
                                    <span class="behavior-option-label">
                                        <span class="behavior-option-title">Generator</span>
                                        <span class="behavior-option-desc">Dynamic generator deck -> typed answer -> backend auto-grading</span>
                                    </span>
                                </label>
                            </div>
                        </fieldset>
                        <fieldset class="form-group field-chinese-logic">
                            <legend>Chinese-specific logic</legend>
                            <div class="logic-picker" id="chineseLogicPicker">
                                <label class="behavior-option">
                                    <input type="radio" name="hasChineseSpecificLogic" value="false" checked required>
                                    <span class="behavior-option-label">
                                        <span class="behavior-option-title">No</span>
                                        <span class="behavior-option-desc">Use generic behavior flow only.</span>
                                    </span>
                                </label>
                                <label class="behavior-option">
                                    <input type="radio" name="hasChineseSpecificLogic" value="true" required>
                                    <span class="behavior-option-label">
                                        <span class="behavior-option-title">Yes</span>
                                        <span class="behavior-option-desc">Enable Chinese-specific behavior differences.</span>
                                    </span>
                                </label>
                            </div>
                            <p id="chineseLogicNote" class="category-preselect-note hidden"></p>
                        </fieldset>
                    </div>
                    <div class="deck-row mt-07">
                        <button id="createCategoryBtn" type="submit" class="btn-primary">Create Category</button>
                    </div>
                </form>
            </section>

            <section class="deck-panel">
                <h2>Existing Categories</h2>
                <div id="emptyState" class="deck-empty hidden">No categories found.</div>
                <div id="tableWrap" class="shared-report-table-wrap">
                    <table class="shared-report-table">
                        <thead>
                            <tr>
                                <th>Category Key</th>
                                <th class="table-col-120">Display Name</th>
                                <th class="table-col-80">Emoji</th>
                                <th class="table-col-120">Behavior</th>
                                <th class="table-col-120">Chinese Logic</th>
                                <th class="table-col-120">Shared</th>
                                <th class="table-col-120">Action</th>
                            </tr>
                        </thead>
                        <tbody id="categoryTableBody"></tbody>
                    </table>
                </div>
            </section>

            <div id="successMessage" class="success hidden"></div>
            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-create.js"></script>
</body>
</html>
