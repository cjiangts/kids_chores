<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=mommy-icon2-20260607">
    <link rel="shortcut icon" href="favicon.ico?v=mommy-icon2-20260607">
    <link rel="manifest" href="site.webmanifest?v=mommy-icon2-20260607">
    <script src="idle-home-redirect.js"></script>
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Subject - The Mommy App</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="paradigm.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <style>

        .deck-row {
            display: flex;
            gap: 0.6rem;
            align-items: end;
            flex-wrap: wrap;
        }

        .category-emoji-cell {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: nowrap;
            white-space: nowrap;
        }

        .category-emoji-text {
            min-width: 1.3rem;
            font-size: 1.1rem;
            line-height: 1;
            flex: 0 0 auto;
        }

        .category-emoji-btn {
            padding: 0.18rem 0.55rem;
            min-height: 30px;
            font-size: 0.78rem;
            flex: 0 0 auto;
        }

        .emoji-modal {
            width: min(420px, calc(100vw - 2rem));
        }

        .emoji-modal-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .emoji-modal-head h2 {
            margin: 0;
        }

        .emoji-modal-grid {
            display: grid;
            gap: 0.65rem;
        }

        .emoji-modal-current {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #4b5a70;
        }

        .emoji-modal-current-emoji {
            min-width: 1.4rem;
            font-size: 1.2rem;
            line-height: 1;
        }

        .emoji-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.55rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .category-icon-col {
            width: 48px;
            padding-right: 0;
        }

        .category-icon-cell {
            width: 48px;
            padding-right: 0;
            vertical-align: middle;
        }

        .category-icon-cell .subject-icon {
            --subj-size: 32px;
        }

        .category-action-cell {
            display: inline-flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .category-delete-btn {
            background: #fef0f0;
            color: #c92a2a;
            border-color: #f5c6c6;
        }
    </style>
</head>
<body class="manage-page">
    <div class="container deck-page">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1>
                    <span class="page-title-icon" aria-hidden="true">🧩</span>
                    Manage Subject
                </h1>
                <div class="page-header-actions" data-family-user-switcher></div>
            </div>
        </header>

        <main>
            <section class="deck-panel settings-section paradigm-settings-panel">
                <h2 class="paradigm-panel-title">
                    <span class="paradigm-panel-title-icon"><span class="icon" data-icon="plus" data-icon-size="18"></span></span>
                    <span class="paradigm-panel-heading">New Subject</span>
                </h2>
                <form id="createCategoryForm" class="paradigm-compact-form">
                    <div class="paradigm-form-grid">
                        <div class="form-group paradigm-form-field">
                            <label for="categoryKeyInput">Subject key</label>
                            <input type="text" id="categoryKeyInput" class="paradigm-input" placeholder="e.g. science_reading" required>
                        </div>
                        <div class="form-group paradigm-form-field">
                            <label for="displayNameInput">Display name</label>
                            <input type="text" id="displayNameInput" class="paradigm-input" placeholder="e.g. Science Reading">
                        </div>
                        <fieldset class="form-group paradigm-form-field paradigm-form-span-full">
                            <legend>Behavior type</legend>
                            <div class="paradigm-choice-grid" id="behaviorTypePicker">
                                <label class="paradigm-choice-option">
                                    <input type="radio" name="behaviorType" value="type_i" checked required>
                                    <span class="paradigm-choice-label">
                                        <span class="paradigm-choice-title">Type I</span>
                                        <span class="paradigm-choice-desc">Front text -> Done -> Back text -> Right/Wrong</span>
                                    </span>
                                </label>
                                <label class="paradigm-choice-option">
                                    <input type="radio" name="behaviorType" value="type_ii" required>
                                    <span class="paradigm-choice-label">
                                        <span class="paradigm-choice-title">Type II</span>
                                        <span class="paradigm-choice-desc">Prompt front as audio -> Done -> Back text -> Right/Wrong</span>
                                    </span>
                                </label>
                                <label class="paradigm-choice-option">
                                    <input type="radio" name="behaviorType" value="type_iii" required>
                                    <span class="paradigm-choice-label">
                                        <span class="paradigm-choice-title">Type III</span>
                                        <span class="paradigm-choice-desc">Front + Back shown -> kid recording workflow</span>
                                    </span>
                                </label>
                                <label class="paradigm-choice-option">
                                    <input type="radio" name="behaviorType" value="type_iv" required>
                                    <span class="paradigm-choice-label">
                                        <span class="paradigm-choice-title">Type IV</span>
                                        <span class="paradigm-choice-desc">Dynamic Type IV deck -> typed answer -> backend auto-grading</span>
                                    </span>
                                </label>
                            </div>
                        </fieldset>
                        <fieldset class="form-group paradigm-form-field paradigm-form-span-full">
                            <legend>Chinese-specific logic</legend>
                            <div class="paradigm-choice-grid paradigm-choice-grid--two" id="chineseLogicPicker">
                                <label class="paradigm-choice-option">
                                    <input type="radio" name="hasChineseSpecificLogic" value="false" checked required>
                                    <span class="paradigm-choice-label">
                                        <span class="paradigm-choice-title">No</span>
                                        <span class="paradigm-choice-desc">Use generic behavior flow only.</span>
                                    </span>
                                </label>
                                <label class="paradigm-choice-option">
                                    <input type="radio" name="hasChineseSpecificLogic" value="true" required>
                                    <span class="paradigm-choice-label">
                                        <span class="paradigm-choice-title">Yes</span>
                                        <span class="paradigm-choice-desc">Enable Chinese-specific behavior differences.</span>
                                    </span>
                                </label>
                            </div>
                            <p id="chineseLogicNote" class="category-preselect-note hidden"></p>
                        </fieldset>
                        <fieldset class="form-group paradigm-form-field paradigm-form-span-full hidden" id="chineseBackContentFieldset">
                            <legend>Chinese back-of-card content</legend>
                            <div class="paradigm-choice-grid paradigm-choice-grid--two" id="chineseBackContentPicker">
                                <label class="paradigm-choice-option">
                                    <input type="radio" name="chineseBackContent" value="pinyin">
                                    <span class="paradigm-choice-label">
                                        <span class="paradigm-choice-title">Pinyin</span>
                                        <span class="paradigm-choice-desc">Character deck: single char, back = pinyin.</span>
                                    </span>
                                </label>
                                <label class="paradigm-choice-option">
                                    <input type="radio" name="chineseBackContent" value="english">
                                    <span class="paradigm-choice-label">
                                        <span class="paradigm-choice-title">English</span>
                                        <span class="paradigm-choice-desc">Vocabulary deck: 1+ chars, back = english meaning.</span>
                                    </span>
                                </label>
                            </div>
                        </fieldset>
                    </div>
                    <div class="deck-row">
                        <button id="createCategoryBtn" type="submit" class="paradigm-btn">Create Subject</button>
                    </div>
                </form>
            </section>

            <section class="deck-panel settings-section paradigm-settings-panel">
                <h2 class="paradigm-panel-title">
                    <span class="paradigm-panel-title-icon"><span class="icon" data-icon="folder" data-icon-size="18"></span></span>
                    <span class="paradigm-panel-heading">Existing Subjects</span>
                </h2>
                <div id="emptyState" class="deck-empty hidden">No subjects found.</div>
                <div id="tableWrap" class="shared-report-table-wrap">
                    <table class="shared-report-table">
                        <thead>
                            <tr>
                                <th class="category-icon-col" aria-label="Icon"></th>
                                <th>Subject Key</th>
                                <th class="table-col-120">Display Name</th>
                                <th class="table-col-120">Behavior</th>
                                <th class="table-col-120">Chinese Logic</th>
                                <th class="table-col-120">Chinese Back</th>
                                <th class="table-col-120">Shared</th>
                                <th class="table-col-120">Action</th>
                            </tr>
                        </thead>
                        <tbody id="categoryTableBody"></tbody>
                    </table>
                </div>
            </section>

            <div id="successMessage" class="success hidden"></div>
            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <script src="icons.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="subject-icons.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="deck-category-create.js"></script>
</body>
</html>
