<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Practice Sheet - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <style>
        :root {
            --font-kaiti: 'KidsKaiti', '华文楷体', 'STKaiti', 'Kaiti SC', 'KaiTi', 'BiauKai', 'DFKai-SB', serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            background: #f5f7fb;
            color: #222;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .toolbar button,
        .toolbar .toolbar-link {
            border: none;
            border-radius: 8px;
            padding: 9px 13px;
            cursor: pointer;
            background: #2d7ef7;
            color: #fff;
            font-size: 0.95rem;
            text-decoration: none;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            white-space: nowrap;
        }

        .toolbar .toolbar-link.secondary,
        .toolbar button.secondary {
            background: #eaf0ff;
            color: #234b9a;
        }

        .sheet-title {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.2;
            min-width: 0;
        }

        .sheet-preview-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 12px;
        }

        .sheet-page {
            position: relative;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            flex: 0 0 auto;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .sheet-content {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .sb-margin,
        .sb-safe-margin {
            position: absolute;
            background: transparent;
            pointer-events: none;
        }

        .sb-printable-border {
            position: absolute;
            border: 2px dashed rgba(209, 31, 31, 0.65);
            pointer-events: none;
            box-sizing: border-box;
            z-index: 0;
        }

        .sb-header-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 8px;
            color: #333;
            padding: 0 2px;
            position: absolute;
        }

        .sb-header-name,
        .sb-header-sheetno {
            font-weight: 700;
            white-space: nowrap;
        }

        .sb-header-sheetno {
            text-align: right;
        }

        .sb-header-decks {
            min-width: 0;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #58647b;
            font-weight: 600;
        }

        .sb-grid-area {
            position: absolute;
            overflow: hidden;
        }

        .sb-row-wrap {
            position: relative;
            z-index: 1;
        }

        .sb-row {
            display: flex;
            flex-wrap: nowrap;
            position: relative;
            width: 100%;
            justify-content: space-between;
        }

        .cw-grid-cell {
            position: relative;
            border: 1.5px solid #4caf50;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .cw-grid-cell::before,
        .cw-grid-cell::after {
            content: '';
            position: absolute;
            pointer-events: none;
        }

        .cw-grid-cell::before {
            top: 50%;
            left: 0;
            right: 0;
            border-top: 1px dashed #a5d6a7;
        }

        .cw-grid-cell::after {
            left: 50%;
            top: 0;
            bottom: 0;
            border-left: 1px dashed #a5d6a7;
        }

        .cw-grid-char {
            position: relative;
            z-index: 1;
            color: #bbb;
            font-weight: 400;
            text-align: center;
            line-height: 1;
        }

        .cw-grid-char-first {
            color: #333;
            font-weight: 400;
        }

        .sheet-meta {
            color: #5b6783;
            font-size: 0.9rem;
            margin-bottom: 10px;
            line-height: 1.35;
        }

        .error {
            color: #b00020;
            font-weight: 600;
        }

        @media (max-width: 860px) {
            body {
                padding: 10px;
            }

            .toolbar {
                margin-bottom: 10px;
            }

            .sheet-title {
                flex: 1 1 100%;
            }

            .toolbar-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .sheet-preview-wrap {
                align-items: stretch;
                padding-bottom: 8px;
            }

            .sheet-page {
                margin: 0 auto;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 6px;
            }

            .toolbar {
                gap: 6px;
                margin-bottom: 6px;
            }

            .sheet-title {
                font-size: 1.05rem;
            }

            .toolbar-actions {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 6px;
            }

            .toolbar button,
            .toolbar .toolbar-link {
                width: 100%;
                min-width: 0;
                min-height: 36px;
                padding: 0.55rem 0.65rem;
                font-size: 0.88rem;
                white-space: normal;
                text-align: center;
            }

            .sheet-meta {
                margin-bottom: 6px;
                font-size: 0.8rem;
            }

            .sheet-preview-wrap {
                gap: 6px;
                padding-bottom: 6px;
            }

        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="sheet-title" id="sheetTitle">Chinese Writing Practice Sheet</div>
        <div class="toolbar-actions">
            <button id="printBtn" type="button">Print</button>
            <a id="backBtn" class="toolbar-link secondary" href="/">← Back</a>
        </div>
    </div>

    <div id="sheetMeta" class="sheet-meta"></div>

    <div id="sheetPreviewWrap" class="sheet-preview-wrap"></div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="writing-sheet-print.js"></script>
</body>
</html>
