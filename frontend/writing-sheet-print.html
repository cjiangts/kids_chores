<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=mommy-icon2-20260607">
    <link rel="shortcut icon" href="favicon.ico?v=mommy-icon2-20260607">
    <link rel="manifest" href="site.webmanifest?v=mommy-icon2-20260607">
    <script src="idle-home-redirect.js"></script>
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Writing Practice Sheet - The Mommy App</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="paradigm.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <style>
        :root {
            --font-kaiti: 'KidsKaiti', '华文楷体', 'STKaiti', 'Kaiti SC', 'KaiTi', 'BiauKai', 'DFKai-SB', serif;
        }

        .sheet-preview-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 12px;
        }

        .sheet-page {
            position: relative;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            flex: 0 0 auto;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .sheet-content {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .sb-margin,
        .sb-safe-margin {
            position: absolute;
            background: transparent;
            pointer-events: none;
        }

        .sb-printable-border {
            position: absolute;
            border: 2px dashed rgba(209, 31, 31, 0.65);
            pointer-events: none;
            box-sizing: border-box;
            z-index: 0;
        }

        .sb-header-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 8px;
            color: #333;
            padding: 0 2px;
            position: absolute;
        }

        .sb-header-name,
        .sb-header-sheetno {
            font-weight: 700;
            white-space: nowrap;
        }

        .sb-header-sheetno {
            text-align: right;
        }

        .sb-header-decks {
            min-width: 0;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #58647b;
            font-weight: 600;
        }

        .sb-grid-area {
            position: absolute;
            overflow: hidden;
        }

        .sb-row-wrap {
            position: relative;
            z-index: 1;
        }

        .sb-row {
            display: flex;
            flex-wrap: nowrap;
            position: relative;
            width: 100%;
            justify-content: space-between;
        }

        .cw-grid-cell {
            position: relative;
            border: 1.5px solid #4caf50;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .cw-grid-cell::before,
        .cw-grid-cell::after {
            content: '';
            position: absolute;
            pointer-events: none;
        }

        .cw-grid-cell::before {
            top: 50%;
            left: 0;
            right: 0;
            border-top: 1px dashed #a5d6a7;
        }

        .cw-grid-cell::after {
            left: 50%;
            top: 0;
            bottom: 0;
            border-left: 1px dashed #a5d6a7;
        }

        .cw-grid-char {
            position: relative;
            z-index: 1;
            color: #bbb;
            font-weight: 400;
            text-align: center;
            line-height: 1;
        }

        .cw-grid-char-first {
            color: #333;
            font-weight: 400;
        }

        .error {
            color: #b00020;
            font-weight: 600;
        }

        @media (max-width: 860px) {
            .sheet-preview-wrap {
                align-items: stretch;
                padding-bottom: 8px;
            }

            .sheet-page {
                margin: 0 auto;
            }
        }

        @media (max-width: 520px) {
            .sheet-preview-wrap {
                gap: 6px;
                padding-bottom: 6px;
            }

        }
    </style>
</head>
<body class="print-sheet-page">
    <header class="page-header-with-back page-header-with-actions">
        <div class="page-header-row">
            <h1><span class="page-title-icon" aria-hidden="true">🖨️</span> <span id="sheetTitle">Sheet</span></h1>
            <div class="page-header-actions">
                <button id="printBtn" type="button" class="paradigm-btn">Print</button>
            </div>
        </div>
    </header>

    <div id="sheetPreviewWrap" class="sheet-preview-wrap"></div>

    <script src="icons.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="writing-sheet-print.js"></script>
</body>
</html>
