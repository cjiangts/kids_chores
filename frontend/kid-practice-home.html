<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice - Learning App</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .practice-container {
            max-width: 600px;
        }

        .practice-chooser {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .practice-option {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 1.25rem;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .practice-option:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.16);
        }

        .practice-option h3 {
            font-size: 1.1rem;
            margin-bottom: 0.45rem;
            color: #333;
        }

        .practice-star-badge {
            margin-top: 0.6rem;
            min-height: 1.1rem;
            color: #f3b400;
            font-weight: 700;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .practice-chooser {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="practice-page">
    <div class="container">
        <div class="header">
            <h1 id="kidName">Loading...</h1>
            <div class="header-actions">
                <a id="kidBackBtn" href="/" class="back-btn">← Back</a>
            </div>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <div class="practice-container">
            <div id="practiceSection" class="hidden">
                <div id="practiceChooser" class="practice-chooser">
                    <button id="chinesePracticeOption" class="practice-option" data-category-key="chinese_characters" onclick="chooseChinesePractice()">
                        <h3>📖 Chinese Characters</h3>
                        <p id="chineseStarBadge" class="practice-star-badge"></p>
                    </button>
                    <button id="writingPracticeOption" class="practice-option" data-category-key="chinese_writing" onclick="goWritingPractice('chinese_writing')">
                        <h3>✍️ Chinese Character Writing</h3>
                        <p id="writingStarBadge" class="practice-star-badge"></p>
                    </button>
                    <button id="mathPracticeOption" class="practice-option" data-category-key="math" onclick="goType1Practice('math')">
                        <h3>➗ Math</h3>
                        <p id="mathStarBadge" class="practice-star-badge"></p>
                    </button>
                    <button id="lessonReadingPracticeOption" class="practice-option" data-category-key="chinese_reading" onclick="goLessonReadingPractice('chinese_reading')">
                        <h3>📚 Chinese Reading</h3>
                        <p id="lessonReadingStarBadge" class="practice-star-badge"></p>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="deck-category-common.js"></script>
    <script src="practice-ui-common.js"></script>
    <script src="kid-practice-home.js"></script>
</body>
</html>
