<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Home - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
</head>
<body class="practice-page practice-home-redesign">
    <div class="container">
        <div class="header">
            <h1 id="kidName">Loading...</h1>
            <div class="header-actions">
                <a id="kidBackBtn" href="/" class="back-btn">← Back</a>
            </div>
        </div>

        <div id="errorMessage" class="error redesign-error hidden"></div>

        <div class="practice-home-container">
            <div id="practiceSection" class="hidden">
                <section id="practiceSummaryStrip" class="redesign-summary-strip hidden"></section>
                <div id="practiceChooser" class="redesign-practice-grid">
                    <button id="chinesePracticeOption" class="practice-option redesign-practice-option" onclick="chooseChinesePractice(this.dataset.categoryKey)"></button>
                    <button id="writingPracticeOption" class="practice-option redesign-practice-option" onclick="goWritingPractice(this.dataset.categoryKey)"></button>
                    <button id="mathPracticeOption" class="practice-option redesign-practice-option" onclick="goType1Practice(this.dataset.categoryKey)"></button>
                    <button id="lessonReadingPracticeOption" class="practice-option redesign-practice-option" onclick="goType3Practice(this.dataset.categoryKey)"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="deck-category-common.js"></script>
    <script src="practice-star-badge-common.js"></script>
    <script src="practice-ui-common.js"></script>
    <script src="kid-practice-home.js"></script>
</body>
</html>
