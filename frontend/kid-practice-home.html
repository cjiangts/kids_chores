<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Practice Home - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <style>
        .offline-sync-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .offline-sync-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.4rem;
            padding: 0.1rem 0.45rem;
            margin-left: 0.15rem;
            background: rgba(31, 41, 80, 0.1);
            color: inherit;
            border-radius: 999px;
            font-size: 0.85em;
            font-weight: 600;
            line-height: 1;
        }
        .practice-option.is-offline-unavailable {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="practice-page practice-home-redesign">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1><span id="kidTitleIcon" class="page-title-icon" aria-hidden="true">🎓</span> <span id="kidName" role="status" aria-label="Loading kid"><span class="app-spinner app-spinner--small app-spinner--light" aria-hidden="true"></span></span></h1>
                <div class="page-header-actions" id="practiceHomeHeaderActions" data-family-user-switcher data-user-name="..." data-user-icon="user" data-user-title="Switch user">
                </div>
            </div>
        </header>

        <div class="practice-home-container">
            <div id="errorMessage" class="error redesign-error hidden"></div>
            <div id="practiceSection" class="practice-home-section-stack hidden">
                <section id="inAppPracticeSection" class="section-surface section-surface-lg practice-home-card">
                    <div class="practice-home-card-head">
                        <div class="practice-home-card-title">
                            <span class="practice-home-card-icon practice-home-card-icon--in-app" aria-hidden="true"><span data-icon="smartphone" data-icon-size="16"></span></span>
                            <span>In-App Chores</span>
                        </div>
                    </div>
                    <div id="practiceChooser" class="redesign-practice-grid"></div>
                </section>
                <section id="offAppPracticeSection" class="section-surface section-surface-lg practice-home-card hidden">
                    <div class="practice-home-card-head">
                        <div class="practice-home-card-title">
                            <span class="practice-home-card-icon practice-home-card-icon--off-app" aria-hidden="true"><span data-icon="clipboard-check" data-icon-size="16"></span></span>
                            <span>Off-App Chores</span>
                        </div>
                    </div>
                    <div id="offAppChooser" class="off-app-task-list"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="icons.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="subject-icons.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="practice-star-badge-common.js"></script>
    <script src="practice-ui-common.js"></script>
    <script src="offline-storage.js"></script>
    <script src="offline-common.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(() => {});
            });
        }
    </script>
    <script src="kid-practice-home.js"></script>
</body>
</html>
