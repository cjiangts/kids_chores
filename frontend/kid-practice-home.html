<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Home - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --practice-today-color: #f3b400;
            --practice-encourage-color: #b45309;
        }

        .practice-container {
            max-width: 600px;
        }

        .practice-chooser {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .practice-option {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 1.25rem;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .practice-option:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.16);
        }

        .practice-option h3 {
            font-size: 1.1rem;
            margin-bottom: 0.45rem;
            color: #333;
        }

        .practice-star-badge {
            margin-top: 0.6rem;
            min-height: 1.1rem;
            color: var(--practice-today-color);
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.35;
        }

        .practice-star {
            display: inline-block;
            font-size: 1.03rem;
            line-height: 1;
            margin-right: 0.02rem;
            vertical-align: -0.02rem;
        }

        .practice-star-silver {
            filter: grayscale(1) saturate(0) brightness(1.08);
            opacity: 0.92;
        }

        .practice-star-note {
            display: block;
            margin-top: 0.3rem;
            font-size: 0.86rem;
        }

        .practice-star-note-good {
            color: #15803d;
        }

        .practice-star-note-encourage {
            color: var(--practice-encourage-color);
        }

        .practice-star-note-encourage-zero {
            color: var(--practice-encourage-color);
        }

        @media (max-width: 768px) {
            .practice-chooser {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="practice-page">
    <div class="container">
        <div class="header">
            <h1 id="kidName">Loading...</h1>
            <div class="header-actions">
                <a id="kidBackBtn" href="/" class="back-btn">← Back</a>
            </div>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <div class="practice-container">
            <div id="practiceSection" class="hidden">
                <div id="practiceChooser" class="practice-chooser">
                    <button id="chinesePracticeOption" class="practice-option" onclick="chooseChinesePractice(this.dataset.categoryKey)">
                        <h3>📖 Chinese Characters</h3>
                        <p id="chineseStarBadge" class="practice-star-badge"></p>
                    </button>
                    <button id="writingPracticeOption" class="practice-option" onclick="goWritingPractice(this.dataset.categoryKey)">
                        <h3>✍️ Chinese Character Writing</h3>
                        <p id="writingStarBadge" class="practice-star-badge"></p>
                    </button>
                    <button id="mathPracticeOption" class="practice-option" onclick="goType1Practice(this.dataset.categoryKey)">
                        <h3>➗ Math</h3>
                        <p id="mathStarBadge" class="practice-star-badge"></p>
                    </button>
                    <button id="lessonReadingPracticeOption" class="practice-option" onclick="goType3Practice(this.dataset.categoryKey)">
                        <h3>📚 Type-III Practice</h3>
                        <p id="lessonReadingStarBadge" class="practice-star-badge"></p>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="deck-category-common.js"></script>
    <script src="practice-ui-common.js"></script>
    <script src="kid-practice-home.js"></script>
</body>
</html>
