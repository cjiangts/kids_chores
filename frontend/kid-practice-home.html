<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Practice Home - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <link rel="stylesheet" href="kid-badge-shelf-modal.css">
    <link rel="stylesheet" href="kid-badge-celebration.css">
    <style>
        .offline-sync-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .offline-sync-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.4rem;
            padding: 0.1rem 0.45rem;
            margin-left: 0.15rem;
            background: rgba(31, 41, 80, 0.1);
            color: inherit;
            border-radius: 999px;
            font-size: 0.85em;
            font-weight: 600;
            line-height: 1;
        }
        .practice-option.is-offline-unavailable {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="practice-page practice-home-redesign">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1><span id="kidTitleIcon" class="page-title-icon" aria-hidden="true"></span> <span id="kidName" role="status" aria-label="Loading kid"><span class="app-spinner app-spinner--small app-spinner--light" aria-hidden="true"></span></span></h1>
                <div class="page-header-actions" id="practiceHomeHeaderActions">
                    <a href="/admin.html" class="back-btn btn-secondary page-header-back-btn" aria-label="Home" title="Home"><span class="icon" data-icon="home" data-icon-size="18"></span> Home</a>
                </div>
            </div>
        </header>

        <div class="practice-home-container">
            <div class="practice-home-topbar">
                <div id="kidToggleGroup" class="kid-nav-group hidden" role="tablist" aria-label="Kids"></div>
                <section id="practiceSummaryStrip" class="redesign-summary-strip hidden"></section>
            </div>
            <div id="errorMessage" class="error redesign-error hidden"></div>
            <div id="practiceSection" class="section-surface section-surface-lg hidden">
                <div id="practiceChooser" class="redesign-practice-grid"></div>
            </div>
        </div>
    </div>

    <script src="icons.js"></script>
    <script src="subject-icons.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="practice-star-badge-common.js"></script>
    <script src="practice-ui-common.js"></script>
    <script src="kid-badge-shelf-modal.js"></script>
    <script src="kid-badge-celebration.js"></script>
    <script src="offline-storage.js"></script>
    <script src="offline-common.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(() => {});
            });
        }
    </script>
    <script src="kid-practice-home.js"></script>
</body>
</html>
