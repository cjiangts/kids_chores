<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Settings - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <style>
        .settings-grid {
            display: grid;
            gap: var(--section-stack-gap);
        }

        .parent-settings-page .settings-section {
            margin-bottom: 0;
        }

        .parent-settings-page .settings-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
            flex-direction: row;
        }

        .parent-settings-page .settings-row .form-group {
            flex: 1;
            margin-bottom: 0;
            min-width: 220px;
            width: auto;
        }

        .parent-settings-page .settings-row .btn-secondary {
            width: auto;
        }

        .settings-card-body {
            background: transparent;
            border: 0;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .settings-card h2 {
            margin: 0;
        }

        .settings-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .settings-note {
            color: #666;
            font-size: 0.9rem;
        }

        .tz-dropdown {
            position: relative;
            display: flex;
            align-items: center;
            min-width: 0;
            max-width: 320px;
            margin-top: 0.25rem;
        }

        .tz-dropdown-btn {
            appearance: none;
            -webkit-appearance: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            min-width: 0;
            border: 1px solid #d4ddf0;
            background: #fff;
            color: #2f3c7e;
            border-radius: 10px;
            height: 40px;
            padding: 0 0.8rem;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1;
            cursor: pointer;
            text-align: left;
        }

        .tz-dropdown-btn-icon {
            width: 16px;
            height: 16px;
            flex: 0 0 auto;
            color: #5f6b8a;
        }

        .tz-dropdown-btn-label {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tz-dropdown-btn-caret {
            width: 14px;
            height: 14px;
            flex: 0 0 auto;
            color: #5f6b8a;
        }

        .tz-dropdown-btn:hover,
        .tz-dropdown-btn[aria-expanded="true"] {
            border-color: #9ab5f3;
            background: #f6f9ff;
        }

        .tz-dropdown-btn:disabled {
            cursor: progress;
            opacity: 0.6;
        }

        .tz-dropdown-popover {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            background: #fff;
            border: 1px solid rgba(28, 42, 82, 0.12);
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(28, 42, 82, 0.16);
            padding: 0.3rem;
            max-height: 320px;
            overflow-y: auto;
        }

        .tz-dropdown-item {
            appearance: none;
            -webkit-appearance: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 0;
            background: transparent;
            text-align: left;
            padding: 0.6rem 0.7rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #2f3c7e;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tz-dropdown-item:hover:not(:disabled) {
            background: #eef3ff;
        }

        .tz-dropdown-item:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .tz-dropdown-item.selected {
            background: #eef3ff;
            color: #1d3a96;
        }

        .tz-dropdown-item-check {
            width: 14px;
            height: 14px;
            flex: 0 0 auto;
            color: #1d3a96;
            visibility: hidden;
        }

        .tz-dropdown-item.selected .tz-dropdown-item-check {
            visibility: visible;
        }

        .tz-dropdown-item-label {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tz-dropdown-item-sub {
            flex: 0 0 auto;
            margin-left: 0.6rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: #6b7494;
        }

        .tz-dropdown-item.selected .tz-dropdown-item-sub {
            color: #4d63a8;
        }

        .tz-current-note {
            font-size: 0.82rem;
            color: #707a8f;
            margin-bottom: 0.35rem;
        }

        .inline-row {
            display: flex;
            gap: 0.75rem;
            align-items: end;
            flex-wrap: wrap;
        }

        .inline-row .form-group {
            margin: 0;
            min-width: 220px;
            flex: 1;
        }

        .actions-row {
            margin-top: 0.85rem;
            flex-wrap: nowrap;
            gap: 0.5rem;
        }

        .actions-row > button {
            flex: 1 1 0;
            min-width: 0;
        }

        .family-settings-actions {
            grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
            margin-bottom: 1rem;
        }

        .warning-note {
            color: #8a2f2f;
            font-weight: 600;
        }

        .settings-status {
            margin-top: 0.45rem;
            color: #4b5a70;
            font-size: 0.9rem;
        }

        .success {
            background: #2f9e44;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .success.hidden {
            display: none;
        }

        .family-accounts-list {
            display: grid;
            gap: 0.85rem;
            margin-top: 0.85rem;
        }

        .family-account-card {
            background: var(--dashboard-chip-bg);
            border-radius: 12px;
            box-shadow: var(--dashboard-chip-shadow);
            padding: 0.95rem 1rem;
        }

        .family-account-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.9rem;
            flex-wrap: wrap;
        }

        .family-account-card-title {
            margin: 0;
            color: #1f2b4d;
            font-size: 1rem;
            line-height: 1.2;
            font-weight: 800;
        }

        .family-account-card-title code {
            font-size: 0.92em;
        }

        .family-account-card-flags {
            color: #60708f;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .family-account-card-lines {
            display: grid;
            gap: 0.18rem;
            margin-top: 0.45rem;
        }

        .family-account-card-action {
            margin-left: auto;
        }

        .family-account-protected {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: var(--control-height);
            padding: 0.5rem 0.9rem;
            border-radius: var(--control-radius);
            border: 1px solid #d2d9eb;
            background: #f4f6fc;
            color: #60708f;
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .password-modal.modal-content {
            max-width: 430px;
            width: min(430px, 92vw);
            padding: 24px 22px;
        }

        .password-modal-copy {
            margin: -0.4rem 0 1rem;
            color: #5f6d88;
            font-size: 0.94rem;
            line-height: 1.4;
        }

        .password-modal .form-group:last-of-type {
            margin-bottom: 0;
        }

        .password-modal .auth-input-wrap {
            position: relative;
        }

        .password-modal .auth-input-wrap .lead-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #6f7df0;
            pointer-events: none;
        }

        .password-modal .auth-input-wrap input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 42px 12px 42px;
            border-radius: 12px;
            border: 1.5px solid #e3e6f3;
            background: #fff;
            font-size: 0.98rem;
            color: #1f2647;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .password-modal .auth-input-wrap input:focus {
            outline: none;
            border-color: #6f7df0;
            box-shadow: 0 0 0 3px rgba(111, 125, 240, 0.18);
        }

        .password-modal .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 0;
            padding: 4px;
            cursor: pointer;
            color: #6f7df0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-modal .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        .password-modal .error,
        .password-modal .success {
            margin-top: 0.8rem;
        }

        .password-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.55rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        @media (max-width: 640px) {
            .family-account-card-top {
                align-items: stretch;
            }

            .family-account-card-action {
                margin-left: 0;
            }
        }

        @media (max-width: 520px) {
            .family-settings-actions {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                margin-bottom: 6px;
                gap: 6px;
            }

            .settings-grid {
                gap: var(--section-stack-gap-mobile);
            }
        }
    </style>
</head>
<body class="manage-page parent-settings-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1>
                    <span class="page-title-icon" aria-hidden="true">⚙️</span>
                    Family Settings
                </h1>
                <div class="page-header-actions" data-family-user-switcher></div>
            </div>
        </header>

        <main>
            <div class="family-settings-actions admin-action-grid" role="toolbar" aria-label="Family settings actions">
                <a href="/point-rules.html" class="admin-action-card">
                    <span class="admin-action-card-icon admin-action-card-icon--blue" aria-hidden="true">
                        <span class="icon" data-icon="clipboard-list" data-icon-size="22"></span>
                    </span>
                    <span class="admin-action-card-label">Point Rules</span>
                </a>
                <button type="button" id="openChangePasswordBtn" class="admin-action-card">
                    <span class="admin-action-card-icon admin-action-card-icon--violet" aria-hidden="true">
                        <span class="icon" data-icon="key" data-icon-size="22"></span>
                    </span>
                    <span class="admin-action-card-label">Change Password</span>
                </button>
                <a href="/deck-category-create.html" id="manageSubjectBtn" class="admin-action-card hidden">
                    <span class="admin-action-card-icon admin-action-card-icon--blue" aria-hidden="true">
                        <span class="icon" data-icon="layout-grid" data-icon-size="22"></span>
                    </span>
                    <span class="admin-action-card-label">Manage Subject</span>
                </a>
            </div>

            <div class="settings-grid">
                <section class="settings-card settings-section">
                    <div class="settings-card-body">
                        <h2><span class="icon" data-icon="clock" data-icon-size="22"></span> Timezone Setting</h2>
                        <div class="settings-note">Daily stars and daily completion reset at local midnight in this time zone.</div>
                        <div class="tz-dropdown">
                            <button id="timezoneMenuBtn" type="button" class="tz-dropdown-btn" aria-haspopup="menu" aria-expanded="false" aria-label="Time zone">
                                <span class="tz-dropdown-btn-icon" data-icon="clock" data-icon-stroke="2"></span>
                                <span id="timezoneMenuBtnLabel" class="tz-dropdown-btn-label">Select…</span>
                                <span class="tz-dropdown-btn-caret" data-icon="chevron-down"></span>
                            </button>
                            <div id="timezoneMenuPopover" class="tz-dropdown-popover hidden" role="menu" aria-hidden="true"></div>
                        </div>
                        <div id="timezoneCurrentNote" class="tz-current-note hidden"></div>
                        <div id="timezoneError" class="error hidden"></div>
                        <div id="timezoneSuccess" class="success hidden"></div>
                    </div>
                </section>

                <section id="backupSettingsCard" class="settings-card settings-section">
                    <div class="settings-card-body">
                        <h2><span class="icon" data-icon="save" data-icon-size="22"></span> Backup & Restore</h2>
                        <div class="settings-row">
                            <button id="downloadBackupBtn" class="btn-secondary">
                                <span class="btn-icon" aria-hidden="true">
                                    <span class="icon" data-icon="download" data-icon-size="20"></span>
                                </span>
                                <span class="btn-label">Download Backup</span>
                            </button>
                            <button id="restoreBackupBtn" class="btn-secondary">
                                <span class="btn-icon" aria-hidden="true">
                                    <span class="icon" data-icon="upload" data-icon-size="20"></span>
                                </span>
                                <span class="btn-label">Restore Backup</span>
                            </button>
                            <input type="file" id="backupFileInput" accept=".zip" class="hidden">
                            <span id="backupInfo" class="settings-note"></span>
                        </div>
                    </div>
                </section>

                <section id="familyAdminCard" class="settings-card settings-section hidden">
                    <div class="settings-card-body">
                        <h2><span class="icon" data-icon="users" data-icon-size="22"></span> Manage Families</h2>
                        <p class="settings-note">Super-family can delete non-super families.</p>
                        <div id="familyStorageSummary" class="settings-note hidden"></div>
                        <div id="familyAccountsEmpty" class="settings-note hidden">No family accounts found.</div>
                        <div id="familyAccountsList" class="family-accounts-list"></div>
                        <div id="familyAdminError" class="error hidden"></div>
                        <div id="familyAdminSuccess" class="success hidden"></div>
                    </div>
                </section>
            </div>

            <div id="successMessage" class="success hidden"></div>
            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <div id="changePasswordModal" class="modal hidden">
        <div class="modal-content password-modal" role="dialog" aria-modal="true" aria-labelledby="changePasswordModalTitle">
            <h2 id="changePasswordModalTitle"><span class="icon" data-icon="key" data-icon-size="22"></span> Change Password</h2>
            <p class="password-modal-copy">Update the family password.</p>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="currentPassword">Current password</label>
                    <div class="auth-input-wrap has-toggle">
                        <span class="lead-icon" data-icon="lock" data-icon-stroke="2"></span>
                        <input type="password" id="currentPassword" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" data-target="currentPassword" aria-label="Show password">
                            <span data-icon="eye" data-icon-stroke="2"></span>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="newPassword">New password</label>
                    <div class="auth-input-wrap has-toggle">
                        <span class="lead-icon" data-icon="lock" data-icon-stroke="2"></span>
                        <input type="password" id="newPassword" autocomplete="new-password" required>
                        <button type="button" class="password-toggle" data-target="newPassword" aria-label="Show password">
                            <span data-icon="eye" data-icon-stroke="2"></span>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Repeat new password</label>
                    <div class="auth-input-wrap has-toggle">
                        <span class="lead-icon" data-icon="lock" data-icon-stroke="2"></span>
                        <input type="password" id="confirmPassword" autocomplete="new-password" required>
                        <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="Show password">
                            <span data-icon="eye" data-icon-stroke="2"></span>
                        </button>
                    </div>
                </div>
                <div id="passwordError" class="error hidden"></div>
                <div id="passwordSuccess" class="success hidden"></div>
                <div class="password-modal-actions">
                    <button type="submit" id="changePasswordBtn" class="btn-primary">
                        <span class="btn-icon" aria-hidden="true">
                            <span class="icon" data-icon="check" data-icon-size="20"></span>
                        </span>
                        <span class="btn-label">Update Password</span>
                    </button>
                    <button type="button" id="closeChangePasswordBtn" class="btn-secondary">
                        <span class="btn-icon" aria-hidden="true">
                            <span class="icon" data-icon="x" data-icon-size="20"></span>
                        </span>
                        <span class="btn-label">Close</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="icons.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="parent-settings-core.js"></script>
    <script src="parent-settings-backup.js"></script>
</body>
</html>
