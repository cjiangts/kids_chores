<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Detail - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .header h1 { color: #fff; }

        .summary-shell {
            background: var(--dashboard-panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 12px;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.7rem;
            margin-bottom: 0;
        }

        .summary-card {
            background: var(--dashboard-chip-bg);
            border-radius: 12px;
            padding: 0.75rem;
            box-shadow: var(--dashboard-chip-shadow);
        }

        .summary-card .label { color: #666; font-size: 0.82rem; }
        .summary-card .value { color: #2f3c7e; font-size: 1.1rem; font-weight: 700; margin-top: 0.2rem; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.9rem;
        }

        .detail-card {
            background: var(--dashboard-panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
        }

        .detail-card h2 {
            margin-bottom: var(--card-section-title-margin-bottom);
        }
        .section-title {
            margin: 0 0 var(--card-section-title-margin-bottom) 0;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 0.55rem;
        }

        .answer-grid.compact {
            display: flex;
            flex-wrap: wrap;
            gap: 0.42rem;
        }

        .answer-grid.compact.type4-compact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 0.5rem;
        }

        .answer-item {
            border: 1px solid #eceff6;
            border-radius: 12px;
            background: var(--dashboard-chip-bg);
            box-shadow: var(--dashboard-chip-shadow);
            padding: 0.6rem 0.7rem;
            margin-bottom: 0.45rem;
            font-size: 0.88rem;
            color: #333;
        }

        .answer-grid.compact .answer-item {
            margin-bottom: 0;
            display: inline-flex;
            align-items: center;
            padding: 0.42rem 0.8rem;
            min-height: 0;
            width: auto;
            max-width: min(100%, 220px);
            border-radius: 999px;
            position: relative;
        }

        .answer-grid.compact a.answer-item {
            display: inline-flex;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .answer-grid.compact a.answer-item:hover {
            transform: translateY(-1px);
        }

        .answer-grid.compact a.answer-item:focus-visible {
            outline: 2px solid #7c96e8;
            outline-offset: 2px;
        }

        .answer-grid.compact .answer-item.type4-compact {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 0.26rem;
            width: 100%;
            max-width: none;
            min-height: 92px;
            padding: 0.56rem 0.72rem 0.6rem;
            border-radius: 18px;
        }

        .answer-grid.compact .answer-item.wrong {
            border-color: #efb6b6;
            background: #fff2f2;
            color: #8f2e2e;
            box-shadow: 0 4px 10px rgba(217, 91, 91, 0.1);
        }

        .answer-grid.compact .answer-item.right {
            border-color: #b7e2c7;
            background: #eefaf2;
            color: #21633f;
            box-shadow: 0 4px 10px rgba(76, 183, 128, 0.1);
        }

        .answer-grid.compact .answer-item.fixed {
            border-color: #efd489;
            background: #fff7df;
            color: #8b6208;
            box-shadow: 0 4px 10px rgba(234, 178, 47, 0.12);
        }

        .answer-grid.compact .answer-item.pending {
            border-color: #f2d18b;
            background: #fff7e6;
            color: #8b5f08;
        }

        .answer-bar-track {
            width: 100%;
            height: 8px;
            background: #eef2fb;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 0.35rem;
        }

        .answer-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: #4f83ff;
        }

        .answer-bar-fill.wrong {
            background: #d95b5b;
        }

        .answer-bar-fill.right {
            background: #4cb780;
        }

        .answer-bar-fill.fixed {
            background: #e0ac2b;
        }

        .answer-bar-fill.pending {
            background: #f3b43f;
        }

        .answer-item .meta {
            margin-top: 0.25rem;
            color: #666;
            font-size: 0.78rem;
        }

        .answer-head-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .answer-label {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .answer-label.chinese-specific {
            font-family: var(--font-kaiti);
            font-weight: 400;
        }

        .answer-grid.compact .answer-head-row {
            display: block;
        }

        .answer-grid.compact .answer-item.type4-compact .answer-head-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.45rem;
            width: 100%;
            flex-wrap: nowrap;
            padding-right: 0.7rem;
        }

        .answer-grid.compact .answer-label {
            display: block;
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.08;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .answer-grid.compact .answer-label.chinese-specific {
            font-weight: 400;
            font-size: 1.18rem;
            line-height: 1.04;
        }

        .answer-grid.compact .answer-item.type4-compact .answer-label {
            flex: 1 1 auto;
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            line-height: 1.08;
            font-size: 1.02rem;
        }

        .answer-secondary {
            margin-top: 0;
            max-width: 100%;
            font-size: 0.72rem;
            line-height: 1.18;
            font-weight: 600;
            opacity: 0.76;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .type4-answer-meta {
            display: grid;
            gap: 0.14rem;
            width: 100%;
        }

        .type4-answer-row {
            display: grid;
            grid-template-columns: 2.5rem minmax(0, 1fr);
            align-items: start;
            gap: 0.34rem;
            width: 100%;
            font-size: 0.73rem;
            line-height: 1.18;
        }

        .type4-answer-key {
            font-size: 0.66rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            opacity: 0.74;
        }

        .type4-answer-value {
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: thin;
            padding-bottom: 0.02rem;
        }

        .type4-answer-row-right .type4-answer-value {
            font-weight: 800;
        }

        .type4-answer-row-tried .type4-answer-value {
            font-weight: 700;
            opacity: 0.88;
        }

        .answer-seen-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 0.82rem;
            height: 0.82rem;
            padding: 0 0.18rem;
            border-radius: 999px;
            background: #fff;
            color: inherit;
            box-shadow: 0 1px 3px rgba(31, 45, 98, 0.16);
            font-size: 0.58rem;
            font-weight: 700;
            line-height: 1;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            pointer-events: none;
        }

        .answer-grid.compact .answer-seen-count-badge {
            position: absolute;
            top: -0.34rem;
            right: -0.3rem;
            z-index: 2;
        }

        .answer-report-link {
            margin-left: auto;
            white-space: nowrap;
            min-height: 26px;
            padding: 0 0.58rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            line-height: 1;
        }

        .answer-grid.compact .answer-report-link {
            min-height: 24px;
            padding: 0 0.46rem;
            font-size: 0.72rem;
        }

        .answer-grid.compact .answer-bar-track,
        .answer-grid.compact .meta {
            display: none;
        }

        .grade-row {
            margin-top: 0.45rem;
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .grade-btn {
            border: 1px solid #d5dcee;
            border-radius: var(--control-radius);
            background: #fff;
            color: #2f3c7e;
            font-size: 0.78rem;
            min-height: 26px;
            padding: 0 0.58rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            cursor: pointer;
        }

        .grade-btn.active-pass {
            background: #fff;
            border-color: #9dd6aa;
            color: #2f9e44;
        }

        .grade-btn.active-fail {
            background: #fff;
            border-color: #efb0a8;
            color: #d63636;
        }

        .grade-note {
            font-size: 0.74rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .grade-status {
            margin-top: 0.45rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            font-size: 0.78rem;
            border-radius: var(--control-radius);
            padding: 0 0.58rem;
            line-height: 1;
            background: #fff;
            border: 1px solid #d5dcee;
        }

        .answer-item .audio-play-btn,
        .answer-item .audio-speed-btn {
            height: 26px;
            min-height: 26px;
            padding: 0 0.58rem;
            font-size: 0.78rem;
        }

        .answer-item .audio-play-btn {
            min-width: 54px;
        }

        .answer-item .audio-speed-btn {
            min-width: 42px;
        }

        .answer-item .audio-progress {
            min-width: 0;
        }

        .answer-item .simple-audio-player {
            min-width: 0;
        }

        .grade-status.pass {
            color: #2f9e44;
            border-color: #9dd6aa;
        }

        .grade-status.fail {
            color: #d63636;
            border-color: #efb0a8;
        }

        @media (max-width: 760px) {
            .detail-grid { grid-template-columns: 1fr; }
            .answer-head-row {
                align-items: flex-start;
            }
            .answer-grid {
                grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            }
        }
    </style>
</head>
<body class="report-page">
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">Session Detail</h1>
            <a id="backBtn" href="/kid-report.html" class="back-btn btn-secondary">← Back</a>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <section class="summary-shell">
            <div class="summary-grid" id="summaryGrid"></div>
        </section>

        <div class="detail-grid">
            <section class="detail-card" id="wrongSection">
                <h2 class="section-title">Wrong Cards</h2>
                <div id="wrongList"></div>
            </section>
            <section class="detail-card" id="rightSection">
                <h2 class="section-title" id="rightSectionTitle">Right Cards</h2>
                <div id="rightList"></div>
            </section>
        </div>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="simple-audio-player.js"></script>
    <script src="lesson-reading-duration-backfill.js"></script>
    <script src="report-back-button-common.js"></script>
    <script src="kid-session-report.js"></script>
</body>
</html>
