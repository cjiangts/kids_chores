<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Session Detail - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <link rel="stylesheet" href="histogram-distribution-common.css">
    <link rel="stylesheet" href="audio-history-common.css">
    <link rel="stylesheet" href="report-hero-action.css">
    <link rel="stylesheet" href="report-hero-meta.css">
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        .section-title {
            margin: 0 0 var(--card-section-title-margin-bottom) 0;
        }

        .session-summary-card {
            background: var(--section-surface-bg);
            border: 1px solid var(--section-surface-border);
            border-radius: var(--section-surface-radius);
            padding: var(--section-surface-padding);
            box-shadow: var(--section-surface-shadow);
        }

        .session-summary-counters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem 0;
            margin-top: 0.9rem;
            padding-top: 0.8rem;
            border-top: 1px solid #eceffa;
            justify-content: center;
            font-size: 0.82rem;
            font-weight: 600;
            color: #4a5688;
        }

        .session-summary-counter {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0 0.85rem;
            border-left: 1px solid #d8dde9;
        }

        .session-summary-counter:first-child {
            border-left: none;
            padding-left: 0;
        }

        .session-summary-counter:last-child {
            padding-right: 0;
        }

        .session-summary-counter svg {
            flex: 0 0 auto;
            width: 16px;
            height: 16px;
            stroke: currentColor;
        }

        .session-summary-counter.right { color: #2f9e5e; }
        .session-summary-counter.fixed { color: #b8860b; }
        .session-summary-counter.wrong { color: #c34a4a; }
        .session-summary-counter.passed { color: #2f9e5e; }
        .session-summary-counter.slow { color: #2563eb; }
        .session-summary-counter.drilled { color: #4a5688; }

        .session-summary-counter strong {
            color: #2f3c7e;
            font-weight: 800;
            font-size: 1rem;
        }

        .session-summary-hero {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            margin-bottom: 0.6rem;
        }

        .session-summary-hero-icon {
            flex: 0 0 auto;
            display: inline-flex;
            --subj-size: 44px;
        }

        .session-summary-hero-text {
            flex: 1 1 auto;
            min-width: 0;
        }

        @media (max-width: 480px) {
            .session-summary-hero {
                gap: 0.6rem;
                margin-bottom: 0.5rem;
            }

            .session-summary-hero-icon {
                --subj-size: 36px;
            }
        }

        .session-summary-drill-outcomes {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.42rem;
            margin-top: 0.42rem;
        }

        .session-summary-drill-outcomes.columns-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .session-summary-drill-outcomes.columns-5 {
            grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .session-summary-drill-outcome {
            position: relative;
            min-width: 0;
            background: #eef0f8;
            border-radius: 10px;
            padding: 0.4rem 0.45rem;
            display: flex;
            flex-direction: column;
            gap: 0.12rem;
        }

        .session-summary-drill-outcome-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            background: rgba(255, 255, 255, 0.7);
            color: #5b6787;
        }

        .session-summary-drill-outcome-icon svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            display: block;
        }

        .session-summary-drill-outcome-value {
            font-size: 1.05rem;
            line-height: 1.1;
            font-weight: 700;
            color: #2f3c7e;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-summary-drill-outcome-label {
            min-width: 0;
            font-size: 0.7rem;
            line-height: 1.15;
            color: #5b6787;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-summary-drill-outcome.passed,
        .session-summary-drill-outcome.right { background: #e6f8ea; }
        .session-summary-drill-outcome.passed .session-summary-drill-outcome-icon,
        .session-summary-drill-outcome.right .session-summary-drill-outcome-icon { background: rgba(255, 255, 255, 0.85); color: #2f9e44; }
        .session-summary-drill-outcome.fixed { background: #fff5dc; }
        .session-summary-drill-outcome.fixed .session-summary-drill-outcome-icon { background: rgba(255, 255, 255, 0.85); color: #b07a00; }
        .session-summary-drill-outcome.slow { background: #e6f0ff; }
        .session-summary-drill-outcome.slow .session-summary-drill-outcome-icon { background: rgba(255, 255, 255, 0.85); color: #2563eb; }
        .session-summary-drill-outcome.wrong { background: #fdeaea; }
        .session-summary-drill-outcome.wrong .session-summary-drill-outcome-icon { background: rgba(255, 255, 255, 0.85); color: #d63636; }
        .session-summary-drill-outcome.pending { background: #e0f2fe; }
        .session-summary-drill-outcome.pending .session-summary-drill-outcome-icon { background: rgba(255, 255, 255, 0.85); color: #0369a1; }

        @media (max-width: 720px) {
            .session-summary-card {
                padding: var(--section-surface-padding-mobile);
            }

            .session-summary-drill-outcomes {
                margin-top: 0.34rem;
                gap: 0.34rem;
            }

            .session-summary-drill-outcome {
                padding: 0.34rem 0.38rem;
            }

            .session-summary-drill-outcome-value {
                font-size: 0.96rem;
            }

            .session-summary-drill-outcome-label {
                font-size: 0.66rem;
            }
        }

        @media (max-width: 480px) {
            .session-summary-card {
                padding: var(--section-surface-padding-mobile);
            }
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 0.55rem;
        }

        .answer-grid.compact {
            display: flex;
            flex-wrap: wrap;
            gap: 0.42rem;
        }

        .answer-item {
            position: relative;
            border: 1px solid #eceff6;
            border-radius: 12px;
            background: var(--dashboard-chip-bg);
            box-shadow: var(--dashboard-chip-shadow);
            padding: 0.6rem 0.7rem 0.6rem 1rem;
            margin-bottom: 0.45rem;
            font-size: 0.88rem;
            color: #333;
        }

        :not(.answer-grid.compact) > .answer-item::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            border-radius: 2px;
            background: var(--row-tone-color, transparent);
            pointer-events: none;
        }

        :not(.answer-grid.compact) > .answer-item.right { --row-tone-color: #4cb780; }
        :not(.answer-grid.compact) > .answer-item.fixed { --row-tone-color: #e0ac2b; }
        :not(.answer-grid.compact) > .answer-item.half { --row-tone-color: #8b6fc0; }
        :not(.answer-grid.compact) > .answer-item.wrong { --row-tone-color: #d95b5b; }
        :not(.answer-grid.compact) > .answer-item.pending { --row-tone-color: #b0b8cc; }

        .answer-grid.compact .answer-item {
            margin-bottom: 0;
            display: inline-flex;
            align-items: center;
            padding: 0.42rem 0.8rem;
            min-height: 0;
            width: auto;
            max-width: min(100%, 220px);
            border-radius: 999px;
            position: relative;
        }

        .answer-grid.compact a.answer-item {
            display: inline-flex;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .answer-grid.compact a.answer-item:hover {
            transform: translateY(-1px);
        }

        .answer-grid.compact a.answer-item:focus-visible {
            outline: 2px solid #7c96e8;
            outline-offset: 2px;
        }

        .answer-grid.compact .answer-item.wrong {
            border-color: #efb6b6;
            background: #fff2f2;
            color: #8f2e2e;
            box-shadow: 0 4px 10px rgba(217, 91, 91, 0.1);
        }

        .answer-grid.compact .answer-item.right {
            border-color: #b7e2c7;
            background: #eefaf2;
            color: #21633f;
            box-shadow: 0 4px 10px rgba(76, 183, 128, 0.1);
        }

        .answer-grid.compact .answer-item.fixed {
            border-color: #efd489;
            background: #fff7df;
            color: #8b6208;
            box-shadow: 0 4px 10px rgba(234, 178, 47, 0.12);
        }

        .answer-grid.compact .answer-item.half {
            border-color: #c4b5e0;
            background: #f3eeff;
            color: #5b3e99;
            box-shadow: 0 4px 10px rgba(127, 90, 200, 0.1);
        }

        .answer-grid.compact .answer-item.pending {
            border-color: #f2d18b;
            background: #fff7e6;
            color: #8b5f08;
        }

        .answer-bar-track {
            width: 100%;
            height: 8px;
            background: #eef2fb;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 0.35rem;
        }

        .answer-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: #4f83ff;
        }

        .answer-bar-fill.wrong {
            background: #d95b5b;
        }

        .answer-bar-fill.right {
            background: #4cb780;
        }

        .answer-bar-fill.fixed {
            background: #e0ac2b;
        }

        .answer-bar-fill.half {
            background: #8b6fc0;
        }

        .answer-bar-fill.pending {
            background: #f3b43f;
        }

        .card-color-legend {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .legend-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 2px;
            vertical-align: middle;
        }

        .legend-dot.right { background: #4cb780; }
        .legend-dot.half { background: #8b6fc0; }
        .legend-dot.fixed { background: #e0ac2b; }
        .legend-dot.wrong { background: #d95b5b; }
        .legend-dot.pending { background: #c0c8d8; }

        .legend-sep {
            color: #ccc;
            margin: 0 0.1rem;
        }

        .answer-item .meta {
            margin-top: 0.25rem;
            color: #666;
            font-size: 0.78rem;
        }

        .answer-head-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .answer-head-actions {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.38rem;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .answer-label {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .answer-label.chinese-specific {
            font-family: var(--font-kaiti);
            font-weight: 400;
        }

        .answer-grid.compact .answer-head-row {
            display: block;
        }

        .answer-grid.compact .answer-label {
            display: block;
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.08;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .answer-grid.compact .answer-label.chinese-specific {
            font-weight: 400;
            font-size: 1.18rem;
            line-height: 1.04;
        }

        .answer-secondary {
            margin-top: 0;
            max-width: 100%;
            font-size: 0.72rem;
            line-height: 1.18;
            font-weight: 600;
            opacity: 0.76;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .answer-type3-details {
            margin-top: 0.35rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.2rem 0.32rem;
        }

        .answer-type3-back {
            color: #33406f;
            font-size: 0.82rem;
            line-height: 1.25;
            font-weight: 500;
            white-space: nowrap;
            overflow-wrap: anywhere;
        }

        .answer-type3-sep {
            color: #a2abc6;
            font-size: 0.74rem;
            line-height: 1;
        }

        .answer-type3-source {
            color: #6a7596;
            font-size: 0.76rem;
            line-height: 1.25;
            font-weight: 600;
        }

        .answer-seen-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 0.82rem;
            height: 0.82rem;
            padding: 0 0.18rem;
            border-radius: 999px;
            background: #fff;
            color: inherit;
            box-shadow: 0 1px 3px rgba(31, 45, 98, 0.16);
            font-size: 0.58rem;
            font-weight: 700;
            line-height: 1;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            pointer-events: none;
        }

        .answer-compact-seen-badge {
            position: absolute;
            top: -0.34rem;
            right: -0.3rem;
            display: inline-flex;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .answer-compact-audio-badge {
            position: absolute;
            right: -0.3rem;
            bottom: -0.34rem;
            display: inline-flex;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .answer-audio-assist-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1rem;
            height: 1rem;
            padding: 0;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.96);
            color: inherit;
            box-shadow: 0 1px 3px rgba(31, 45, 98, 0.16);
            flex: 0 0 auto;
        }

        .answer-audio-assist-badge svg {
            display: block;
        }

        .answer-grid.compact .answer-seen-count-badge {
            position: static;
        }

        .answer-grid.compact .answer-audio-assist-badge {
            min-width: 0.92rem;
            height: 0.92rem;
        }

        .answer-report-link {
            margin-left: auto;
            white-space: nowrap;
            min-height: 26px;
            padding: 0 0.58rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            line-height: 1;
        }

        .answer-grid.compact .answer-report-link {
            min-height: 24px;
            padding: 0 0.46rem;
            font-size: 0.72rem;
        }

        .answer-grid.compact .answer-bar-track,
        .answer-grid.compact .meta {
            display: none;
        }

        .grade-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .grade-btn[data-grade="pass"] {
            background: #e6f7ec;
            border-color: #4caf6c;
            color: #1f7a3a;
        }

        .grade-btn[data-grade="pass"]:hover {
            background: #cdedd6;
            border-color: #2f9e44;
            box-shadow: 0 2px 6px rgba(47, 158, 68, 0.22);
        }

        .grade-btn[data-grade="fail"] {
            background: #fdecea;
            border-color: #e07a70;
            color: #b3261e;
        }

        .grade-btn[data-grade="fail"]:hover {
            background: #f9d7d2;
            border-color: #d63636;
            box-shadow: 0 2px 6px rgba(214, 54, 54, 0.22);
        }

        .grade-btn[data-grade="clear"] {
            background: #fff8e1;
            border-color: #d8b465;
            color: #8a5a00;
        }

        .grade-btn[data-grade="clear"]:hover {
            background: #fceeb8;
            border-color: #b88a2a;
            box-shadow: 0 2px 6px rgba(184, 138, 42, 0.22);
        }

        .grade-btn.active-pass {
            border-color: #4caf6c;
            color: #1f7a3a;
        }

        .grade-btn.active-fail {
            border-color: #e07a70;
            color: #b3261e;
        }

        .speed-distribution-section {
            margin-bottom: 0;
        }

        .speed-distribution-section .cards-distribution-card {
            box-shadow: none;
            border: none;
            padding: 0;
            background: transparent;
        }

        .speed-distribution-section .cards-distribution-card-head {
            margin-bottom: 0.5rem;
        }

        .speed-distribution-section .cards-distribution-card-title {
            display: none;
        }

        .grade-note {
            font-size: 0.74rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .answer-item .audio-play-btn,
        .answer-item .audio-speed-btn {
            height: 32px;
            min-height: 32px;
            padding: 0 0.58rem;
            font-size: 0.8rem;
        }

        .answer-item .audio-play-btn {
            min-width: 56px;
        }

        .answer-item .audio-speed-btn {
            min-width: 44px;
        }

        .answer-item .audio-progress {
            min-width: 0;
        }

        @media (max-width: 760px) {
            .answer-head-row {
                align-items: flex-start;
            }

            .answer-head-actions {
                gap: 0.28rem;
            }

            .answer-type3-details {
                margin-top: 0.28rem;
            }

            .answer-type3-back {
                font-size: 0.76rem;
                line-height: 1.2;
            }

            .answer-type3-source {
                font-size: 0.7rem;
            }

            .answer-type3-sep {
                font-size: 0.68rem;
            }

            .answer-grid {
                grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            }

            .answer-compact-seen-badge {
                top: -0.18rem;
                right: -0.18rem;
            }

            .answer-compact-audio-badge {
                right: -0.18rem;
                bottom: -0.18rem;
            }

            .answer-grid.compact .answer-seen-count-badge {
                min-width: 0.54rem;
                height: 0.54rem;
                padding: 0 0.08rem;
                font-size: 0.42rem;
            }

            .answer-grid.compact .answer-audio-assist-badge {
                min-width: 0.68rem;
                height: 0.68rem;
            }
        }

        .section-hint {
            margin: 0 0 0.6rem;
            color: #7a86ad;
            font-size: 0.84rem;
        }

        .drill-card-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 4.6rem;
            padding: 0.4rem 0.95rem;
            border-radius: 999px;
            border: 1px solid transparent;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            position: relative;
            line-height: 1.2;
        }

        .drill-card-pill.outcome-passed {
            background: #e8f5ec;
            color: #1f9d5f;
            border-color: #cfe9d6;
            box-shadow: 0 4px 10px rgba(31, 157, 95, 0.12);
        }

        .drill-card-pill.outcome-fixed {
            background: #fff7df;
            color: #d59a00;
            border-color: #f0dfae;
            box-shadow: 0 4px 10px rgba(213, 154, 0, 0.12);
        }

        .drill-card-pill.outcome-slow {
            background: #ebf3ff;
            color: #2563eb;
            border-color: #bfd4ff;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.12);
        }

        .drill-card-pill.outcome-wrong {
            background: #ffe8e8;
            color: #ef4444;
            border-color: #f6bcbc;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.12);
        }

        .drill-card-attempt-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            min-width: 1.1rem;
            height: 1.1rem;
            padding: 0 0.32rem;
            border-radius: 999px;
            background: #fff;
            color: #4a5688;
            font-size: 0.68rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d9deec;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        }

        .drill-progress-cutoff {
            font-size: 0.85rem;
            color: #6b7299;
            margin-bottom: 0.5rem;
        }

        .drill-progress-list {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .drill-progress-row {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.6rem 0.5rem 1rem;
            background: var(--dashboard-chip-bg);
            box-shadow: var(--dashboard-chip-shadow);
            border: 1px solid #eceff6;
            border-radius: 12px;
        }

        .drill-progress-row-label {
            flex: 0 0 auto;
            font-weight: 700;
            font-size: 0.84rem;
            line-height: 1.1;
            color: #333;
            white-space: nowrap;
        }

        .drill-progress-row-attempts {
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.35rem;
        }

        .drill-progress-row[class*="outcome-"]::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            border-radius: 2px;
            background: var(--row-tone-color, transparent);
            pointer-events: none;
        }

        .drill-progress-row.outcome-passed { --row-tone-color: #2f9e44; }
        .drill-progress-row.outcome-fixed { --row-tone-color: #b07a00; }
        .drill-progress-row.outcome-slow { --row-tone-color: #2563eb; }
        .drill-progress-row.outcome-wrong { --row-tone-color: #d63636; }

        .drill-progress-cell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 3.2rem;
            padding: 0.32rem 0.7rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.86rem;
            border: 1px solid transparent;
        }

        .drill-progress-cell.cell-fast {
            background: #e8f5ec;
            color: #2f9e5e;
            border-color: #cfe9d6;
        }

        .drill-progress-cell.cell-fixed {
            background: #fff7df;
            color: #d59a00;
            border-color: #f0dfae;
        }

        .drill-progress-cell.cell-slow {
            background: #ebf3ff;
            color: #2563eb;
            border-color: #bfd4ff;
        }

        .drill-progress-cell.cell-wrong {
            background: #ffe8e8;
            color: #ef4444;
            border-color: #f6bcbc;
        }

        .session-delete-row {
            margin-top: 1.4rem;
            display: flex;
            justify-content: center;
        }

        .session-delete-btn {
            background: transparent;
            border: none;
            color: #a0a8c0;
            font-size: 0.75rem;
            padding: 0.35rem 0.6rem;
            cursor: pointer;
            text-decoration: underline dotted;
            text-underline-offset: 3px;
        }

        .session-delete-btn:hover {
            color: #c34a4a;
        }

        .session-delete-btn:disabled {
            cursor: progress;
            opacity: 0.55;
        }

        @media (max-width: 600px) {
            .drill-progress-row {
                padding: 0.4rem 0.45rem 0.4rem 0.85rem;
                gap: 0.4rem;
            }

            .drill-progress-row-label {
                font-size: 0.76rem;
            }

            .drill-progress-row-attempts {
                gap: 0.3rem;
            }

            .drill-progress-cell {
                min-width: 0;
                padding: 0.26rem 0.5rem;
                font-size: 0.78rem;
            }

            .drill-card-pill {
                min-width: 3.6rem;
                padding: 0.35rem 0.75rem;
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body class="report-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1>
                    <span class="page-title-icon" aria-hidden="true">🕓</span>
                    <span id="pageTitle">Session Detail</span>
                </h1>
                <div class="page-header-actions" data-family-user-switcher></div>
            </div>
        </header>

        <div id="errorMessage" class="error hidden"></div>
        <section class="session-summary-card section-stack" id="summaryCard"></section>

        <div class="detail-grid">
            <section class="detail-card" id="wrongSection">
                <h2 class="section-title"><span class="icon" data-icon="circle-x" data-icon-size="22"></span> Wrong Cards</h2>
                <div id="wrongList"></div>
            </section>
            <section class="detail-card" id="rightSection">
                <h2 class="section-title"><span id="rightSectionIconHost"><span class="icon" data-icon="layers" data-icon-size="22"></span></span> <span id="rightSectionTitle">Cards Practiced</span></h2>
                <p class="section-hint" id="rightSectionHint" style="display:none;">Tap a card to view details. The small number on top shows how many times it was drilled.</p>
                <div id="rightList"></div>
            </section>
        </div>

        <section class="detail-card speed-distribution-section" id="speedDistributionSection" style="display:none;">
            <h2 class="section-title"><span class="icon" data-icon="bar-chart-3" data-icon-size="22"></span> Speed Distribution</h2>
            <div id="speedDistributionBody"></div>
        </section>

        <section class="detail-card drill-progress-section" id="drillProgressSection" style="display:none;">
            <h2 class="section-title"><span class="icon" data-icon="target" data-icon-size="22"></span> Card Progress</h2>
            <div id="drillProgressBody"></div>
        </section>

        <div class="session-delete-row">
            <button id="deleteSessionBtn" type="button" class="session-delete-btn" hidden>Delete this session</button>
        </div>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="icons.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="subject-icons.js"></script>
    <script src="simple-audio-player.js"></script>
    <script src="lesson-reading-duration-backfill.js"></script>
    <script src="histogram-distribution-common.js"></script>
    <script src="audio-history-common.js"></script>
    <script src="report-hero-action-common.js"></script>
    <script src="kid-session-report.js"></script>
</body>
</html>
