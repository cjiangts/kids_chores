<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kid Practice Report - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .daily-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.1rem;
            flex-wrap: wrap;
            margin-bottom: 0.35rem;
        }

        .daily-chart-header h2 {
            margin: 0;
        }

        .shared-report-table-wrap .daily-chart-header {
            padding: 0.8rem 0.8rem 0.4rem;
            margin-bottom: 0;
        }

        .report-page .header {
            align-items: flex-start;
            gap: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .report-page .header h1 {
            line-height: 1.05;
            text-shadow: 0 4px 14px rgba(31, 45, 98, 0.18);
        }

        .report-page .header .back-btn {
            background: rgba(255, 255, 255, 0.96);
            color: #5364cf;
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 14px;
            padding: 0.58rem 0.92rem;
            font-weight: 600;
            box-shadow: 0 10px 22px rgba(31, 45, 98, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.82);
        }

        .report-page .header .back-btn:hover {
            background: #ffffff;
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 12px 24px rgba(31, 45, 98, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.92);
        }

        .daily-chart-pager {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            width: 100%;
        }

        .daily-chart-page-label {
            flex: 1 1 auto;
            color: #2f3c7e;
            font-size: 0.82rem;
            font-weight: 600;
            line-height: 1.15;
            text-align: center;
        }

        .daily-chart-page-btn {
            border: 0;
            background: transparent;
            color: #2f3c7e;
            font-size: 1.4rem;
            line-height: 1;
            font-weight: 400;
            padding: 0.2rem 0.5rem;
            cursor: pointer;
            border-radius: 6px;
        }

        .daily-chart-page-btn:hover:not(:disabled) {
            background: rgba(47, 60, 126, 0.08);
        }

        .daily-chart-page-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

.daily-vbar-chart {
            display: flex;
            align-items: stretch;
            gap: 0.4rem;
        }

        .daily-vbar-col {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .daily-vbar-plot {
            height: 200px;
            padding-top: 1.1rem;
            display: flex;
            justify-content: center;
            gap: 4px;
            box-sizing: border-box;
        }

        .daily-vbar-bar-wrap {
            position: relative;
            flex: 1 1 0;
            min-width: 0;
            max-width: 36px;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .daily-vbar-bar-wrap-single {
            max-width: 46px;
        }

        .daily-vbar-total {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -3px);
            font-size: 0.72rem;
            color: #34406f;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
        }

        .daily-vbar-bar {
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            background: #eef2fb;
            min-height: 2px;
        }

        .daily-vbar-seg {
            width: 100%;
        }

        .daily-vbar-date {
            margin-top: 0.4rem;
            font-size: 0.7rem;
            color: #34406f;
            text-align: center;
            line-height: 1.2;
        }

        .daily-vbar-date-weekday {
            font-weight: 600;
        }

        .daily-vbar-date-md {
            color: #6b7299;
        }

        @media (max-width: 540px) {
            .daily-vbar-chart {
                gap: 0.25rem;
            }
            .daily-vbar-plot {
                height: 160px;
            }
            .daily-vbar-bar-wrap {
                max-width: 14px;
            }

            .daily-vbar-bar-wrap-single {
                max-width: 18px;
            }

            .daily-vbar-total {
                font-size: 0.65rem;
            }
            .daily-vbar-date {
                font-size: 0.62rem;
            }
        }

        .daily-chart-wrap {
            margin-bottom: 1.2rem;
        }

        .daily-chart-wrap h2 {
            font-size: 0.82rem;
            font-weight: 600;
            color: #666;
        }

        .daily-chart-legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.85rem;
            margin: 0.45rem 0 0.4rem;
            font-size: 0.75rem;
            color: #34406f;
        }

        .daily-chart-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .daily-chart-legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
        }

        .daily-chart-legend-prefix {
            color: #6b7299;
            font-weight: 600;
        }

        .daily-chart-status {
            color: #666;
            font-size: 0.85rem;
            padding: 1rem 0.4rem;
            text-align: center;
        }

        .sessions-shell {
            background: var(--dashboard-panel-bg, rgba(255, 255, 255, 0.92));
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 14px;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
            padding: 0.85rem 0.85rem 1rem;
        }

        .sessions-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .day-group + .day-group {
            border-top: 1px solid #eef0f6;
            padding-top: 0.6rem;
        }

        .day-group-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.2rem 0.5rem;
        }

        .day-group-title {
            flex: 1 1 auto;
            font-size: 0.95rem;
            font-weight: 700;
            color: #2f3c7e;
        }

        .day-group-summary {
            font-size: 0.78rem;
            color: #666;
            white-space: nowrap;
        }

        .day-group-toggle {
            border: 0;
            background: transparent;
            color: #2f3c7e;
            font-size: 1.05rem;
            line-height: 1;
            padding: 0.25rem 0.4rem;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.15s, background 0.15s;
        }

        .day-group-toggle:hover {
            background: rgba(47, 60, 126, 0.08);
        }

        .day-group.collapsed .day-group-toggle {
            transform: rotate(180deg);
        }

        .day-group.collapsed .day-group-body {
            display: none;
        }

        .day-group-body {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .session-card {
            display: grid;
            grid-template-columns: 56px minmax(0, 1fr) auto 14px;
            align-items: center;
            gap: 0.7rem;
            padding: 0.7rem 0.85rem;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 1px 2px rgba(31, 45, 98, 0.05);
            text-decoration: none;
            color: inherit;
        }

        .session-card:hover {
            box-shadow: 0 3px 10px rgba(31, 45, 98, 0.12);
        }

        .session-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            line-height: 1;
        }

        .session-info {
            min-width: 0;
        }

        .session-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #2f3c7e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-sub {
            font-size: 0.78rem;
            color: #6b7299;
            margin-top: 0.2rem;
        }

        .session-stats {
            text-align: right;
        }

        .session-mins {
            font-size: 1.05rem;
            font-weight: 700;
            color: #2f3c7e;
        }

        .session-mins-unit {
            font-size: 0.74rem;
            font-weight: 500;
            color: #6b7299;
            margin-left: 0.15rem;
        }

        .session-result {
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 0.18rem;
        }

        .session-retries {
            font-size: 0.74rem;
            color: #8a8fa8;
            margin-top: 0.12rem;
        }

        .session-chevron {
            color: #c4c9d7;
            font-size: 1.1rem;
            line-height: 1;
            text-align: right;
        }

        .sessions-empty {
            color: #666;
            font-size: 0.85rem;
            padding: 1rem 0.4rem;
            text-align: center;
        }

        @media (max-width: 540px) {
            .session-card {
                grid-template-columns: 44px minmax(0, 1fr) auto 12px;
                padding: 0.55rem 0.6rem;
                gap: 0.55rem;
            }
            .session-icon {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                font-size: 1.35rem;
            }
            .session-title { font-size: 0.88rem; }
            .session-sub { font-size: 0.72rem; }
            .session-mins { font-size: 0.95rem; }
            .session-result { font-size: 0.76rem; }
            .session-retries { font-size: 0.7rem; }
        }

        .report-category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-bottom: 0.8rem;
        }

        .report-category-filter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.42);
            border-radius: 999px;
            padding: 0.42rem 1rem;
            min-height: 36px;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: rgba(255, 255, 255, 0.92);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 8px 18px rgba(31, 45, 98, 0.1);
            transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s, box-shadow 0.18s;
        }

        .report-category-filter-btn:hover {
            background: rgba(255, 255, 255, 0.24);
            border-color: rgba(255, 255, 255, 0.58);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24), 0 10px 20px rgba(31, 45, 98, 0.14);
        }

        .report-category-filter-btn:active {
            transform: scale(0.97);
        }

        .report-category-filter-btn.active {
            background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
            color: #32418d;
            border-color: rgba(255, 255, 255, 0.92);
            box-shadow: 0 8px 20px rgba(31, 45, 98, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.94);
        }

        .report-page .summary-card-full {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.75rem;
            align-items: center;
            text-align: center;
        }

        .report-page .summary-grid {
            grid-template-columns: 1fr;
            gap: 0;
        }

        .report-page .summary-toggle-group {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.34rem;
            padding: 0.34rem;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.32);
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 14px 30px rgba(31, 45, 98, 0.14);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .report-page .summary-toggle-group-single {
            grid-template-columns: 1fr;
        }

        .report-page .summary-toggle-card {
            appearance: none;
            border: 1px solid transparent;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.62);
            padding: 0.84rem 0.9rem 0.9rem;
            text-align: left;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 0.72rem;
            cursor: pointer;
            min-width: 0;
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s, background 0.18s, color 0.18s;
        }

        .report-page .summary-toggle-card:hover {
            background: rgba(255, 255, 255, 0.76);
        }

        .report-page .summary-toggle-card:focus-visible {
            outline: 3px solid rgba(82, 102, 210, 0.26);
            outline-offset: 2px;
        }

        .report-page .summary-toggle-card.active {
            background: linear-gradient(180deg, #5368dd 0%, #4056c9 100%);
            border-color: rgba(255, 255, 255, 0.38);
            box-shadow: 0 14px 24px rgba(49, 67, 160, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.16);
        }

        .report-page .summary-toggle-card-title {
            color: #2f3c7e;
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1.1;
            white-space: nowrap;
        }

        .report-page .summary-toggle-card.active .summary-toggle-card-title {
            color: #ffffff;
        }

        .report-page .summary-toggle-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.6rem;
        }

        .report-page .summary-toggle-metric-label {
            color: #6b7299;
            font-size: 0.68rem;
            font-weight: 600;
            line-height: 1.2;
            white-space: nowrap;
        }

        .report-page .summary-toggle-metric-value {
            color: #2f3c7e;
            font-size: 1.08rem;
            font-weight: 700;
            margin-top: 0.14rem;
            white-space: nowrap;
        }

        .report-page .summary-toggle-card.active .summary-toggle-metric-label,
        .report-page .summary-toggle-card.active .summary-toggle-metric-value {
            color: rgba(255, 255, 255, 0.98);
        }

        .cards-view-shell {
            padding: 1.05rem;
        }

        .cards-distribution-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }

        .daily-progress-card {
            margin-bottom: 0.8rem;
        }

        .daily-progress-card .cards-distribution-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .daily-progress-legend {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            font-size: 0.74rem;
            color: #4a5688;
            font-weight: 600;
        }

        .daily-progress-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.32rem;
        }

        .daily-progress-legend-swatch {
            width: 0.85rem;
            height: 0.18rem;
            border-radius: 2px;
            background: #2f66e6;
        }

        .daily-progress-legend-item.learned .daily-progress-legend-swatch {
            background: #16a34a;
        }

        .daily-progress-chart {
            position: relative;
            height: 13.5rem;
            padding-left: 2.6rem;
            padding-bottom: 1.8rem;
        }

        .daily-progress-y-label {
            position: absolute;
            left: 0;
            top: 0;
            color: #4a5688;
            font-size: 0.74rem;
            font-weight: 700;
        }

        .daily-progress-y-axis {
            position: absolute;
            left: 0;
            top: 1.4rem;
            bottom: 1.8rem;
            width: 2.2rem;
        }

        .daily-progress-y-tick {
            position: absolute;
            right: 0.35rem;
            transform: translateY(50%);
            color: #7480a9;
            font-size: 0.66rem;
            font-weight: 600;
            line-height: 1;
        }

        .daily-progress-plot {
            position: absolute;
            left: 2.6rem;
            right: 0.4rem;
            top: 1.4rem;
            bottom: 1.8rem;
        }

        .daily-progress-grid {
            position: absolute;
            inset: 0;
        }

        .daily-progress-grid-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px dashed #e7ebf7;
        }

        .daily-progress-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .daily-progress-line {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            vector-effect: non-scaling-stroke;
        }

        .daily-progress-line.practiced {
            stroke: #2f66e6;
        }

        .daily-progress-line.learned {
            stroke: #16a34a;
        }

        .daily-progress-x-axis {
            position: absolute;
            left: 0;
            right: 0;
            top: 100%;
            margin-top: 0.32rem;
            height: 1.1rem;
        }

        .daily-progress-x-tick {
            position: absolute;
            transform: translateX(-50%);
            color: #5b6787;
            font-size: 0.66rem;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
        }

        .cards-distribution-card {
            border: 1px solid #e6ebf7;
            border-radius: 14px;
            background: #fdfdff;
            padding: 0.9rem;
            box-shadow: 0 8px 18px rgba(31, 45, 98, 0.08);
        }

        .cards-distribution-card-head {
            margin-bottom: 0.7rem;
        }

        .cards-distribution-card-title {
            color: #2f3c7e;
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.15;
        }

        .cards-distribution-body {
            display: flex;
            gap: 1rem;
            align-items: stretch;
        }

        .cards-distribution-chart {
            position: relative;
            height: 15.8rem;
            padding-left: 2.6rem;
            flex: 1 1 auto;
            min-width: 0;
        }

        .cards-distribution-sidebar {
            flex: 0 0 13rem;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            min-width: 0;
        }

        .cards-distribution-toplist {
            display: flex;
            flex-direction: column;
            gap: 0.28rem;
        }

        .cards-distribution-toplist + .cards-distribution-toplist {
            border-top: 1px solid #eef0f8;
            padding-top: 0.55rem;
        }

        .cards-distribution-toplist-title {
            color: #5b6787;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .cards-distribution-toplist-items {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .cards-distribution-toplist-row {
            display: block;
            min-width: 0;
        }

        .cards-distribution-toplist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            padding: 0.32rem 0.7rem;
            border-radius: 999px;
            background: #f1f3fb;
            border: 1px solid #e3e7f4;
            color: #2f3c7e;
            font-size: 0.78rem;
            line-height: 1.2;
            text-decoration: none;
            transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.05s ease, box-shadow 0.15s ease;
            cursor: default;
        }

        a.cards-distribution-toplist-item {
            cursor: pointer;
        }

        a.cards-distribution-toplist-item:hover {
            background: #e6ebff;
            border-color: #c8d2f5;
            box-shadow: 0 1px 2px rgba(47, 60, 126, 0.08);
        }

        a.cards-distribution-toplist-item:active {
            transform: translateY(1px);
            background: #d9e1ff;
        }

        a.cards-distribution-toplist-item:focus-visible {
            outline: 2px solid #5b6ed8;
            outline-offset: 2px;
        }

        .cards-distribution-toplist-front {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
        }

        .cards-distribution-toplist-value {
            flex: 0 0 auto;
            color: #6b7299;
            font-weight: 700;
            font-size: 0.72rem;
            font-variant-numeric: tabular-nums;
        }

        .cards-distribution-y-label {
            position: absolute;
            left: 0;
            top: 0;
            color: #4a5688;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .cards-distribution-y-axis {
            position: absolute;
            left: 0;
            top: 3.15rem;
            bottom: 2.6rem;
            width: 2.2rem;
        }

        .cards-distribution-y-tick {
            position: absolute;
            right: 0.35rem;
            transform: translateY(50%);
            color: #7480a9;
            font-size: 0.68rem;
            font-weight: 600;
            line-height: 1;
        }

        .cards-distribution-grid-layer {
            position: absolute;
            left: 2.6rem;
            right: 0;
            top: 3.15rem;
            bottom: 2.6rem;
        }

        .cards-distribution-grid-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px dashed #e7ebf7;
        }

        .cards-distribution-marker-layer {
            position: absolute;
            left: 2.6rem;
            right: 1.6rem;
            top: 0;
            bottom: 2.6rem;
            pointer-events: none;
            overflow: visible;
        }

        .cards-distribution-marker {
            position: absolute;
            top: 0;
            bottom: 0;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cards-distribution-marker-badge {
            min-width: 2.65rem;
            padding: 0.26rem 0.36rem 0.24rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(99, 122, 199, 0.18);
            box-shadow: 0 10px 20px rgba(31, 45, 98, 0.1);
            text-align: center;
        }

        .cards-distribution-marker-name {
            font-size: 0.62rem;
