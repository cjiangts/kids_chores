<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kid Practice Report - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .daily-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.1rem;
            flex-wrap: wrap;
            margin-bottom: 0.35rem;
        }

        .daily-chart-header h2 {
            margin: 0;
        }

        .shared-report-table-wrap .daily-chart-header {
            padding: 0.8rem 0.8rem 0.4rem;
            margin-bottom: 0;
        }

        .report-page .header {
            align-items: flex-start;
            gap: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .report-page .header h1 {
            line-height: 1.05;
            text-shadow: 0 4px 14px rgba(31, 45, 98, 0.18);
        }

        .report-page .header .back-btn {
            background: rgba(255, 255, 255, 0.96);
            color: #5364cf;
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 14px;
            padding: 0.58rem 0.92rem;
            font-weight: 600;
            box-shadow: 0 10px 22px rgba(31, 45, 98, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.82);
        }

        .report-page .header .back-btn:hover {
            background: #ffffff;
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 12px 24px rgba(31, 45, 98, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.92);
        }

        .daily-chart-pager {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            width: 100%;
        }

        .daily-chart-page-label {
            flex: 1 1 auto;
            color: #2f3c7e;
            font-size: 0.82rem;
            font-weight: 600;
            line-height: 1.15;
            text-align: center;
        }

        .daily-chart-page-btn {
            border: 0;
            background: transparent;
            color: #2f3c7e;
            font-size: 1.4rem;
            line-height: 1;
            font-weight: 400;
            padding: 0.2rem 0.5rem;
            cursor: pointer;
            border-radius: 6px;
        }

        .daily-chart-page-btn:hover:not(:disabled) {
            background: rgba(47, 60, 126, 0.08);
        }

        .daily-chart-page-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

.daily-vbar-chart {
            display: flex;
            align-items: stretch;
            gap: 0.4rem;
        }

        .daily-vbar-col {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .daily-vbar-col-clickable {
            cursor: pointer;
        }

        .daily-vbar-col-clickable:hover:not(.daily-vbar-col-selected) {
            background: rgba(47, 60, 126, 0.05);
        }

        .daily-vbar-col-selected {
            background: rgba(47, 60, 126, 0.1);
        }

        .daily-vbar-col-selected .daily-vbar-date-weekday {
            color: #1f2d62;
            font-weight: 700;
        }

        .daily-vbar-plot {
            height: 200px;
            padding-top: 1.1rem;
            display: flex;
            justify-content: center;
            gap: 4px;
            box-sizing: border-box;
        }

        .daily-vbar-bar-wrap {
            position: relative;
            flex: 1 1 0;
            min-width: 0;
            max-width: 36px;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .daily-vbar-bar-wrap-single {
            max-width: 46px;
        }

        .daily-vbar-total {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -3px);
            font-size: 0.72rem;
            color: #34406f;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
        }

        .daily-vbar-bar {
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            background: #eef2fb;
            min-height: 2px;
        }

        .daily-vbar-seg {
            width: 100%;
        }

        .daily-vbar-date {
            margin-top: 0.4rem;
            font-size: 0.7rem;
            color: #34406f;
            text-align: center;
            line-height: 1.2;
        }

        .daily-vbar-date-weekday {
            font-weight: 600;
        }

        .daily-vbar-date-md {
            color: #6b7299;
        }

        @media (max-width: 540px) {
            .daily-vbar-chart {
                gap: 0.25rem;
            }
            .daily-vbar-plot {
                height: 160px;
            }
            .daily-vbar-bar-wrap {
                max-width: 14px;
            }

            .daily-vbar-bar-wrap-single {
                max-width: 18px;
            }

            .daily-vbar-total {
                font-size: 0.65rem;
            }
            .daily-vbar-date {
                font-size: 0.62rem;
            }
        }

        .daily-chart-wrap {
            margin-bottom: 1.2rem;
        }

        .daily-chart-wrap h2 {
            font-size: 0.82rem;
            font-weight: 600;
            color: #666;
        }

        .daily-chart-legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.85rem;
            margin: 0.45rem 0 0.4rem;
            font-size: 0.75rem;
            color: #34406f;
        }

        .daily-chart-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .daily-chart-legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
        }

        .daily-chart-legend-prefix {
            color: #6b7299;
            font-weight: 600;
        }

        .daily-chart-status {
            color: #666;
            font-size: 0.85rem;
            padding: 1rem 0.4rem;
            text-align: center;
        }

        .sessions-shell {
            background: var(--dashboard-panel-bg, rgba(255, 255, 255, 0.92));
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 14px;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
            padding: 0.85rem 0.85rem 1rem;
        }

        .sessions-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .day-group + .day-group {
            border-top: 1px solid #eef0f6;
            padding-top: 0.6rem;
        }

        .day-group-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.2rem 0.5rem;
        }

        .day-group-title {
            flex: 1 1 auto;
            font-size: 0.95rem;
            font-weight: 700;
            color: #2f3c7e;
        }

        .day-group-summary {
            font-size: 0.78rem;
            color: #666;
            white-space: nowrap;
        }

        .day-group-toggle {
            border: 0;
            background: transparent;
            color: #2f3c7e;
            font-size: 1.05rem;
            line-height: 1;
            padding: 0.25rem 0.4rem;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.15s, background 0.15s;
        }

        .day-group-toggle:hover {
            background: rgba(47, 60, 126, 0.08);
        }

        .day-group.collapsed .day-group-toggle {
            transform: rotate(180deg);
        }

        .day-group.collapsed .day-group-body {
            display: none;
        }

        .day-group-body {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .session-card {
            display: grid;
            grid-template-columns: 56px minmax(0, 1fr) auto 14px;
            align-items: center;
            gap: 0.7rem;
            padding: 0.7rem 0.85rem;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 1px 2px rgba(31, 45, 98, 0.05);
            text-decoration: none;
            color: inherit;
        }

        .session-card:hover {
            box-shadow: 0 3px 10px rgba(31, 45, 98, 0.12);
        }

        .session-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            line-height: 1;
            background: transparent;
        }

        .session-info {
            min-width: 0;
        }

        .session-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #2f3c7e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-sub {
            font-size: 0.78rem;
            color: #6b7299;
            margin-top: 0.2rem;
        }

        .session-stats {
            text-align: right;
        }

        .session-mins {
            font-size: 1.05rem;
            font-weight: 700;
            color: #2f3c7e;
        }

        .session-mins-unit {
            font-size: 0.74rem;
            font-weight: 500;
            color: #6b7299;
            margin-left: 0.15rem;
        }

        .session-result {
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 0.18rem;
        }

        .session-retries {
            font-size: 0.74rem;
            color: #8a8fa8;
            margin-top: 0.12rem;
        }

        .session-chevron {
            color: #c4c9d7;
            font-size: 1.1rem;
            line-height: 1;
            text-align: right;
        }

        .sessions-empty {
            color: #666;
            font-size: 0.85rem;
            padding: 1rem 0.4rem;
            text-align: center;
        }

        @media (max-width: 540px) {
            .session-card {
                grid-template-columns: 44px minmax(0, 1fr) auto 12px;
                padding: 0.55rem 0.6rem;
                gap: 0.55rem;
            }
            .session-icon {
                width: 40px;
                height: 40px;
                font-size: 1.95rem;
            }
            .session-title { font-size: 0.88rem; }
            .session-sub { font-size: 0.72rem; }
            .session-mins { font-size: 0.95rem; }
            .session-result { font-size: 0.76rem; }
            .session-retries { font-size: 0.7rem; }
        }

        .kid-nav-group {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(0, 1fr);
            gap: 0.3rem;
            padding: 0.3rem;
            margin-bottom: 0.7rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: 0 10px 24px rgba(31, 45, 98, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(14px) saturate(140%);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
        }

        .kid-nav-group:empty,
        .kid-nav-group.hidden {
            display: none;
        }

        .kid-nav-card {
            appearance: none;
            border: 0;
            border-radius: 12px;
            background: transparent;
            padding: 0.6rem 0.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            color: rgba(255, 255, 255, 0.92);
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.1;
            cursor: pointer;
            min-width: 0;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.18s, color 0.18s, box-shadow 0.18s;
        }

        .kid-nav-card .kid-nav-card-icon {
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
            opacity: 0.85;
        }

        .kid-nav-card:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .kid-nav-card:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.28);
            outline-offset: 2px;
        }

        .kid-nav-card.active {
            background: #ffffff;
            color: #4f46e5;
            box-shadow: 0 6px 16px rgba(15, 20, 60, 0.22);
            cursor: default;
            font-weight: 700;
        }

        .kid-nav-card.active .kid-nav-card-icon {
            opacity: 1;
        }

        @media (max-width: 540px) {
            .kid-nav-group {
                gap: 0.22rem;
                padding: 0.22rem;
                margin-bottom: 0.6rem;
            }

            .kid-nav-card {
                padding: 0.5rem 0.6rem;
                font-size: 0.84rem;
                gap: 0.35rem;
            }

            .kid-nav-card .kid-nav-card-icon {
                width: 16px;
                height: 16px;
            }
        }

        .subject-filter-wrap {
            position: relative;
            margin-bottom: 0.6rem;
        }

        .subject-filter-trigger {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.6rem 0.85rem;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(31, 45, 98, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.82);
            cursor: pointer;
            font-size: 0.86rem;
            color: #2f3c7e;
            text-align: left;
            font-family: inherit;
            transition: box-shadow 0.18s;
        }
        .subject-filter-trigger:hover {
            box-shadow: 0 10px 22px rgba(31, 45, 98, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.92);
        }
        .subject-filter-trigger:focus-visible {
            outline: 3px solid rgba(82, 102, 210, 0.32);
            outline-offset: 2px;
        }
        .subject-filter-icon {
            width: 24px;
            height: 24px;
            border-radius: 7px;
            background: rgba(99, 102, 241, 0.14);
            color: #5368dd;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }
        .subject-filter-icon svg {
            width: 13px;
            height: 13px;
        }
        .subject-filter-divider {
            width: 1px;
            align-self: stretch;
            background: rgba(47, 60, 126, 0.12);
            margin: 0 0.05rem;
        }
        .subject-filter-label {
            color: #2f3c7e;
            font-weight: 500;
        }
        .subject-filter-value {
            flex: 1 1 auto;
            color: #5368dd;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .subject-filter-chevron {
            color: #6b7299;
            font-size: 0.85rem;
            line-height: 1;
            flex: 0 0 auto;
            transition: transform 0.18s;
        }
        .subject-filter-wrap.open .subject-filter-chevron {
            transform: rotate(180deg);
        }
        .subject-filter-menu {
            position: absolute;
            top: calc(100% + 0.4rem);
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 18px 38px rgba(31, 45, 98, 0.24);
            padding: 0.35rem;
            z-index: 50;
            max-height: 340px;
            overflow-y: auto;
            display: none;
        }
        .subject-filter-wrap.open .subject-filter-menu {
            display: block;
        }
        .subject-filter-option {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            width: 100%;
            padding: 0.6rem 0.7rem;
            background: transparent;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.92rem;
            color: #2f3c7e;
            text-align: left;
            font-weight: 500;
            font-family: inherit;
        }
        .subject-filter-option:hover {
            background: rgba(99, 102, 241, 0.08);
        }
        .subject-filter-option.active {
            background: rgba(99, 102, 241, 0.12);
            color: #5368dd;
            font-weight: 700;
        }
        .subject-filter-option-icon {
            width: 22px;
            height: 22px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .subject-filter-option-label {
            flex: 1 1 auto;
        }
        .subject-filter-option-check {
            color: #5368dd;
            flex: 0 0 auto;
        }

        .summary-stats-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
            margin-bottom: 0.85rem;
        }
        .summary-stat-card {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 12px;
            padding: 0.6rem 0.7rem;
            box-shadow: 0 8px 18px rgba(31, 45, 98, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.82);
            min-width: 0;
        }
        .summary-stat-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }
        .summary-stat-icon svg {
            width: 17px;
            height: 17px;
        }
        .summary-stat-icon-purple {
            background: rgba(139, 92, 246, 0.16);
            color: #8b5cf6;
        }
        .summary-stat-icon-green {
            background: rgba(16, 185, 129, 0.18);
            color: #10b981;
        }
        .summary-stat-body {
            min-width: 0;
        }
        .summary-stat-label {
            font-size: 0.7rem;
            color: #6b7299;
            font-weight: 500;
            line-height: 1.2;
        }
        .summary-stat-value {
            font-size: 1.18rem;
            font-weight: 700;
            color: #2f3c7e;
            margin-top: 0.1rem;
            line-height: 1.1;
        }

        .sessions-shell-title {
            margin: 0 0 0.7rem;
            font-size: 1.05rem;
            font-weight: 700;
            color: #2f3c7e;
        }

        @media (max-width: 540px) {
            .report-page .header {
                gap: 0.55rem;
                margin-bottom: 0.65rem;
            }

            .report-page .header .back-btn {
                padding: 0.5rem 0.78rem;
                border-radius: 12px;
            }

            .subject-filter-trigger {
                padding: 0.52rem 0.7rem;
                gap: 0.5rem;
                font-size: 0.8rem;
                border-radius: 11px;
            }
            .subject-filter-icon {
                width: 22px;
                height: 22px;
                border-radius: 7px;
            }
            .subject-filter-icon svg {
                width: 12px;
                height: 12px;
            }
            .subject-filter-menu {
                border-radius: 11px;
            }
            .subject-filter-option {
                padding: 0.5rem 0.55rem;
                font-size: 0.82rem;
            }

            .summary-stats-row {
                gap: 0.45rem;
                margin-bottom: 0.7rem;
            }
            .summary-stat-card {
                padding: 0.5rem 0.6rem;
                gap: 0.5rem;
                border-radius: 11px;
            }
            .summary-stat-icon {
                width: 30px;
                height: 30px;
            }
            .summary-stat-icon svg {
                width: 15px;
                height: 15px;
            }
            .summary-stat-label {
                font-size: 0.64rem;
            }
            .summary-stat-value {
                font-size: 1.02rem;
            }
            .sessions-shell-title {
                font-size: 0.98rem;
                margin-bottom: 0.55rem;
            }
        }

        .type-reading {
            background: #e7f0ff;
            color: #2f5aa8;
        }

        .type-writing {
            background: #fff3e8;
            color: #9a5b00;
        }

        .type-lesson-reading {
            background: #efe8ff;
            color: #5f3aa6;
        }
    </style>
</head>
<body class="report-page">
    <div class="container">
        <header class="page-header-with-back">
            <div class="page-header-row">
                <h1>
                    <svg class="icon page-title-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                    <span id="reportTitle">Practice Report</span>
                </h1>
                <a id="backBtn" href="/admin.html" class="back-btn btn-secondary page-header-back-btn"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back</a>
            </div>
        </header>

        <div id="errorMessage" class="error hidden"></div>

        <div class="kid-nav-group hidden" id="kidNavGroup" role="tablist" aria-label="Kids"></div>

        <div class="subject-filter-wrap" id="subjectFilterWrap">
            <button type="button" class="subject-filter-trigger" id="subjectFilterTrigger" aria-haspopup="listbox" aria-expanded="false">
                <span class="subject-filter-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                    </svg>
                </span>
                <span class="subject-filter-divider" aria-hidden="true"></span>
                <span class="subject-filter-label">Subject:</span>
                <span class="subject-filter-value" id="subjectFilterValue">All</span>
                <span class="subject-filter-chevron" aria-hidden="true">▾</span>
            </button>
            <div class="subject-filter-menu" id="subjectFilterMenu" role="listbox" aria-label="Subject filter"></div>
        </div>

        <div class="summary-stats-row" id="summaryGrid"></div>

        <div id="reportSessionsView">
            <div class="daily-chart-wrap">
                <div class="daily-chart-header">
                    <div class="daily-chart-pager">
                        <button id="dailyChartOlderBtn" type="button" class="daily-chart-page-btn" aria-label="Older" disabled>‹</button>
                        <div id="dailyChartPageLabel" class="daily-chart-page-label">Loading kid records...</div>
                        <button id="dailyChartNewerBtn" type="button" class="daily-chart-page-btn" aria-label="Newer" disabled>›</button>
                    </div>
                </div>
                <div id="dailyChartLegend" class="daily-chart-legend" style="display:none"></div>
                <div id="dailyChartBody"><div class="daily-chart-status">Loading kid records...</div></div>
            </div>
