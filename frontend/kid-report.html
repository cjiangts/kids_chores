<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid Practice Report - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .daily-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 0.4rem;
        }

        .daily-chart-header h2 {
            margin: 0;
        }

        .shared-report-table-wrap .daily-chart-header {
            padding: 0.8rem 0.8rem 0.4rem;
            margin-bottom: 0;
        }

        .daily-chart-pager {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .daily-chart-page-label {
            color: #555;
            font-size: 0.82rem;
            font-weight: 600;
            min-width: 140px;
            text-align: center;
        }

        .daily-chart-page-btn {
            border: 1px solid #d4dbef;
            background: #fff;
            color: #2f3c7e;
            border-radius: 999px;
            padding: 0.22rem 0.65rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .daily-chart-page-btn:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .daily-legend {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
            color: #555;
            font-size: 0.82rem;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.35rem;
        }

        .daily-row {
            display: grid;
            grid-template-columns: 170px minmax(120px, 1fr);
            gap: 0.45rem;
            align-items: center;
            margin-bottom: 0.45rem;
        }

        .daily-date {
            color: #34406f;
            font-size: 0.84rem;
            font-weight: 600;
        }

        .daily-bar-track {
            width: 100%;
            min-height: 18px;
            border-radius: 999px;
            background: #eef2fb;
            overflow: hidden;
            display: flex;
        }

        .daily-seg {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            overflow: hidden;
        }

        .daily-seg-min {
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
            padding: 0 0.2rem;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.25);
        }

        .daily-seg-tiny .daily-seg-min {
            display: none;
        }

        @media (max-width: 760px) {
            .daily-row {
                grid-template-columns: 1fr;
                gap: 0.25rem;
            }
        }

        .type-pill {
            border-radius: 999px;
            padding: 0.15rem 0.55rem;
            font-size: 0.78rem;
            font-weight: 700;
            display: inline-block;
        }

        .type-pill-link {
            display: block;
            text-decoration: none;
            cursor: pointer;
        }

        .type-pill-link .type-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 8px;
            min-height: 2.4rem;
        }

        .type-pill-link:hover .type-pill {
            filter: brightness(0.88);
        }

        .shared-report-table td:first-child {
            padding: 0.35rem;
        }

        .report-bottom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            align-items: start;
        }

        .report-bottom-row .daily-chart-wrap,
        .report-bottom-row .shared-report-table-wrap {
            margin-bottom: 0;
        }

        @media (max-width: 960px) {
            .report-bottom-row {
                grid-template-columns: 1fr;
            }
        }

        .daily-chart-wrap h2 {
            font-size: 0.82rem;
            font-weight: 600;
            color: #666;
        }

        .shared-report-table {
            width: 100%;
        }

        .shared-report-table th {
            font-size: 0.78rem;
        }

        .shared-report-table td {
            font-size: 0.78rem;
        }

        .shared-report-table th:first-child,
        .shared-report-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 1;
        }

        .shared-report-table th:first-child {
            background: #f7f9ff;
            z-index: 2;
        }

        .shared-report-table td:first-child {
            background: #fff;
        }

        .type-reading {
            background: #e7f0ff;
            color: #2f5aa8;
        }

        .type-writing {
            background: #fff3e8;
            color: #9a5b00;
        }

        .type-lesson-reading {
            background: #efe8ff;
            color: #5f3aa6;
        }
    </style>
</head>
<body class="report-page">
    <div class="container">
        <div class="header">
            <h1 id="reportTitle">Practice Report</h1>
            <a id="backBtn" href="/admin.html" class="back-btn btn-secondary">← Back</a>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <div class="summary-grid" id="summaryGrid"></div>

        <div class="report-bottom-row">
        <div class="daily-chart-wrap">
            <div class="daily-chart-header">
                <h2>Daily Practice Active Minutes</h2>
                <div class="daily-chart-pager">
                    <button id="dailyChartNewerBtn" type="button" class="daily-chart-page-btn">Newer</button>
                    <div id="dailyChartPageLabel" class="daily-chart-page-label">Latest 7 days</div>
                    <button id="dailyChartOlderBtn" type="button" class="daily-chart-page-btn">Older</button>
                </div>
            </div>
            <div class="daily-legend" id="dailyLegend"></div>
            <div id="dailyChartBody"></div>
        </div>

        <div class="shared-report-table-wrap">
            <table class="shared-report-table">
                <thead>
                    <tr>
                        <th>Sessions</th>
                        <th id="startedHeader">Started</th>
                        <th>Mode</th>
                        <th>Mins</th>
                        <th>Result</th>
                        <th>Retries</th>
                    </tr>
                </thead>
                <tbody id="reportBody"></tbody>
            </table>
        </div>
        </div>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="kid-report.js"></script>
</body>
</html>
