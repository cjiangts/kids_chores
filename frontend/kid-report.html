<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kid Practice Report - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .daily-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.1rem;
            flex-wrap: wrap;
            margin-bottom: 0.35rem;
        }

        .daily-chart-header h2 {
            margin: 0;
        }

        .shared-report-table-wrap .daily-chart-header {
            padding: 0.8rem 0.8rem 0.4rem;
            margin-bottom: 0;
        }

        .report-page .header {
            align-items: flex-start;
            gap: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .report-page .header h1 {
            line-height: 1.05;
            text-shadow: 0 4px 14px rgba(31, 45, 98, 0.18);
        }

        .report-page .header .back-btn {
            background: rgba(255, 255, 255, 0.96);
            color: #5364cf;
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 14px;
            padding: 0.58rem 0.92rem;
            font-weight: 600;
            box-shadow: 0 10px 22px rgba(31, 45, 98, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.82);
        }

        .report-page .header .back-btn:hover {
            background: #ffffff;
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 12px 24px rgba(31, 45, 98, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.92);
        }

        .daily-chart-pager {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            width: 100%;
        }

        .daily-chart-page-label {
            flex: 1 1 auto;
            color: #2f3c7e;
            font-size: 0.82rem;
            font-weight: 600;
            line-height: 1.15;
            text-align: center;
        }

        .daily-chart-page-btn {
            border: 0;
            background: transparent;
            color: #2f3c7e;
            font-size: 1.4rem;
            line-height: 1;
            font-weight: 400;
            padding: 0.2rem 0.5rem;
            cursor: pointer;
            border-radius: 6px;
        }

        .daily-chart-page-btn:hover:not(:disabled) {
            background: rgba(47, 60, 126, 0.08);
        }

        .daily-chart-page-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

.daily-vbar-chart {
            display: flex;
            align-items: stretch;
            gap: 0.4rem;
        }

        .daily-vbar-col {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .daily-vbar-plot {
            height: 200px;
            padding-top: 1.1rem;
            display: flex;
            justify-content: center;
            gap: 4px;
            box-sizing: border-box;
        }

        .daily-vbar-bar-wrap {
            position: relative;
            flex: 1 1 0;
            min-width: 0;
            max-width: 36px;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .daily-vbar-bar-wrap-single {
            max-width: 46px;
        }

        .daily-vbar-total {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -3px);
            font-size: 0.72rem;
            color: #34406f;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
        }

        .daily-vbar-bar {
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            background: #eef2fb;
            min-height: 2px;
        }

        .daily-vbar-seg {
            width: 100%;
        }

        .daily-vbar-date {
            margin-top: 0.4rem;
            font-size: 0.7rem;
            color: #34406f;
            text-align: center;
            line-height: 1.2;
        }

        .daily-vbar-date-weekday {
            font-weight: 600;
        }

        .daily-vbar-date-md {
            color: #6b7299;
        }

        @media (max-width: 540px) {
            .daily-vbar-chart {
                gap: 0.25rem;
            }
            .daily-vbar-plot {
                height: 160px;
            }
            .daily-vbar-bar-wrap {
                max-width: 14px;
            }

            .daily-vbar-bar-wrap-single {
                max-width: 18px;
            }

            .daily-vbar-total {
                font-size: 0.65rem;
            }
            .daily-vbar-date {
                font-size: 0.62rem;
            }
        }

        .daily-chart-wrap {
            margin-bottom: 1.2rem;
        }

        .daily-chart-wrap h2 {
            font-size: 0.82rem;
            font-weight: 600;
            color: #666;
        }

        .daily-chart-legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.85rem;
            margin: 0.45rem 0 0.4rem;
            font-size: 0.75rem;
            color: #34406f;
        }

        .daily-chart-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .daily-chart-legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
        }

        .daily-chart-legend-prefix {
            color: #6b7299;
            font-weight: 600;
        }

        .sessions-shell {
            background: var(--dashboard-panel-bg, rgba(255, 255, 255, 0.92));
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 14px;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
            padding: 0.85rem 0.85rem 1rem;
        }

        .sessions-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .day-group + .day-group {
            border-top: 1px solid #eef0f6;
            padding-top: 0.6rem;
        }

        .day-group-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.2rem 0.5rem;
        }

        .day-group-title {
            flex: 1 1 auto;
            font-size: 0.95rem;
            font-weight: 700;
            color: #2f3c7e;
        }

        .day-group-summary {
            font-size: 0.78rem;
            color: #666;
            white-space: nowrap;
        }

        .day-group-toggle {
            border: 0;
            background: transparent;
            color: #2f3c7e;
            font-size: 1.05rem;
            line-height: 1;
            padding: 0.25rem 0.4rem;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.15s, background 0.15s;
        }

        .day-group-toggle:hover {
            background: rgba(47, 60, 126, 0.08);
        }

        .day-group.collapsed .day-group-toggle {
            transform: rotate(180deg);
        }

        .day-group.collapsed .day-group-body {
            display: none;
        }

        .day-group-body {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .session-card {
            display: grid;
            grid-template-columns: 56px minmax(0, 1fr) auto 14px;
            align-items: center;
            gap: 0.7rem;
            padding: 0.7rem 0.85rem;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 1px 2px rgba(31, 45, 98, 0.05);
            text-decoration: none;
            color: inherit;
        }

        .session-card:hover {
            box-shadow: 0 3px 10px rgba(31, 45, 98, 0.12);
        }

        .session-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            line-height: 1;
        }

        .session-info {
            min-width: 0;
        }

        .session-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #2f3c7e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-sub {
            font-size: 0.78rem;
            color: #6b7299;
            margin-top: 0.2rem;
        }

        .session-stats {
            text-align: right;
        }

        .session-mins {
            font-size: 1.05rem;
            font-weight: 700;
            color: #2f3c7e;
        }

        .session-mins-unit {
            font-size: 0.74rem;
            font-weight: 500;
            color: #6b7299;
            margin-left: 0.15rem;
        }

        .session-result {
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 0.18rem;
        }

        .session-retries {
            font-size: 0.74rem;
            color: #8a8fa8;
            margin-top: 0.12rem;
        }

        .session-chevron {
            color: #c4c9d7;
            font-size: 1.1rem;
            line-height: 1;
            text-align: right;
        }

        .sessions-empty {
            color: #666;
            font-size: 0.85rem;
            padding: 1rem 0.4rem;
        }

        @media (max-width: 540px) {
            .session-card {
                grid-template-columns: 44px minmax(0, 1fr) auto 12px;
                padding: 0.55rem 0.6rem;
                gap: 0.55rem;
            }
            .session-icon {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                font-size: 1.35rem;
            }
            .session-title { font-size: 0.88rem; }
            .session-sub { font-size: 0.72rem; }
            .session-mins { font-size: 0.95rem; }
            .session-result { font-size: 0.76rem; }
            .session-retries { font-size: 0.7rem; }
        }

        .report-category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-bottom: 0.8rem;
        }

        .report-category-filter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.42);
            border-radius: 999px;
            padding: 0.42rem 1rem;
            min-height: 36px;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: rgba(255, 255, 255, 0.92);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 8px 18px rgba(31, 45, 98, 0.1);
            transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s, box-shadow 0.18s;
        }

        .report-category-filter-btn:hover {
            background: rgba(255, 255, 255, 0.24);
            border-color: rgba(255, 255, 255, 0.58);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24), 0 10px 20px rgba(31, 45, 98, 0.14);
        }

        .report-category-filter-btn:active {
            transform: scale(0.97);
        }

        .report-category-filter-btn.active {
            background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
            color: #32418d;
            border-color: rgba(255, 255, 255, 0.92);
            box-shadow: 0 8px 20px rgba(31, 45, 98, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.94);
        }

        .report-page .summary-card-full {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.75rem;
            align-items: center;
            text-align: center;
        }

        .report-page .summary-card-answer-breakdown {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .report-page .summary-card-full .summary-stat .label {
            color: #666;
            font-size: 0.76rem;
        }

        .report-page .summary-card-full .summary-stat .value {
            color: #2f3c7e;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .report-page .summary-card-full .summary-stat-right .label,
        .report-page .summary-card-full .summary-stat-right .value {
            color: #15803d;
        }

        .report-page .summary-card-full .summary-stat-wrong .label,
        .report-page .summary-card-full .summary-stat-wrong .value {
            color: #b91c1c;
        }

        @media (max-width: 540px) {
            .report-page .header {
                gap: 0.55rem;
                margin-bottom: 0.65rem;
            }

            .report-page .header .back-btn {
                padding: 0.5rem 0.78rem;
                border-radius: 12px;
            }

            .report-category-filter {
                gap: 0.38rem;
                margin-bottom: 0.7rem;
            }

            .report-category-filter-btn {
                min-height: 34px;
                padding: 0.38rem 0.92rem;
                font-size: 0.78rem;
            }

            .report-page .summary-card-answer-breakdown {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .report-page .summary-card-full .summary-stat .value {
                font-size: 0.96rem;
            }
        }

        .type-reading {
            background: #e7f0ff;
            color: #2f5aa8;
        }

        .type-writing {
            background: #fff3e8;
            color: #9a5b00;
        }

        .type-lesson-reading {
            background: #efe8ff;
            color: #5f3aa6;
        }
    </style>
</head>
<body class="report-page">
    <div class="container">
        <div class="header">
            <h1 id="reportTitle">Practice Report</h1>
            <a id="backBtn" href="/admin.html" class="back-btn btn-secondary">← Back</a>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <div class="report-category-filter" id="reportCategoryFilter" role="group" aria-label="Category filter"></div>

        <div class="summary-grid" id="summaryGrid"></div>

        <div class="daily-chart-wrap">
            <div class="daily-chart-header">
                <div class="daily-chart-pager">
                    <button id="dailyChartOlderBtn" type="button" class="daily-chart-page-btn" aria-label="Older">‹</button>
                    <div id="dailyChartPageLabel" class="daily-chart-page-label">Latest 7 days</div>
                    <button id="dailyChartNewerBtn" type="button" class="daily-chart-page-btn" aria-label="Newer">›</button>
                </div>
            </div>
            <div id="dailyChartLegend" class="daily-chart-legend"></div>
            <div id="dailyChartBody"></div>
        </div>

        <div class="sessions-shell">
            <div id="sessionsList" class="sessions-list"></div>
        </div>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="kid-report.js"></script>
</body>
</html>
