<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=mommy-icon2-20260607">
    <link rel="shortcut icon" href="favicon.ico?v=mommy-icon2-20260607">
    <link rel="manifest" href="site.webmanifest?v=mommy-icon2-20260607">
    <script src="idle-home-redirect.js"></script>
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>View Reports - The Mommy App</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="paradigm.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <link rel="stylesheet" href="kid-report-common.css">
</head>
<body class="report-page manage-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1>
                    <span class="page-title-icon" aria-hidden="true">📈</span>
                    <span id="reportTitle">View Reports</span>
                </h1>
                <div class="page-header-end">
                    <div id="kidAvatarSwitcher" class="kid-avatar-switcher hidden" role="tablist" aria-label="Kids"></div>
                    <div class="page-header-actions" data-family-user-switcher></div>
                </div>
            </div>
        </header>

        <div id="errorMessage" class="error hidden"></div>

        <section class="settings-section">
            <div class="cards-report-view">
                <div class="summary-stats-row" id="summaryGrid"></div>

                <div class="daily-chart-wrap">
                    <div class="daily-chart-header">
                        <div class="daily-chart-pager">
                            <button id="dailyChartOlderBtn" type="button" class="paradigm-pager-btn" aria-label="Older" disabled><span data-icon="chevron-left" data-icon-size="14" data-icon-stroke="2.9"></span></button>
                            <div id="dailyChartPageLabel" class="daily-chart-page-label" role="status" aria-label="Loading kid records"><span class="app-spinner app-spinner--small" aria-hidden="true"></span></div>
                            <button id="dailyChartNewerBtn" type="button" class="paradigm-pager-btn" aria-label="Newer" disabled><span data-icon="chevron-right" data-icon-size="14" data-icon-stroke="2.9"></span></button>
                        </div>
                    </div>
                    <div id="dailyChartLegend" class="daily-chart-legend" style="display:none"></div>
                    <div id="dailyChartBody"><div class="daily-chart-status app-spinner-block" role="status" aria-label="Loading kid records"><span class="app-spinner" aria-hidden="true"></span></div></div>
                </div>

                <div class="sessions-shell">
                    <div id="sessionsList" class="sessions-list"><div class="sessions-empty app-spinner-block" role="status" aria-label="Loading kid records"><span class="app-spinner" aria-hidden="true"></span></div></div>
                </div>
            </div>
        </section>
    </div>

    <script src="icons.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="subject-icons.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="kid-report-common.js"></script>
    <script src="kid-report.js"></script>
</body>
</html>
