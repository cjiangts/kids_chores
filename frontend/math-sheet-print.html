<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Practice Sheet - Kids Daily Chores</title>
    <style>
        :root {
            --math-mono-font: 'Courier New', Courier, 'Nimbus Mono PS', 'Liberation Mono', monospace;
            --sheet-page-width: 210mm;
            --sheet-page-height: 297mm;
            --sheet-page-margin: 5mm;
            --sheet-extra-safe-margin: 9mm;
            --sheet-safe-width: calc(var(--sheet-page-width) - (2 * var(--sheet-page-margin)));
            --sheet-safe-height: calc(var(--sheet-page-height) - (2 * var(--sheet-page-margin)));
            --sheet-box-width: calc(var(--sheet-safe-width) - (2 * var(--sheet-extra-safe-margin)));
            --sheet-box-height: calc(var(--sheet-safe-height) - (2 * var(--sheet-extra-safe-margin)));
            --sheet-header-font-size: 10px;
            --sheet-header-line-height: 12px;
            --sheet-header-gap: 4px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            background: #f5f7fb;
            color: #222;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .toolbar button,
        .toolbar .toolbar-link {
            border: none;
            border-radius: 8px;
            padding: 9px 13px;
            cursor: pointer;
            background: #2d7ef7;
            color: #fff;
            font-size: 0.95rem;
            text-decoration: none;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            white-space: nowrap;
        }

        .toolbar .toolbar-link.secondary,
        .toolbar button.secondary {
            background: #eaf0ff;
            color: #234b9a;
        }

        .sheet-title {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.2;
            min-width: 0;
        }

        .sheet-preview-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 12px;
        }

        .sheet-page {
            width: var(--sheet-box-width);
            height: var(--sheet-box-height);
            background: #fff;
            border: 1px solid #d8dfef;
            box-shadow: 0 4px 18px rgba(38, 54, 96, 0.12);
            overflow: hidden;
            flex: 0 0 auto;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .sheet-printable-area {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .print-header {
            display: none;
        }

        .sheet-meta {
            color: #5b6783;
            font-size: 0.9rem;
        }

        .sheet-content {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .sheet-render-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .math-print-row {
            display: flex;
            flex-wrap: nowrap;
            justify-content: space-between;
            width: 100%;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .math-print-cell {
            overflow: hidden;
            border: none;
            flex-shrink: 0;
            position: relative;
        }

        .math-print-cell-inner {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .math-print-cell-transform {
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: top left;
        }

        .math-print-cell-offset {
            position: absolute;
            width: max-content;
        }

        .error {
            color: #b00020;
            font-weight: 600;
        }

        .math-cell-v {
            --v-row-width-ch: 6;
            --v-gap-ch: 3;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            width: calc(var(--v-row-width-ch) * 1ch);
            color: #222;
            font-family: var(--math-mono-font);
            font-size: 1.56rem;
            line-height: 1.18;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums lining-nums;
            font-feature-settings: 'tnum' 1, 'lnum' 1;
            font-variant-ligatures: none;
            font-kerning: none;
        }

        .v-row {
            display: block;
            white-space: pre;
            min-height: 1.18em;
            width: 100%;
        }

        .v-row-top {
            text-align: right;
        }

        .v-row-op {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            white-space: normal;
        }

        .v-op {
            flex: 0 0 1ch;
            width: 1ch;
            text-align: center;
        }

        .v-gap {
            flex: 0 0 calc(var(--v-gap-ch) * 1ch);
            width: calc(var(--v-gap-ch) * 1ch);
            min-width: calc(var(--v-gap-ch) * 1ch);
        }

        .v-row-bottom-num {
            flex: 0 0 auto;
            text-align: right;
            white-space: pre;
        }

        .v-line {
            width: 100%;
            border-top: 2px solid currentColor;
            margin-top: 0.08em;
        }

        .math-cell-div {
            border: none;
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            width: max-content;
            color: #222;
            font-family: var(--math-mono-font);
            font-size: 1.56rem;
            line-height: 1.18;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums lining-nums;
            font-feature-settings: 'tnum' 1, 'lnum' 1;
            font-variant-ligatures: none;
            font-kerning: none;
        }

        .div-main-row {
            display: flex;
            align-items: baseline;
            white-space: pre;
        }

        .div-divisor {
            padding-right: 0.08em;
        }

        .div-dividend {
            position: relative;
            padding: 0.18em 0.18em 0 0.15em;
            margin-left: 0.55em;
            border-top: 2px solid currentColor;
        }

        .div-bracket-svg {
            position: absolute;
            right: calc(100% - 1px);
            top: -2px;
            width: 0.55em;
            height: 1.35em;
            overflow: visible;
        }

        .math-cell-v-fallback {
            border: none;
            text-align: left;
            font-family: var(--math-mono-font);
            font-size: 1.34rem;
            line-height: 1.24;
            font-variant-numeric: tabular-nums lining-nums;
            font-feature-settings: 'tnum' 1, 'lnum' 1;
        }

        @media (max-width: 860px) {
            .sheet-title {
                flex: 1 1 100%;
            }

            .toolbar-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .sheet-page {
                width: 688px;
                height: 1017px;
            }
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 5mm;
            }

            body {
                margin: 0;
                background: #fff;
                padding: 0;
            }

            .toolbar {
                display: none;
            }

            .sheet-page {
                width: 100%;
                height: auto;
                border: none;
                box-shadow: none;
                margin: 0;
                overflow: visible;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .sheet-meta {
                display: none;
            }

            .sheet-preview-wrap {
                padding: 0;
                width: var(--sheet-box-width);
                height: auto;
                overflow: visible;
                display: block;
            }

            .sheet-printable-area,
            .sheet-content,
            .math-print-row {
                max-width: none;
                height: auto;
            }

            .sheet-render-canvas {
                width: 100% !important;
                height: auto !important;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="sheet-title" id="sheetTitle">Math Practice Sheet</div>
        <div class="toolbar-actions">
            <button id="showAnswersBtn" type="button" class="secondary">Show Answers</button>
            <button id="regenerateBtn" type="button" class="secondary">Regenerate</button>
            <button id="finalizeBtn" type="button" style="background:#2b8a3e;">Finalize</button>
            <button id="printBtn" type="button">Print</button>
            <a id="backBtn" class="toolbar-link secondary" href="/">← Back</a>
        </div>
    </div>

    <div id="sheetMeta" class="sheet-meta"></div>

    <div class="sheet-preview-wrap">
        <div class="sheet-page">
            <div id="sheetPrintableArea" class="sheet-printable-area">
                <div id="printHeader" class="print-header"></div>
                <div id="sheetContent" class="sheet-content"></div>
            </div>
        </div>
    </div>

    <script src="math-sheet-print.js"></script>
</body>
</html>
