<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Practice Sheet - Kids Daily Chores</title>
    <style>
        :root {
            --math-mono-font: 'Courier New', Courier, 'Nimbus Mono PS', 'Liberation Mono', monospace;
            --sheet-page-width: 215.9mm;
            --sheet-page-height: 279.4mm;
            --sheet-page-margin: 5mm;
            --sheet-extra-safe-margin-x: 9mm;
            --sheet-extra-safe-margin-top: 11.1mm;
            --sheet-extra-safe-margin-bottom: 11.1mm;
            --sheet-safe-width: calc(var(--sheet-page-width) - (2 * var(--sheet-page-margin)));
            --sheet-safe-height: calc(var(--sheet-page-height) - (2 * var(--sheet-page-margin)));
            --sheet-box-width: calc(var(--sheet-safe-width) - (2 * var(--sheet-extra-safe-margin-x)));
            --sheet-box-height: calc(var(--sheet-safe-height) - var(--sheet-extra-safe-margin-top) - var(--sheet-extra-safe-margin-bottom));
            --sheet-print-height: calc(var(--sheet-safe-height) - 1mm);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            background: #f5f7fb;
            color: #222;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .repeat-control {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 1px solid #d8dfef;
            border-radius: 10px;
            background: #fff;
        }

        .repeat-control label {
            color: #5b6783;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .repeat-control input {
            width: 76px;
            border: 1px solid #c9d4ec;
            border-radius: 8px;
            padding: 7px 9px;
            font: inherit;
            color: #234b9a;
            background: #f8fbff;
        }

        .toolbar button,
        .toolbar .toolbar-link {
            border: none;
            border-radius: 8px;
            padding: 9px 13px;
            cursor: pointer;
            background: #2d7ef7;
            color: #fff;
            font-size: 0.95rem;
            text-decoration: none;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            white-space: nowrap;
        }

        .toolbar .toolbar-link.secondary,
        .toolbar button.secondary {
            background: #eaf0ff;
            color: #234b9a;
        }

        .sheet-title {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.2;
            min-width: 0;
        }

        .sheet-preview-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 12px;
        }

        .sheet-page {
            width: var(--sheet-box-width);
            height: var(--sheet-box-height);
            background: #fff;
            border: 1px solid #d8dfef;
            box-shadow: 0 4px 18px rgba(38, 54, 96, 0.12);
            overflow: hidden;
            flex: 0 0 auto;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .sheet-printable-area {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .print-header {
            display: none;
        }

        .sheet-meta {
            color: #5b6783;
            font-size: 0.9rem;
            margin-bottom: 10px;
            line-height: 1.35;
        }

        .sheet-content {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .sheet-render-canvas,
        .sheet-render-image {
            display: block;
            width: 100%;
            height: 100%;
        }

        .math-print-row {
            display: flex;
            flex-wrap: nowrap;
            justify-content: space-between;
            width: 100%;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .math-print-cell {
            overflow: hidden;
            border: none;
            flex-shrink: 0;
            position: relative;
        }

        .math-print-cell-inner {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .math-print-cell-transform {
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: top left;
        }

        .math-print-cell-offset {
            position: absolute;
            width: max-content;
        }

        .error {
            color: #b00020;
            font-weight: 600;
        }

        .math-cell-v {
            --v-row-width-ch: 6;
            --v-gap-ch: 3;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            width: calc(var(--v-row-width-ch) * 1ch);
            color: #222;
            font-family: var(--math-mono-font);
            font-size: 1.56rem;
            line-height: 1.18;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums lining-nums;
            font-feature-settings: 'tnum' 1, 'lnum' 1;
            font-variant-ligatures: none;
            font-kerning: none;
        }

        .v-row {
            display: block;
            white-space: pre;
            min-height: 1.18em;
            width: 100%;
        }

        .v-row-top {
            text-align: right;
        }

        .v-row-op {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            white-space: normal;
        }

        .v-op {
            flex: 0 0 1ch;
            width: 1ch;
            text-align: center;
        }

        .v-gap {
            flex: 0 0 calc(var(--v-gap-ch) * 1ch);
            width: calc(var(--v-gap-ch) * 1ch);
            min-width: calc(var(--v-gap-ch) * 1ch);
        }

        .v-row-bottom-num {
            flex: 0 0 auto;
            text-align: right;
            white-space: pre;
        }

        .v-line {
            width: 100%;
            border-top: 2px solid currentColor;
            margin-top: 0.08em;
        }

        .math-cell-div {
            border: none;
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            width: max-content;
            color: #222;
            font-family: var(--math-mono-font);
            font-size: 1.56rem;
            line-height: 1.18;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums lining-nums;
            font-feature-settings: 'tnum' 1, 'lnum' 1;
            font-variant-ligatures: none;
            font-kerning: none;
        }

        .div-main-row {
            display: flex;
            align-items: baseline;
            white-space: pre;
        }

        .div-divisor {
            padding-right: 0.08em;
        }

        .div-dividend {
            position: relative;
            padding: 0.18em 0.18em 0 0.15em;
            margin-left: 0.55em;
            border-top: 2px solid currentColor;
        }

        .div-bracket-svg {
            position: absolute;
            right: calc(100% - 1px);
            top: -2px;
            width: 0.55em;
            height: 1.35em;
            overflow: visible;
        }

        .math-cell-v-fallback {
            border: none;
            text-align: left;
            font-family: var(--math-mono-font);
            font-size: 1.34rem;
            line-height: 1.24;
            font-variant-numeric: tabular-nums lining-nums;
            font-feature-settings: 'tnum' 1, 'lnum' 1;
        }

        @media (max-width: 860px) {
            body {
                padding: 10px;
            }

            .toolbar {
                margin-bottom: 10px;
            }

            .sheet-title {
                flex: 1 1 100%;
            }

            .toolbar-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .repeat-control {
                margin-left: 0;
            }

            .sheet-preview-wrap {
                align-items: stretch;
                padding-bottom: 8px;
            }

            .sheet-page {
                width: min(100%, 688px);
                height: auto;
                aspect-ratio: 688 / 1017;
                margin: 0 auto;
            }

            .sheet-render-canvas,
            .sheet-render-image {
                width: 100% !important;
                height: 100% !important;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 6px;
            }

            .toolbar {
                gap: 6px;
                margin-bottom: 6px;
            }

            .sheet-title {
                font-size: 1.05rem;
            }

            .toolbar-actions {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 6px;
            }

            .repeat-control {
                width: 100%;
                justify-content: space-between;
            }

            .repeat-control input {
                width: 88px;
            }

            .toolbar button,
            .toolbar .toolbar-link {
                width: 100%;
                min-width: 0;
                min-height: 36px;
                padding: 0.55rem 0.65rem;
                font-size: 0.88rem;
                white-space: normal;
                text-align: center;
            }

            .sheet-meta {
                margin-bottom: 6px;
                font-size: 0.8rem;
            }

            .sheet-preview-wrap {
                gap: 6px;
                padding-bottom: 6px;
            }

            .sheet-page {
                border-radius: 10px;
                overflow: hidden;
            }
        }

        @media print {
            .toolbar {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="sheet-title" id="sheetTitle">Math Practice Sheet</div>
        <div id="repeatControl" class="repeat-control" style="display:none;">
            <label for="repeatCountInput">Print Sheets</label>
            <input id="repeatCountInput" type="number" min="1" step="1" value="1" inputmode="numeric">
        </div>
        <div class="toolbar-actions">
            <button id="showAnswersBtn" type="button" class="secondary">Show Answers</button>
            <button id="regenerateBtn" type="button" class="secondary">Regenerate</button>
            <button id="finalizeBtn" type="button" style="background:#2b8a3e;">Finalize</button>
            <button id="printBtn" type="button">Print</button>
            <a id="backBtn" class="toolbar-link secondary" href="/">← Back</a>
        </div>
    </div>

    <div id="sheetMeta" class="sheet-meta"></div>

    <div id="sheetPreviewWrap" class="sheet-preview-wrap"></div>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="math-sheet-print.js"></script>
</body>
</html>
