<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Practice Sheet - Kids Daily Chores</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            margin: 0;
            padding: 16px;
            background: #fff;
            color: #222;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .toolbar button,
        .toolbar .toolbar-link {
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            background: #2d7ef7;
            color: #fff;
            font-size: 0.95rem;
            text-decoration: none;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            white-space: nowrap;
        }

        .toolbar .toolbar-link.secondary,
        .toolbar button.secondary {
            background: #eaf0ff;
            color: #234b9a;
        }

        .sheet-title {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.2;
            min-width: 0;
        }

        @media (max-width: 760px) {
            .sheet-title {
                flex: 1 1 100%;
            }

            .toolbar-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }

        .print-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 1rem;
            color: #333;
            margin-bottom: 6px;
            padding: 0 2px;
        }

        .sheet-meta {
            color: #666;
            margin-bottom: 14px;
            font-size: 0.9rem;
        }

        .error {
            color: #b00020;
            font-weight: 600;
        }

        /* ── Shared grid ── */
        .math-grid {
            display: grid;
            column-gap: 24px;
            row-gap: 0;
            width: 100%;
        }

        /* ── Horizontal mode ── */
        .math-cell-h {
            border: none;
            padding: 2px 14px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            min-height: 36px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.4rem;
            letter-spacing: 0.06em;
        }

        .math-cell-h .cell-prompt {
            font-weight: 500;
            white-space: nowrap;
        }

        .math-cell-h .cell-answer {
            display: none;
            color: #2b8a3e;
            font-weight: 600;
            white-space: nowrap;
        }

        .show-answers .math-cell-h .cell-answer {
            display: inline;
        }

        /* ── Vertical mode ── */
        .math-cell-v {
            border: none;
            padding: 4px 16px 6px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.6rem;
            letter-spacing: 0.08em;
            line-height: 1.15;
            min-height: 100px;
        }

        .v-row {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            width: 100%;
            white-space: pre;
        }

        .v-sign {
            width: 1.2em;
            text-align: left;
            flex-shrink: 0;
            position: relative;
            left: -1.0em;
        }

        .v-sign-spacer {
            width: 1.2em;
            flex-shrink: 0;
        }

        .v-num {
            text-align: right;
        }

        .v-line {
            width: 100%;
            border: none;
            border-top: 2px solid #222;
            margin: 2px 0 0;
        }

        .v-blank-line {
            width: 100%;
            min-height: 2em;
        }

        .v-answer {
            display: none;
            text-align: right;
            width: 100%;
            color: #2b8a3e;
            font-weight: 600;
        }

        .show-answers .v-answer {
            display: block;
        }

        /* ── Long division mode ── */
        .math-cell-div {
            border: none;
            padding: 4px 16px 6px;
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.6rem;
            letter-spacing: 0.08em;
            line-height: 1.15;
            min-height: 100px;
        }

        .div-answer-row {
            height: 1.4em;
            margin-top: 2.8em;
        }

        .div-quotient {
            visibility: hidden;
            color: #2b8a3e;
            font-weight: 600;
        }

        .show-answers .div-quotient {
            visibility: visible;
        }

        .div-main-row {
            display: flex;
            align-items: baseline;
            white-space: pre;
        }

        .div-divisor {
            padding-right: 1px;
        }

        .div-bracket {
            margin-right: -1px;
            display: inline-block;
            transform: scaleY(1.4);
            transform-origin: bottom;
        }

        .div-dividend {
            position: relative;
            padding: 0.22em 4px 0 3px;
        }

        .div-dividend::after {
            content: '';
            position: absolute;
            top: 0.00em;
            left: -0.37em;
            right: 0;
            border-top: 2px solid #222;
        }

        .div-blank-space {
            width: 100%;
        }

        /* ── Fallback for unparseable vertical ── */
        .math-cell-v-fallback {
            border: none;
            padding: 10px 14px;
            text-align: left;
            font-size: 1.4rem;
            min-height: 70px;
        }

        .math-cell-v-fallback .cell-answer {
            display: none;
            color: #2b8a3e;
            font-weight: 600;
            margin-top: 4px;
        }

        .show-answers .math-cell-v-fallback .cell-answer {
            display: block;
        }

        @media print {
            @page {
                margin: 5mm;
            }

            .toolbar {
                display: none;
            }

            .sheet-meta {
                display: none;
            }

            body {
                padding: 2mm;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="sheet-title" id="sheetTitle">Math Practice Sheet</div>
        <div class="toolbar-actions">
            <button id="showAnswersBtn" type="button" class="secondary">Show Answers</button>
            <button id="regenerateBtn" type="button" class="secondary">Regenerate</button>
            <button id="finalizeBtn" type="button" style="background:#2b8a3e;">Finalize</button>
            <button id="printBtn" type="button">Print</button>
            <a id="backBtn" class="toolbar-link secondary" href="/">← Back</a>
        </div>
    </div>
    <div id="printHeader" class="print-header"></div>
    <div id="sheetMeta" class="sheet-meta"></div>
    <div id="sheetContent"></div>

    <script src="math-sheet-print.js"></script>
</body>
</html>
