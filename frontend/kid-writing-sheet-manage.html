<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=mommy-icon2-20260607">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=mommy-icon2-20260607">
    <link rel="shortcut icon" href="favicon.ico?v=mommy-icon2-20260607">
    <link rel="manifest" href="site.webmanifest?v=mommy-icon2-20260607">
    <script src="idle-home-redirect.js"></script>
    <script src="offline-redirect-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheets - The Mommy App</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="paradigm.css">
    <link rel="stylesheet" href="kid-app-navigation.css">
    <link rel="stylesheet" href="kid-writing-sheet-manage.css">
</head>
<body class="practice-page manage-page worksheet-manage-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1 class="paradigm-kid-page-title">
                    <span class="page-title-icon kid-initial-avatar paradigm-kid-title-avatar paradigm-kid-title-avatar--pending" aria-hidden="true"></span>
                    <span id="pageTitle">Chinese Writing Sheets</span>
                </h1>
                <div class="page-header-actions" data-family-user-switcher></div>
            </div>
        </header>

        <div id="errorMessage" class="error hidden"></div>

        <div class="type2-sheet-layout">
            <section id="sheetHistorySection" class="paradigm-settings-panel">
                <h2 class="paradigm-panel-title">
                    <span class="paradigm-panel-title-icon"><span class="icon" data-icon="history" data-icon-size="18"></span></span>
                    <span id="sheetHistoryTitle" class="paradigm-panel-heading">Practice Sheets</span>
                    <span class="paradigm-row-action-group paradigm-panel-action" aria-label="Build sheets">
                        <button type="button" id="buildChineseSheetBtn" class="paradigm-icon-btn paradigm-panel-action--circle" title="Build writing sheet" aria-label="Build writing sheet" aria-disabled="true">
                            <span class="icon" data-icon="plus" data-icon-size="16"></span>
                        </button>
                        <button type="button" id="buildSheetBtn" class="paradigm-icon-btn paradigm-panel-action--circle hidden" title="Build vertical sheet" aria-label="Build vertical sheet" disabled>
                            <span class="icon" data-icon="layout-grid" data-icon-size="16"></span>
                        </button>
                        <button type="button" id="buildInlineSheetBtn" class="paradigm-icon-btn paradigm-panel-action--circle hidden" title="Build inline sheet" aria-label="Build inline sheet" disabled>
                            <span class="icon" data-icon="rows-3" data-icon-size="16"></span>
                        </button>
                    </span>
                </h2>
                <div id="sheetBuildHint" class="sheet-build-hint hidden" role="status" aria-live="polite"></div>
                <div id="sheetErrorMessage" class="error hidden"></div>
                <div id="mathSheetErrorMessage" class="error hidden"></div>
                <p id="sheetHistoryNote" class="sheet-subgroup-note hidden"></p>
                <div id="sheetList" class="sheet-list"></div>
            </section>
        </div>
    </div>

    <!-- Chinese Writing Sheet Builder Modal -->
    <div id="chineseSheetBuilderModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" style="max-width:1100px; max-height:calc(100vh - 15px); padding:0.5rem 0.8rem; display:flex; flex-direction:column; overflow:hidden;">
            <div class="sheet-builder-head">
                <div class="sheet-builder-title-row">
                    <h2 style="margin:0;">Build Writing Sheet</h2>
                </div>
                <div style="display:inline-flex; align-items:center; gap:0.8rem; flex-wrap:wrap;">
                    <span class="sheet-builder-paper-control">
                        <span>Size</span>
                        <button type="button" id="cwGlobalScaleDown" class="cell-design-edge-btn" style="width:28px;height:28px;font-size:0.92rem;" title="Smaller">-</button>
                        <span id="cwGlobalScaleLabel" style="min-width:36px; text-align:center;">130%</span>
                        <button type="button" id="cwGlobalScaleUp" class="cell-design-edge-btn" style="width:28px;height:28px;font-size:0.92rem;" title="Larger">+</button>
                    </span>
                    <span class="sheet-builder-paper-control">
                        <span>Practice</span>
                        <button type="button" id="cwEmptyCountDown" class="cell-design-edge-btn" style="width:28px;height:28px;font-size:0.92rem;" title="Fewer practice boxes">-</button>
                        <span id="cwEmptyCountLabel" style="min-width:20px; text-align:center;">1</span>
                        <button type="button" id="cwEmptyCountUp" class="cell-design-edge-btn" style="width:28px;height:28px;font-size:0.92rem;" title="More practice boxes">+</button>
                    </span>
                    <label class="sheet-builder-paper-control" for="chineseSheetPaperSize">
                        <span>Paper</span>
                        <select id="chineseSheetPaperSize">
                            <option value="letter">8.5 x 11 (US Letter)</option>
                            <option value="a4">8.27 x 11.69 (A4)</option>
                        </select>
                    </label>
                </div>
            </div>
            <div style="flex:1; min-height:0; overflow:auto; position:relative;">
                <div style="display:flex; justify-content:center; min-width:max-content;">
                    <div id="chineseSheetA4" style="position:relative; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.12);"></div>
                </div>
                <div id="chineseSheetPicker" class="sb-picker-backdrop hidden" aria-hidden="true">
                    <div class="sb-picker-card">
                        <h3 class="sb-picker-title" id="chineseSheetPickerTitle">Choose Character</h3>
                        <p class="sb-picker-note">Pick a character for this row.</p>
                        <div class="sb-picker-legend" aria-label="Character source legend">
                            <span class="sb-picker-legend-item"><span class="sb-picker-legend-dot reason-new" aria-hidden="true"></span>Newly added</span>
                            <span class="sb-picker-legend-item"><span class="sb-picker-legend-dot reason-failed" aria-hidden="true"></span>Last failed</span>
                        </div>
                        <div id="chineseSheetPickerOptions" class="sb-picker-options sb-picker-options-bubbles"></div>
                        <div class="sb-picker-actions">
                            <button type="button" id="chineseSheetPickerFillBtn" class="paradigm-btn hidden">Fill page</button>
                            <button type="button" id="chineseSheetPickerCancelBtn" class="paradigm-btn">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:0.6rem; justify-content:flex-end; margin-top:0.4rem; flex-shrink:0;">
                <button type="button" id="chineseSheetDoneBtn" class="paradigm-btn" disabled>Done</button>
                <button type="button" id="chineseSheetCloseBtn" class="paradigm-btn">Close</button>
            </div>
        </div>
    </div>

    <!-- Cell Designer Modal -->
    <div id="cellDesignModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" style="max-width:720px; padding:1.2rem 1.4rem;">
            <div style="margin-bottom:0.8rem; text-align:center;">
                <span id="cellDesignDimensions" style="font-size:0.95rem; color:#555; font-weight:600;"></span>
            </div>
            <div id="cellDesignCanvas">
                <div id="cellDesignStage">
                    <div class="cell-design-side-controls top">
                        <button type="button" class="cell-design-edge-btn" data-cell-resize="grow-n" aria-label="Grow top edge upward">↑</button>
                        <button type="button" class="cell-design-edge-btn" data-cell-resize="shrink-n" aria-label="Shrink top edge downward">↓</button>
                    </div>
                    <div class="cell-design-side-controls bottom">
                        <button type="button" class="cell-design-edge-btn" data-cell-resize="grow-s" aria-label="Grow bottom edge downward">↓</button>
                        <button type="button" class="cell-design-edge-btn" data-cell-resize="shrink-s" aria-label="Shrink bottom edge upward">↑</button>
                    </div>
                    <div class="cell-design-side-controls left">
                        <button type="button" class="cell-design-edge-btn" data-cell-resize="grow-w" aria-label="Grow left edge outward">←</button>
                        <button type="button" class="cell-design-edge-btn" data-cell-resize="shrink-w" aria-label="Shrink left edge inward">→</button>
                    </div>
                    <div class="cell-design-side-controls right">
                        <button type="button" class="cell-design-edge-btn" data-cell-resize="grow-e" aria-label="Grow right edge outward">→</button>
                        <button type="button" class="cell-design-edge-btn" data-cell-resize="shrink-e" aria-label="Shrink right edge inward">←</button>
                    </div>
                    <div id="cellDesignWorkArea">
                        <div id="cellDesignBox">
                            <div id="cellDesignContent"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:0.6rem; justify-content:flex-end; margin-top:1rem;">
                <button type="button" id="cellDesignSaveBtn" class="paradigm-btn">Save Cell Design</button>
                <button type="button" id="cellDesignCancelBtn" class="paradigm-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Sheet Builder Modal -->
    <div id="sheetBuilderModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" style="max-width:1100px; max-height:calc(100vh - 15px); padding:0.5rem 0.8rem; display:flex; flex-direction:column; overflow:hidden;">
            <div class="sheet-builder-head">
                <div class="sheet-builder-title-row">
                    <h2 style="margin:0;">Build Vertical Sheet</h2>
                </div>
                <label class="sheet-builder-paper-control" for="sheetBuilderPaperSize">
                    <span>Paper</span>
                    <select id="sheetBuilderPaperSize">
                        <option value="letter">8.5 x 11 (US Letter)</option>
                        <option value="a4">8.27 x 11.69 (A4)</option>
                    </select>
                </label>
            </div>
            <div style="flex:1; min-height:0; overflow:auto; position:relative;">
                <div style="display:flex; justify-content:center; min-width:max-content;">
                    <div id="sheetBuilderA4" style="position:relative; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.12);"></div>
                </div>
                <div id="sheetBuilderPicker" class="sb-picker-backdrop hidden" aria-hidden="true">
                    <div class="sb-picker-card">
                        <h3 class="sb-picker-title" id="sheetBuilderPickerTitle">Choose Card</h3>
                        <p class="sb-picker-note">Pick one of the card designs you already prepared.</p>
                        <div id="sheetBuilderPickerOptions" class="sb-picker-options"></div>
                        <div class="sb-picker-actions">
                            <button type="button" id="sheetBuilderPickerCancelBtn" class="paradigm-btn">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:0.6rem; justify-content:flex-end; margin-top:0.4rem; flex-shrink:0;">
                <button type="button" id="sheetBuilderDoneBtn" class="paradigm-btn" disabled>Done</button>
                <button type="button" id="sheetBuilderCloseBtn" class="paradigm-btn">Close</button>
            </div>
        </div>
    </div>

    <!-- Inline Sheet Builder Modal -->
    <div id="inlineSheetBuilderModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" style="max-width:1100px; max-height:calc(100vh - 15px); padding:0.5rem 0.8rem; display:flex; flex-direction:column; overflow:hidden;">
            <div class="sheet-builder-head">
                <div class="sheet-builder-title-row">
                    <h2 style="margin:0;">Build Inline Sheet</h2>
                </div>
                <label class="sheet-builder-paper-control" for="inlineSheetPaperSize">
                    <span>Paper</span>
                    <select id="inlineSheetPaperSize">
                        <option value="letter">8.5 x 11 (US Letter)</option>
                        <option value="a4">8.27 x 11.69 (A4)</option>
                    </select>
                </label>
            </div>
            <div style="flex:1; min-height:0; overflow:auto; position:relative;">
                <div style="display:flex; justify-content:center; min-width:max-content;">
                    <div id="inlineSheetA4" style="position:relative; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.12);"></div>
                </div>
                <div id="inlineSheetPicker" class="sb-picker-backdrop hidden" aria-hidden="true">
                    <div class="sb-picker-card">
                        <h3 class="sb-picker-title">Choose Deck</h3>
                        <div id="inlineSheetPickerOptions" class="sb-picker-options"></div>
                        <div class="sb-picker-actions">
                            <button type="button" id="inlineSheetPickerCancelBtn" class="paradigm-btn">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:0.6rem; justify-content:flex-end; margin-top:0.4rem; flex-shrink:0;">
                <button type="button" id="inlineSheetDoneBtn" class="paradigm-btn" disabled>Done</button>
                <button type="button" id="inlineSheetCloseBtn" class="paradigm-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="icons.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="practice-ui-common.js"></script>
    <script src="math-rendering-common.js"></script>
    <script src="kid-writing-sheet-manage-core.js"></script>
    <script src="kid-writing-sheet-manage-lists.js"></script>
    <script src="kid-writing-sheet-manage-builder.js"></script>
</body>
</html>
