<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parent Admin - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
</head>
<body class="parent-admin-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1><svg class="icon page-title-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 15H6a4 4 0 0 0-4 4v2"/><path d="m14.305 16.53.923-.382"/><path d="m15.228 13.852-.923-.383"/><path d="m16.852 12.228-.383-.923"/><path d="m16.852 17.772-.383.924"/><path d="m19.148 12.228.383-.923"/><path d="m19.53 18.696-.382-.924"/><path d="m20.772 13.852.924-.383"/><path d="m20.772 16.148.924.383"/><circle cx="18" cy="15" r="3"/><circle cx="9" cy="7" r="4"/></svg> Parent Admin</h1>
                <div class="page-header-actions page-header-actions--admin">
                    <button
                        id="newKidBtn"
                        class="btn-secondary header-action-btn"
                        type="button"
                        aria-label="Add Kid"
                        title="Add Kid"
                    >
                        <span class="header-action-icon" aria-hidden="true">
                            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21a8 8 0 0 1 13.292-6"/><circle cx="10" cy="8" r="5"/><path d="M19 16v6"/><path d="M22 19h-6"/></svg>
                        </span>
                        <span class="header-action-label">Add Kid</span>
                    </button>
                    <a
                        href="/parent-settings.html"
                        class="btn-secondary header-action-btn"
                        aria-label="Settings"
                        title="Settings"
                    >
                        <span class="header-action-icon" aria-hidden="true">
                            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                        </span>
                        <span class="header-action-label">Settings</span>
                    </a>
                    <a href="/" class="back-btn btn-secondary page-header-back-btn header-action-btn" aria-label="Kid Mode" title="Kid Mode">
                        <span class="header-action-icon" aria-hidden="true">
                            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>
                        </span>
                        <span class="header-action-label">Kid Mode</span>
                    </a>
                </div>
            </div>
        </header>

        <main>
            <div id="kidsList" class="kids-grid">
                <!-- Kids will be loaded here -->
            </div>

            <!-- New Kid Form Modal -->
            <div id="kidModal" class="modal hidden">
                <div class="modal-content">
                    <h2>Add Kid</h2>
                    <form id="kidForm">
                        <div class="form-group">
                            <input type="text" id="kidName" required placeholder="Enter kid's name">
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="kidFormSaveBtn" class="btn-primary" disabled>Save</button>
                            <button type="button" id="cancelBtn" class="btn-secondary">Close</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Deck Category Opt-in Modal -->
            <div id="deckCategoryModal" class="modal hidden">
                <div class="modal-content deck-cat-modal-content">
                    <h2 id="deckCategoryHeading">Opt-in Deck Categories</h2>
                    <div id="deckCategoryList" class="deck-cat-list"></div>
                    <div class="form-actions">
                        <button type="button" id="deckCategoryConfirmBtn" class="btn-primary">Confirm</button>
                        <button type="button" id="deckCategoryCancelBtn" class="btn-secondary">Close</button>
                    </div>
                </div>
            </div>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <!-- PWA Install Prompt (iOS Safari only, shown once) -->
    <div id="pwaInstallOverlay" class="modal hidden">
        <div class="modal-content pwa-install-modal">
            <img src="apple-touch-icon.png" alt="" class="pwa-install-icon">
            <h2>Install App</h2>
            <p class="pwa-install-desc">Add Kids Daily Chores to your home screen for easy fullscreen access.</p>
            <p class="pwa-install-step">Press <strong>"Share"</strong> <svg class="pwa-install-share-icon" width="17" height="17" viewBox="0 0 50 50"><path fill="#007AFF" d="M25 1L15 12h7v18h6V12h7L25 1z"/><path fill="#007AFF" d="M10 22v22h30V22h-6v16H16V22h-6z"/></svg> below</p>
            <p class="pwa-install-step">Then <strong>"Add to Home Screen"</strong> <span class="pwa-install-plus-icon">+</span></p>
            <button type="button" id="pwaInstallDismiss" class="btn-primary pwa-install-dismiss">Dismiss</button>
        </div>
    </div>
    <style>
        .pwa-install-modal {
            text-align: center;
            max-width: 340px;
            padding: 1.8rem 1.5rem 1.5rem;
        }
        .pwa-install-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }
        .pwa-install-modal h2 {
            color: #e8437f;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .pwa-install-desc {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.45;
            margin-bottom: 1rem;
        }
        .pwa-install-step {
            font-size: 0.88rem;
            color: #444;
            margin-bottom: 0.5rem;
        }
        .pwa-install-share-icon {
            vertical-align: middle;
            margin: 0 0.1rem;
        }
        .pwa-install-plus-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border: 1.5px solid #333;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 700;
            vertical-align: middle;
            margin-left: 0.15rem;
        }
        .pwa-install-dismiss {
            margin-top: 1rem;
            width: 100%;
            max-width: 200px;
        }
    </style>
    <script>
    (function() {
        var isIosSafari = /iP(hone|od|ad)/.test(navigator.userAgent) &&
            /Safari/.test(navigator.userAgent) &&
            !navigator.standalone;
        if (!isIosSafari) return;
        if (localStorage.getItem('pwa-install-dismissed')) return;

        var overlay = document.getElementById('pwaInstallOverlay');
        var btn = document.getElementById('pwaInstallDismiss');
        setTimeout(function() {
            overlay.classList.remove('hidden');
        }, 2000);
        btn.addEventListener('click', function() {
            overlay.classList.add('hidden');
            localStorage.setItem('pwa-install-dismissed', '1');
        });
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                overlay.classList.add('hidden');
                localStorage.setItem('pwa-install-dismissed', '1');
            }
        });
    })();
    </script>

    <script src="icons.js"></script>
    <script src="subject-icons.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="admin.js"></script>
</body>
</html>
