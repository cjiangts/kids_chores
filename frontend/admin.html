    <style>
        .parent-admin-page .admin-optin-panel {
            --admin-chore-edit-right: var(--p-surface-padding-x);
            --admin-chore-action-gap: 0.28rem;
            --admin-chore-edit-reserve: calc(var(--paradigm-panel-title-action-size) + var(--admin-chore-action-gap) + 0.25rem);
            --admin-chore-header-height: var(--paradigm-panel-title-height);
            --admin-pill-height: var(--paradigm-button-height);
            --admin-pill-font-size: 0.9rem;
            --admin-pill-font-weight: 400;
            --admin-pill-line-height: 1.2;
            --admin-off-app-pill-height: var(--admin-pill-height);
            position: relative;
        }
        .parent-admin-page .admin-panel-menu-btn {
            appearance: none;
            -webkit-appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            background: none;
            border: none;
            color: #6c7794;
            border-radius: 8px;
            cursor: pointer;
            line-height: 0;
            flex: 0 0 auto;
        }
        .parent-admin-page .admin-panel-menu-btn:hover,
        .parent-admin-page .admin-panel-menu-btn:focus-visible {
            background: #f3f5fb;
            color: #2f4cb5;
            outline: none;
        }
        .parent-admin-page .admin-panel-menu-btn.is-hidden {
            visibility: hidden;
            pointer-events: none;
        }
        .parent-admin-page .admin-optin-edit-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.32rem;
            padding: 0 0.95rem;
            font-size: 0.88rem;
            font-weight: 400;
            border-radius: 9px;
            height: 38px;
            min-height: 38px;
            line-height: 1;
            flex: 0 0 auto;
            text-decoration: none;
            box-sizing: border-box;
        }

        .parent-admin-page #adminOptinPanel.admin-optin-panel {
            overflow-x: auto;
            scrollbar-width: none;
        }
        .parent-admin-page #adminOptinPanel.admin-optin-panel::-webkit-scrollbar {
            display: none;
        }
        .parent-admin-page .admin-matrix {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: 100%;
        }
        .parent-admin-page .admin-matrix th,
        .parent-admin-page .admin-matrix td {
            padding: 0.5rem 0.35rem;
            border-bottom: 1px solid rgba(125, 138, 184, 0.18);
            vertical-align: middle;
        }
        .parent-admin-page .admin-matrix thead th {
            height: var(--admin-chore-header-height);
            min-height: var(--admin-chore-header-height);
            padding-top: 0;
            padding-bottom: 0;
            vertical-align: middle;
            box-sizing: border-box;
        }
        .parent-admin-page .admin-matrix thead tr {
            height: var(--admin-chore-header-height);
        }
        .parent-admin-page .admin-matrix thead th > * {
            vertical-align: middle;
        }
        .parent-admin-page .admin-matrix thead th:last-child {
            padding-right: var(--admin-chore-edit-reserve);
        }
        .parent-admin-page .admin-matrix tbody tr:last-child th,
        .parent-admin-page .admin-matrix tbody tr:last-child td {
            border-bottom: none;
        }
        .parent-admin-page .admin-matrix tbody th:first-child {
            padding-left: 0;
        }
        .parent-admin-page .admin-matrix-unadded-toggle-row td {
            padding: 0.26rem 0 0;
            text-align: left;
        }
        .parent-admin-page .admin-matrix-unadded-toggle {
            appearance: none;
            -webkit-appearance: none;
            display: inline-flex;
            align-items: center;
            gap: 0.34rem;
            min-height: 20px;
            padding: 0 0.34rem 0 0;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #5f3ff0;
            font: inherit;
            font-size: 0.94rem;
            font-weight: 400;
            letter-spacing: 0;
            line-height: 1.1;
            cursor: pointer;
        }
        .parent-admin-page .admin-matrix-unadded-toggle:hover,
        .parent-admin-page .admin-matrix-unadded-toggle:focus-visible {
            color: #4f2fd4;
            background: #f5f1ff;
            outline: none;
        }
        .parent-admin-page .admin-matrix-unadded-toggle-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            flex: 0 0 20px;
            color: currentColor;
        }
        .parent-admin-page .admin-matrix th.admin-matrix-subject-head {
            text-align: left;
            font-size: 0.95rem;
            color: #1f2950;
            font-weight: 400;
            min-width: 120px;
            white-space: nowrap;
        }
        .parent-admin-page .admin-chore-group-title {
            margin-bottom: 0;
            vertical-align: middle;
        }
        .parent-admin-page .admin-chore-panel-actions {
            position: absolute;
            top: 0;
            right: var(--admin-chore-edit-right);
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: var(--admin-chore-action-gap);
            height: var(--admin-chore-header-height);
            z-index: 2;
        }
        .parent-admin-page .admin-matrix-subject-head .admin-panel-menu-btn {
            vertical-align: middle;
            margin-left: 0.03rem;
            padding: 0.15rem;
        }
        .parent-admin-page .admin-matrix-kid-head {
            text-align: center;
            min-width: 78px;
            position: relative;
        }
        .parent-admin-page .admin-matrix-cards-head,
        .parent-admin-page .admin-matrix-status-head {
            text-align: center;
            min-width: 106px;
            color: #252c54;
            font-size: 0.78rem;
            font-weight: 620;
            text-transform: none;
            letter-spacing: 0;
            white-space: nowrap;
        }
        .parent-admin-page .admin-matrix-cards-head {
            min-width: 150px;
        }
        .parent-admin-page .admin-matrix-status-head {
            text-align: left;
        }
        .parent-admin-page .admin-matrix-column-head-link {
            display: inline-flex;
            align-items: center;
            gap: 0.22rem;
            justify-content: center;
            color: inherit;
            text-decoration: none;
            border-radius: 8px;
            padding: 0.12rem 0.18rem;
            transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }
        .parent-admin-page .admin-matrix-column-head-link:hover,
        .parent-admin-page .admin-matrix-column-head-link:focus-visible {
            background: #f6f8ff;
            color: #2f4cb5;
            outline: none;
        }
        .parent-admin-page .admin-matrix-today-head-link {
            width: 100%;
            box-sizing: border-box;
            justify-content: center;
            gap: 0.22rem;
            height: var(--admin-pill-height);
            min-height: var(--admin-pill-height);
            padding: 0 0.42rem;
            border: 1px solid #d8d3ff;
            border-radius: 999px;
            background: #f4f1ff;
            color: #6b5cf6;
            text-decoration: none;
        }
        .parent-admin-page .admin-matrix-today-head-link:hover,
        .parent-admin-page .admin-matrix-today-head-link:focus-visible {
            background: #ece8ff;
            border-color: #bfb6ff;
            color: #5748e8;
            box-shadow: 0 3px 8px rgba(107, 92, 246, 0.16);
        }
        .parent-admin-page .admin-matrix-kid-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 400;
            font-size: 0.9rem;
            margin: 0 auto 0.25rem;
        }
        .parent-admin-page .admin-matrix-kid-avatar--tone-0 { background: linear-gradient(135deg, #8b5cf6, #6f55d8); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-1 { background: linear-gradient(135deg, #4d84e3, #3b66c2); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-2 { background: linear-gradient(135deg, #ec5fa1, #c83f86); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-3 { background: linear-gradient(135deg, #34b89c, #1e8a73); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-4 { background: linear-gradient(135deg, #f0a23a, #d27a18); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-5 { background: linear-gradient(135deg, #ed6f5c, #c4493a); }
        .parent-admin-page .admin-matrix-kid-head-btn {
            display: inline-flex;
            flex-direction: row;
            align-items: center;
            gap: 0.18rem;
            background: none;
            border: none;
            padding: 0.15rem 0.25rem;
            border-radius: 10px;
            cursor: pointer;
            color: inherit;
            text-decoration: none;
        }
        .parent-admin-page .admin-matrix-kid-head-btn:hover,
        .parent-admin-page .admin-matrix-kid-head-btn:focus-visible {
            background: #f3f5fb;
            outline: none;
        }
        .parent-admin-page .admin-matrix-kid-head-btn--plain {
            justify-content: center;
            padding: 0.22rem 0.35rem;
            cursor: pointer;
        }
        .parent-admin-page .admin-matrix-kid-head-btn .admin-matrix-kid-avatar {
            margin: 0;
        }
        .parent-admin-page .admin-matrix-kid-name {
            font-size: 0.95rem;
            color: #2c3347;
            font-weight: 400;
            line-height: 1.1;
        }
        .parent-admin-page .admin-matrix-kid-ring-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
        }
        .parent-admin-page .admin-matrix-kid-ring-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
        }
        .parent-admin-page .admin-matrix-kid-ring-track {
            fill: none;
            stroke: #e4e8f1;
            stroke-width: 7;
        }
        .parent-admin-page .admin-matrix-kid-ring-seg {
            fill: none;
            stroke-width: 7;
            stroke-linecap: round;
            transition: stroke-dasharray 0.18s ease;
        }
        .parent-admin-page .admin-matrix-kid-ring-seg.complete { stroke: #34b89c; }
        .parent-admin-page .admin-matrix-kid-ring-seg.in-progress { stroke: #f0a23a; }
        /* Avatar SVG sizing — keep the icon centered with comfortable
           padding inside the 32px (desktop) / 20px (mobile) avatar disc.
           The avatar already sets color:#fff so SVG stroke = white. */
        .parent-admin-page .admin-matrix-kid-avatar svg {
            display: block;
        }
        /* Mode overrides — when the avatar shows an action icon instead of
           the letter, swap the tone background for the action's color. */
        .parent-admin-page .admin-matrix-kid-avatar--mode-delete {
            background: rgba(196, 73, 58, 0.82);
        }
        .parent-admin-page .admin-review-banner-stack {
            display: grid;
            gap: 0.55rem;
            margin: 0 0 0.7rem;
        }
        .parent-admin-page .admin-review-banner {
            appearance: none;
            -webkit-appearance: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            width: 100%;
            padding: 0.7rem 1rem;
            background: #fff;
            border-radius: 14px;
            border: 1px solid rgba(125, 138, 184, 0.18);
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
            margin: 0;
            text-decoration: none;
            color: inherit;
            font: inherit;
            text-align: left;
            cursor: pointer;
        }
        .parent-admin-page .admin-review-banner:hover {
            box-shadow: 0 6px 16px rgba(54, 71, 138, 0.14);
        }
        .parent-admin-page .admin-review-banner-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f3e8ff;
            color: #7848d3;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 36px;
        }
        .parent-admin-page .admin-review-banner-text {
            flex: 1 1 auto;
            color: #1f2950;
            font-size: 0.95rem;
        }
        .parent-admin-page .admin-review-banner-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            color: #4d84e3;
            font-weight: 500;
            font-size: 0.95rem;
            flex: 0 0 auto;
        }
        .parent-admin-page .admin-matrix-row-check {
            appearance: none;
            -webkit-appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            padding: 0;
            margin: 0 0.05rem 0 0;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: inherit;
            cursor: pointer;
            flex: 0 0 22px;
        }
        .parent-admin-page .admin-matrix-row-check-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 1.5px solid #cbd4e6;
            background: #fff;
            color: #fff;
            box-sizing: border-box;
            transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
        }
        .parent-admin-page .admin-matrix-row-check.is-checked .admin-matrix-row-check-box {
            background: #6b5cf6;
            border-color: #6b5cf6;
        }
        .parent-admin-page .admin-matrix-row-check:hover .admin-matrix-row-check-box,
        .parent-admin-page .admin-matrix-row-check:focus-visible .admin-matrix-row-check-box {
            border-color: #4d84e3;
            box-shadow: 0 0 0 3px rgba(77, 132, 227, 0.14);
        }
        .parent-admin-page .admin-matrix-row-check:focus-visible {
            outline: none;
        }
        .parent-admin-page .admin-subject-menu {
            position: absolute;
            background: #fff;
            border-radius: 12px;
            border: 1px solid rgba(125, 138, 184, 0.24);
            box-shadow: 0 8px 24px rgba(31, 41, 80, 0.18);
            z-index: 30;
            min-width: 200px;
            padding: 0.35rem 0;
        }
        .parent-admin-page .admin-subject-menu-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            padding: 0.55rem 0.85rem;
            font-size: 0.9rem;
            color: #1f2950;
            text-decoration: none;
            cursor: pointer;
        }
        .parent-admin-page .admin-subject-menu-item:hover {
            background: #f3f5fb;
        }
        .parent-admin-page .admin-subject-menu-item-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            color: #4d84e3;
        }
        .parent-admin-page .admin-matrix-cell {
            text-align: center;
        }
        .parent-admin-page .admin-matrix-value-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            white-space: nowrap;
        }
        .parent-admin-page .admin-off-app-matrix {
            table-layout: fixed;
        }
        .parent-admin-page .admin-off-app-name-cell {
            color: #071545;
            font-weight: 400;
            text-align: left;
        }
        .parent-admin-page .admin-off-app-action-cell {
            width: var(--admin-status-column-width, var(--paradigm-status-column-width));
        }
        .parent-admin-page .admin-off-app-row.is-editing :is(.admin-off-app-action-cell, .admin-off-app-name-cell) {
            padding-bottom: 0.18rem;
            border-bottom: 0;
        }
        .parent-admin-page .admin-off-app-row.is-editing .admin-off-app-action-cell :is(.admin-off-app-status, .admin-off-app-result-pill) {
            display: none;
        }
        .parent-admin-page .admin-off-app-edit-cell {
            padding-top: 0;
        }
        .parent-admin-page .admin-off-app-task-cell {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            gap: 0.72rem;
            min-width: 0;
        }
        .parent-admin-page .admin-off-app-tile {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            flex: 0 0 38px;
            border-radius: 10px;
            background: #eef8f1;
            color: #0caf55;
        }
        .parent-admin-page .admin-off-app-emoji {
            font-size: 1.45rem;
            line-height: 1;
        }
        .parent-admin-page .admin-off-app-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 0.16rem;
            min-width: 0;
        }
        .parent-admin-page .admin-off-app-title-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-width: 0;
            width: 100%;
        }
        .parent-admin-page .admin-off-app-name {
            min-width: 0;
            color: #1f2950;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.94rem;
            line-height: 1.3;
            font-weight: 400;
        }
        .parent-admin-page .admin-off-app-title-line .admin-off-app-point-stepper {
            margin-left: auto;
            flex: 0 0 auto;
        }
        .parent-admin-page .admin-off-app-note-preview {
            display: block;
            min-width: 0;
            overflow: visible;
            text-overflow: clip;
            white-space: normal;
            overflow-wrap: anywhere;
            color: #7c86a3;
            font-size: 0.78rem;
            line-height: 1.18;
        }
        .parent-admin-page .admin-matrix-value,
        .parent-admin-page .admin-off-app-status,
        .parent-admin-page .admin-off-app-result-pill {
            font-family: inherit;
            font-size: var(--admin-pill-font-size);
            font-weight: var(--admin-pill-font-weight);
            line-height: var(--admin-pill-line-height);
        }
        .parent-admin-page :is(.admin-off-app-status, .admin-off-app-result-pill) {
            --admin-pill-bg: #fff;
            --admin-pill-border: #d8def0;
            --admin-pill-color: #50608f;
            appearance: none;
            -webkit-appearance: none;
            display: inline-flex;
            align-items: stretch;
            justify-content: flex-start;
            gap: 0;
            min-height: var(--admin-pill-height);
            padding: 0;
            border-radius: 999px;
            border: 1px solid var(--admin-pill-border);
            background: var(--admin-pill-bg);
            color: var(--admin-pill-color);
            text-decoration: none;
            white-space: nowrap;
            box-sizing: border-box;
            overflow: hidden;
        }
        .parent-admin-page .admin-off-app-status--ready {
            cursor: pointer;
        }
        .parent-admin-page .admin-off-app-status:not(.admin-off-app-status--ready) {
            align-items: center;
            justify-content: center;
            gap: 0.15rem;
            padding: 0 0.7rem;
            overflow: visible;
        }
        .parent-admin-page .admin-off-app-status--ready:hover,
        .parent-admin-page .admin-off-app-status--ready:focus-visible {
            background: var(--admin-pill-bg);
            outline: none;
        }
        .parent-admin-page :is(.admin-off-app-status-main, .admin-off-app-status-edit, .admin-off-app-result-pill-main, .admin-off-app-result-pill-edit) {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            line-height: 1;
            text-decoration: none;
        }
        .parent-admin-page :is(.admin-off-app-status-main, .admin-off-app-result-pill-main) {
            gap: 0.35rem;
            flex: 1 1 auto;
            min-width: 0;
            padding: 0 0 0 0.30rem;
            font-size: inherit;
            font-weight: inherit;
            line-height: inherit;
            justify-content: flex-start;
        }
        .parent-admin-page :is(.admin-off-app-status-edit, .admin-off-app-result-pill-edit) {
            width: 25px;
            flex: 0 0 25px;
            opacity: 0.9;
        }

            --admin-pill-bg: #fff7e6;
            --admin-pill-border: #f3c77b;
            --admin-pill-color: #9b5a05;

        .parent-admin-page a.admin-off-app-status--pending:hover,
        .parent-admin-page a.admin-off-app-status--pending:focus-visible {
            background: var(--admin-pill-bg);
            outline: none;
        }
        .parent-admin-page .admin-off-app-result-pill {
            cursor: pointer;
        }
        .parent-admin-page .admin-off-app-result-pill.is-credited {
            --admin-pill-bg: #e8f3ea;
            --admin-pill-border: #9bcfa9;
            --admin-pill-color: #1d6c30;
        }
        .parent-admin-page .admin-off-app-result-pill.is-review {
            --admin-pill-bg: #fff7e6;
            --admin-pill-border: #f3c77b;
            --admin-pill-color: #9b5a05;
        }
        .parent-admin-page .admin-today-pill-wrong,
        .parent-admin-page .admin-today-pill-review,
        .parent-admin-page .admin-today-pill-allright {
            margin-left: 0.05rem;
            font-size: inherit;
            font-weight: inherit;
            white-space: nowrap;
        }
        .parent-admin-page .admin-today-pill-sep {
            margin-left: 0.025rem;
            color: currentColor;
            opacity: 0.55;
        }
        .parent-admin-page .admin-today-pill-wrong {
            color: #b3471b;
        }
        .parent-admin-page .admin-today-pill-review {
            color: #9b6a05;
        }
        .parent-admin-page .admin-today-pill-allright {
            color: #2f8a45;
        }
        .parent-admin-page .admin-off-app-result-pill:hover:not(:disabled),
        .parent-admin-page .admin-off-app-result-pill:focus-visible {
            background: var(--admin-pill-bg);
            outline: none;
        }
        .parent-admin-page .admin-off-app-result-pill.is-saving,
        .parent-admin-page .admin-off-app-result-pill:disabled {
            opacity: 0.7;
            cursor: progress;
        }
        .parent-admin-page .admin-today-pill {
            text-decoration: none;
            vertical-align: middle;
        }
        .parent-admin-page .admin-today-pill:not(a):not(button) {
            cursor: default;
        }
        .parent-admin-page .admin-today-pill--in_progress.is-review {
            --admin-pill-bg: #fff7e6;
            --admin-pill-border: #f3c77b;
            --admin-pill-color: #9b5a05;
        }
        .parent-admin-page .admin-off-app-grade {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 0.45rem;
            min-width: 0;
            width: 100%;
        }
        .parent-admin-page .admin-off-app-grade-actions {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.35rem;
            min-width: 0;
            justify-self: end;
        }
        .parent-admin-page .admin-off-app-point-stepper {
            justify-self: end;
        }
        .parent-admin-page .admin-off-app-note-input {
            width: 100%;
            min-width: 0;
            height: var(--admin-off-app-pill-height);
            padding: 0 0.65rem;
            border: 1px solid #d8def0;
            border-radius: 999px;
            background: #fff;
            color: #1f2950;
            font: inherit;
            font-size: 0.84rem;
            outline: none;
        }
        .parent-admin-page .admin-off-app-note-input::placeholder {
            color: #9aa3b8;
        }
        .parent-admin-page .admin-off-app-note-input:focus {
            box-shadow: inset 0 0 0 2px rgba(77, 132, 227, 0.16);
        }
        .parent-admin-page .admin-off-app-note-input:disabled {
            opacity: 0.62;
        }
        .parent-admin-page .admin-off-app-empty {
            padding: 0.75rem 0 0.15rem;
            color: #6c7794;
            font-size: 0.9rem;
            line-height: 1.35;
        }
        .parent-admin-page .admin-matrix-value {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 56px;
            height: var(--admin-pill-height);
            min-height: var(--admin-pill-height);
            box-sizing: border-box;
            padding: 0 0.6rem;
            border-radius: 999px;
            background: #f4f1ff;
            color: #6b5cf6;
            border: 1px solid transparent;
        }
        .parent-admin-page .admin-matrix-value-num {
            display: inline-block;
            min-width: 1.7em;
            text-align: right;
        }
        .parent-admin-page .admin-matrix-value.is-off {
            background: #eceff5;
            color: #6c7794;
        }
        /* View mode: hide the "Off" pill but keep its box so the checkbox stays aligned with opted-in rows */
        .parent-admin-page span.admin-matrix-value.is-off {
            visibility: hidden;
        }
        .parent-admin-page button.admin-matrix-value {
            appearance: none;
            -webkit-appearance: none;
            font-family: inherit;
            cursor: pointer;
        }
        .parent-admin-page a.admin-matrix-value--link {
            text-decoration: none;
            cursor: pointer;
            gap: 0.4rem;
            padding-right: 0.46rem;
            border-color: #d8d3ff;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }
        .parent-admin-page a.admin-matrix-value--link:hover {
            background: #ece8ff;
            border-color: #bfb6ff;
        }
        .parent-admin-page .admin-matrix-value-chev {
            display: inline-flex;
            align-items: center;
            color: #6b5cf6;
            margin-right: -0.1rem;
        }
        /* Edit-mode visual treatment — make it obvious the user is in edit mode. */
        .parent-admin-page .admin-optin-panel.is-editing {
            background: linear-gradient(180deg, #f4f6ff 0%, #eef1ff 100%);
            border-color: #4f6bd9;
            box-shadow: 0 0 0 3px rgba(79, 107, 217, 0.18), 0 6px 18px rgba(54, 71, 138, 0.16);
        }
        .parent-admin-page .admin-optin-edit-btn--done {
            background: #4f6bd9;
            color: #fff;
            border-color: #4f6bd9;
        }
        .parent-admin-page .admin-optin-edit-btn--done:hover:not(:disabled) {
            background: #3f57b8;
            border-color: #3f57b8;
            color: #fff;
        }
        .parent-admin-page .admin-matrix.is-editable .admin-matrix-value {
            border-color: rgba(79, 107, 217, 0.55);
            border-width: 1.5px;
            box-shadow: 0 1px 0 rgba(79, 107, 217, 0.08);
        }
        .parent-admin-page .admin-matrix.is-editable button.admin-matrix-value:hover {
            box-shadow: 0 3px 10px rgba(79, 107, 217, 0.22);
        }
        .parent-admin-page .admin-matrix-kid-head.is-saving .admin-matrix-kid-avatar {
            box-shadow: 0 0 0 2px #4f6bd9;
        }

        .parent-admin-page .admin-empty-state {
            background: #fff;
            border-radius: 16px;
            border: 1px solid rgba(125, 138, 184, 0.18);
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
            padding: 1.6rem 1rem;
            text-align: center;
            color: #6c7794;
        }
        .parent-admin-page .admin-empty-state h3 {
            margin: 0 0 0.45rem;
            color: #1f2950;
            font-size: 1.05rem;
            font-weight: 600;
        }
        .parent-admin-page .admin-empty-state p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.45;
        }
        .parent-admin-page .admin-empty-state p .icon {
            display: inline-flex;
            vertical-align: -3px;
            margin: 0 0.15rem;
            color: #4d84e3;
        }
        .parent-admin-page .admin-empty-state-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .parent-admin-page .admin-optin-panel {
                --admin-pill-font-size: 0.8rem;
            }

            /* iPhone-12 fit: tighten cell padding so the subject 3-dot menu sits closer to the opt-in checkbox */
            .parent-admin-page .admin-matrix th,
            .parent-admin-page .admin-matrix td {
                padding-left: 0.15rem;
                padding-right: 0.15rem;
            }
            .parent-admin-page .admin-matrix th.admin-matrix-subject-head {
                min-width: 84px;
                font-size: 0.85rem;
            }
            .parent-admin-page .admin-panel-menu-btn {
                margin-left: auto;
            }
            .parent-admin-page .admin-optin-edit-btn {
                padding: 0 0.7rem;
                font-size: 0.78rem;
                height: 34px;
                min-height: 34px;
            }
            .parent-admin-page .admin-matrix-kid-head {
                min-width: 64px;
            }
            .parent-admin-page .admin-matrix-cards-head,
            .parent-admin-page .admin-matrix-status-head {
                min-width: 80px;
                font-size: 0.72rem;
            }
            .parent-admin-page .admin-matrix-cards-head {
                min-width: 90px;
            }
            .parent-admin-page .admin-matrix-kid-avatar {
                width: 20px;
                height: 20px;
                font-size: 0.68rem;
            }
            .parent-admin-page .admin-matrix-kid-ring-wrap {
                width: 28px;
                height: 28px;
            }
            .parent-admin-page .admin-matrix-kid-name {
                font-size: 0.75rem;
            }
            .parent-admin-page .admin-matrix-unadded-toggle-row td {
                padding-top: 0.2rem;
            }
            .parent-admin-page .admin-matrix-unadded-toggle {
                min-height: 18px;
                font-size: 0.74rem;
            }
            .parent-admin-page .admin-matrix-unadded-toggle-icon {
                width: 18px;
                height: 18px;
                flex-basis: 18px;
            }
            .parent-admin-page .admin-matrix-value {
                min-width: 42px;
                min-height: var(--admin-pill-height);
                padding: 0 0.32rem;
            }
            .parent-admin-page .admin-off-app-tile {
                width: 34px;
                height: 34px;
                flex-basis: 34px;
            }
            .parent-admin-page .admin-off-app-emoji {
                font-size: 1.25rem;
            }
            .parent-admin-page .admin-off-app-grade {
                gap: 0.4rem;
            }
            .parent-admin-page .admin-off-app-grade-actions {
                gap: 0.32rem;
            }
        }

        @media (max-width: 430px) {
            .parent-admin-page .admin-optin-panel {
                --admin-pill-font-size: 0.72rem;
            }
            .parent-admin-page .admin-today-pill-wrong,
            .parent-admin-page .admin-today-pill-review,
            .parent-admin-page .admin-today-pill-allright {
                margin-left: 0;
            }
            .parent-admin-page .admin-today-pill-sep {
                margin-left: 0;
            }
            .parent-admin-page .admin-off-app-grade-actions {
                gap: 0.25rem;
            }
        }

    </style>
</head>
<body class="parent-admin-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1><span class="page-title-icon" aria-hidden="true">🏠</span> Home</h1>
                <div class="page-header-end">
                    <div id="adminKidAvatarSwitcher" class="kid-avatar-switcher hidden" role="tablist" aria-label="Kids"></div>
                    <div class="page-header-actions" data-family-user-switcher></div>
                </div>
            </div>
        </header>

        <main>
            <section id="adminOptinPanel" class="paradigm-settings-panel admin-optin-panel hidden">
                <div class="admin-chore-panel-actions">
                    <a href="/point-rules.html?kind=in_app_chore" class="paradigm-icon-btn paradigm-panel-action--circle admin-chore-panel-action admin-chore-panel-edit-link" aria-label="Edit in-app chores" title="Edit In-App Chores"><span class="icon" data-icon="pencil" data-icon-size="15"></span></a>
                </div>
                <table id="adminMatrix" class="admin-matrix"></table>

            </section>

            <section id="adminOffAppPanel" class="paradigm-settings-panel admin-optin-panel admin-off-app-panel hidden">
                <div class="admin-chore-panel-actions">
                    <a href="/point-rules.html?kind=off_app_chore" class="paradigm-icon-btn paradigm-panel-action--circle admin-chore-panel-action admin-chore-panel-edit-link" aria-label="Edit off-app chores" title="Edit Off-App Chores"><span class="icon" data-icon="pencil" data-icon-size="15"></span></a>
                </div>
                <div id="adminOffAppList" class="admin-off-app-list"></div>
            </section>

            <div id="adminEmptyState" class="admin-empty-state hidden">
                <h3>No kids yet</h3>
                <p>Add your first learner in Family Settings to get started.</p>
                <a href="/parent-settings.html" class="paradigm-btn admin-empty-state-btn"><span class="icon" data-icon="settings" data-icon-size="16"></span> Go to Settings</a>
            </div>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <div id="deckBrowseModal" class="modal hidden manage-popup-modal deck-tree-modal" aria-hidden="true">
        <div class="modal-content modal-large" role="dialog" aria-modal="true" aria-labelledby="deckBrowseHeading">
            <div class="deck-tree-header">
                <div class="deck-tree-header-left">
                    <h2 id="deckBrowseHeading" style="margin:0"><span class="icon" data-icon="layers" data-icon-size="22"></span> <span id="deckBrowseTitle">Browse Decks</span></h2>
                    <span id="deckBrowseCounter" class="deck-tree-counter"></span>
                </div>
                <div class="deck-tree-search-row">
                    <div class="search-bar deck-tree-search-wrap">
                        <input id="deckBrowseSearchInput" type="text" class="paradigm-search-input" placeholder="Search decks or card content...">
                    </div>
                    <button id="deckBrowseNewDeckBtn" type="button" class="paradigm-icon-btn" title="Create a new deck at the subject root" aria-label="New deck"><span data-icon="plus" data-icon-size="16" data-icon-stroke="2.4"></span></button>
                    <button id="deckBrowseExpandAllBtn" type="button" class="paradigm-icon-btn" title="Expand all" aria-label="Expand all"><span data-icon="chevrons-up-down" data-icon-size="14" data-icon-stroke="2.2"></span></button>
                    <button id="deckBrowseCollapseAllBtn" type="button" class="paradigm-icon-btn" title="Collapse all" aria-label="Collapse all"><span data-icon="chevrons-down-up" data-icon-size="14" data-icon-stroke="2.2"></span></button>
                </div>
            </div>
            <div class="manage-popup-modal-body">
                <div id="deckBrowseContainer" class="deck-tree-container"></div>
                <div class="deck-v2-actions deck-tree-actions">
                    <div class="deck-v2-action-row manage-modal-action-row">
                        <button id="closeDeckBrowseModalBtn" type="button" class="paradigm-icon-btn manage-modal-close-btn" aria-label="Close" title="Close"><span data-icon="x" data-icon-size="16" data-icon-stroke="2.2"></span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PWA Install Prompt (iOS Safari only, shown once) -->
    <div id="pwaInstallOverlay" class="modal hidden">
        <div class="modal-content pwa-install-modal">
            <img src="apple-touch-icon.png?v=mommy-icon2-20260607" alt="" class="pwa-install-icon">
            <h2>Install App</h2>
            <p class="pwa-install-desc">Add The Mommy App to your home screen for easy fullscreen access.</p>
            <p class="pwa-install-step">Press <strong>"Share"</strong> <svg class="pwa-install-share-icon" width="17" height="17" viewBox="0 0 50 50"><path fill="#007AFF" d="M25 1L15 12h7v18h6V12h7L25 1z"/><path fill="#007AFF" d="M10 22v22h30V22h-6v16H16V22h-6z"/></svg> below</p>
            <p class="pwa-install-step">Then <strong>"Add to Home Screen"</strong> <span class="pwa-install-plus-icon">+</span></p>
            <button type="button" id="pwaInstallDismiss" class="paradigm-btn pwa-install-dismiss">Dismiss</button>
        </div>
    </div>
    <style>
        .pwa-install-modal {
            text-align: center;
            max-width: 340px;
            padding: 1.8rem 1.5rem 1.5rem;
        }
        .pwa-install-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }
        .pwa-install-modal h2 {
            color: #e8437f;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .pwa-install-desc {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.45;
            margin-bottom: 1rem;
        }
        .pwa-install-step {
            font-size: 0.88rem;
            color: #444;
            margin-bottom: 0.5rem;
        }
        .pwa-install-share-icon {
            vertical-align: middle;
            margin: 0 0.1rem;
        }
        .pwa-install-plus-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border: 1.5px solid #333;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 700;
            vertical-align: middle;
            margin-left: 0.15rem;
        }
        .pwa-install-dismiss {
            margin-top: 1rem;
            width: 100%;
            max-width: 200px;
        }
    </style>
    <script>
    (function() {
        var isIosSafari = /iP(hone|od|ad)/.test(navigator.userAgent) &&
            /Safari/.test(navigator.userAgent) &&
            !navigator.standalone;
        if (!isIosSafari) return;
        if (localStorage.getItem('pwa-install-dismissed')) return;

        var overlay = document.getElementById('pwaInstallOverlay');
        var btn = document.getElementById('pwaInstallDismiss');
        setTimeout(function() {
            overlay.classList.remove('hidden');
        }, 2000);
        btn.addEventListener('click', function() {
            overlay.classList.add('hidden');
            localStorage.setItem('pwa-install-dismissed', '1');
        });
    })();
    </script>

    <script src="icons.js"></script>
    <script src="search-bar.js"></script>
    <script src="family-user-switcher.js"></script>
    <script src="kid-app-navigation.js"></script>
    <script src="subject-icons.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="deck-tree-view.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(() => {});
            });
        }
    </script>
    <script src="admin.js"></script>
</body>
</html>
