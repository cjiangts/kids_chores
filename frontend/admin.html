<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parent Admin - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <style>
        .parent-admin-page .admin-action-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.6rem;
            margin: 0 0 clamp(6px, 1.2vw, 12px);
        }
        .parent-admin-page .admin-action-grid.admin-action-grid--two {
            grid-template-columns: repeat(2, minmax(0, 220px));
            justify-content: start;
        }
        .parent-admin-page .admin-action-card {
            position: relative;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            gap: 0.6rem;
            padding: 0.7rem 0.85rem;
            border-radius: 14px;
            background: #fff;
            border: 1px solid rgba(125, 138, 184, 0.18);
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .parent-admin-page .admin-action-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(54, 71, 138, 0.14);
        }
        .parent-admin-page .admin-action-card:disabled,
        .parent-admin-page .admin-action-card.is-disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
        }
        .parent-admin-page .admin-action-card-icon {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            flex: 0 0 40px;
        }
        .parent-admin-page .admin-action-card-icon--blue { background: #dceee2; color: #34b89c; }
        .parent-admin-page .admin-action-card-icon--violet { background: #ece1f7; color: #7848d3; }
        .parent-admin-page .admin-action-card-icon--coral { background: #fadce8; color: #c83f86; }
        .parent-admin-page .admin-action-card-label {
            font-size: 0.92rem;
            font-weight: 500;
            color: #1f2950;
            line-height: 1.15;
            text-align: left;
        }
        .parent-admin-page .admin-action-card-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            min-width: 20px;
            height: 20px;
            padding: 0 5px;
            border-radius: 10px;
            background: #ef4068;
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 2px #fff, 0 2px 6px rgba(239, 64, 104, 0.35);
        }

        .parent-admin-page .admin-optin-panel {
            background: #fff;
            border-radius: 16px;
            border: 1px solid rgba(125, 138, 184, 0.18);
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
            padding: 0.7rem 1rem 1.1rem;
        }
        .parent-admin-page .admin-matrix-title-block {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .parent-admin-page .admin-matrix-title-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .parent-admin-page .admin-matrix-title-main {
            font-size: 1.05rem;
            font-weight: 400;
            color: #1f2950;
            line-height: 1.15;
        }
        .parent-admin-page .admin-matrix-title-sub {
            font-size: 0.78rem;
            color: #6c7794;
            margin-top: 0.12rem;
            font-weight: 400;
        }
        .parent-admin-page .admin-optin-edit-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.28rem;
            padding: 0.3rem 0.7rem;
            font-size: 0.78rem;
            font-weight: 400;
            border-radius: 8px;
            min-height: 30px;
            line-height: 1;
            flex: 0 0 auto;
        }

        .parent-admin-page .admin-matrix-wrap {
            overflow-x: auto;
            margin: 0 -0.4rem;
            padding: 0 0.4rem;
        }
        .parent-admin-page .admin-matrix {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: 100%;
        }
        .parent-admin-page .admin-matrix th,
        .parent-admin-page .admin-matrix td {
            padding: 0.5rem 0.35rem;
            border-bottom: 1px solid rgba(125, 138, 184, 0.18);
            vertical-align: middle;
        }
        .parent-admin-page .admin-matrix thead th {
            padding-top: 0.2rem;
            vertical-align: top;
        }
        .parent-admin-page .admin-matrix tbody tr:last-child th,
        .parent-admin-page .admin-matrix tbody tr:last-child td {
            border-bottom: none;
        }
        .parent-admin-page .admin-matrix th.admin-matrix-subject-head {
            text-align: left;
            font-size: 0.95rem;
            color: #1f2950;
            font-weight: 400;
            min-width: 132px;
        }
        .parent-admin-page .admin-matrix-kid-head {
            text-align: center;
            min-width: 78px;
        }
        .parent-admin-page .admin-matrix-kid-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 400;
            font-size: 1rem;
            margin: 0 auto 0.25rem;
        }
        .parent-admin-page .admin-matrix-kid-avatar--tone-0 { background: linear-gradient(135deg, #8b5cf6, #6f55d8); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-1 { background: linear-gradient(135deg, #4d84e3, #3b66c2); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-2 { background: linear-gradient(135deg, #ec5fa1, #c83f86); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-3 { background: linear-gradient(135deg, #34b89c, #1e8a73); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-4 { background: linear-gradient(135deg, #f0a23a, #d27a18); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-5 { background: linear-gradient(135deg, #ed6f5c, #c4493a); }
        .parent-admin-page .admin-matrix-kid-head-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 0.18rem;
            background: none;
            border: none;
            padding: 0.15rem 0.25rem;
            border-radius: 10px;
            cursor: pointer;
            color: inherit;
        }
        .parent-admin-page .admin-matrix-kid-head-btn:hover,
        .parent-admin-page .admin-matrix-kid-head-btn:focus-visible {
            background: #f3f5fb;
            outline: none;
        }
        .parent-admin-page .admin-matrix-kid-head-btn .admin-matrix-kid-avatar {
            margin: 0;
        }
        .parent-admin-page .admin-matrix-kid-name {
            font-size: 0.85rem;
            color: #2c3347;
            font-weight: 400;
            line-height: 1.1;
        }
        .parent-admin-page .admin-matrix-kid-caret {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #8c97b8;
            line-height: 0;
        }
        .parent-admin-page .admin-matrix-subject-cell {
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }
        .parent-admin-page .admin-matrix-subject-tile {
            --subj-size: 36px;
            flex: 0 0 36px;
        }
        .parent-admin-page .admin-matrix-subject-name {
            font-weight: 400;
            color: #1f2950;
            line-height: 1.2;
        }
        .parent-admin-page .admin-matrix-cell {
            text-align: center;
        }
        .parent-admin-page .admin-matrix-value {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 56px;
            min-height: 34px;
            padding: 0.32rem 0.6rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            background: #e8f3ea;
            color: #1d6c30;
            border: 1px solid transparent;
        }
        .parent-admin-page .admin-matrix-value.is-off {
            background: #eceff5;
            color: #6c7794;
        }
        .parent-admin-page button.admin-matrix-value {
            appearance: none;
            -webkit-appearance: none;
            font-family: inherit;
            cursor: pointer;
        }
        .parent-admin-page a.admin-matrix-value--link {
            text-decoration: none;
            cursor: pointer;
            gap: 0.18rem;
            padding-right: 0.42rem;
        }
        .parent-admin-page a.admin-matrix-value--link:hover {
            background: #d6ebda;
        }
        .parent-admin-page .admin-matrix-value-chev {
            display: inline-flex;
            align-items: center;
            color: #2f8a48;
            margin-right: -0.1rem;
        }
        .parent-admin-page .admin-matrix.is-editable .admin-matrix-value {
            border-color: rgba(125, 138, 184, 0.32);
        }
        .parent-admin-page .admin-edit-bar {
            position: fixed;
            left: 50%;
            bottom: 1rem;
            transform: translateX(-50%);
            width: min(560px, calc(100vw - 1.5rem));
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
            background: #4b5fc4;
            color: #fff;
            border-radius: 18px;
            padding: 0.75rem 1rem 0.85rem;
            box-shadow: 0 14px 36px rgba(28, 42, 82, 0.28);
            z-index: 60;
        }
        .parent-admin-page .admin-edit-bar.hidden {
            display: none;
        }
        .parent-admin-page .admin-edit-bar-info {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }
        .parent-admin-page .admin-edit-bar-title {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .parent-admin-page .admin-edit-bar-hint {
            font-size: 0.82rem;
            opacity: 0.78;
        }
        .parent-admin-page .admin-edit-bar-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem;
        }
        .parent-admin-page .admin-edit-bar-btn {
            appearance: none;
            -webkit-appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            border: 0;
            border-radius: 12px;
            padding: 0.7rem 0.9rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            min-height: 44px;
        }
        .parent-admin-page .admin-edit-bar-btn--ghost {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.55);
        }
        .parent-admin-page .admin-edit-bar-btn--ghost:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
        }
        .parent-admin-page .admin-edit-bar-btn--primary {
            background: #fff;
            color: #2f3c7e;
        }
        .parent-admin-page .admin-edit-bar-btn--primary:hover:not(:disabled) {
            background: #f0f3ff;
        }
        .parent-admin-page .admin-edit-bar-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        body.admin-edit-mode {
            padding-bottom: 9rem;
        }

        .parent-admin-page .admin-empty-state {
            background: #fff;
            border-radius: 16px;
            border: 1px solid rgba(125, 138, 184, 0.18);
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
            padding: 1.6rem 1rem;
            text-align: center;
            color: #6c7794;
        }
        .parent-admin-page .admin-empty-state h3 {
            margin: 0 0 0.45rem;
            color: #1f2950;
            font-size: 1.05rem;
            font-weight: 600;
        }
        .parent-admin-page .admin-empty-state p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.45;
        }
        .parent-admin-page .admin-empty-state p .icon {
            display: inline-flex;
            vertical-align: -3px;
            margin: 0 0.15rem;
            color: #4d84e3;
        }

        .parent-admin-page .admin-kid-menu {
            position: absolute;
            background: #fff;
            border-radius: 12px;
            border: 1px solid rgba(125, 138, 184, 0.24);
            box-shadow: 0 8px 24px rgba(31, 41, 80, 0.18);
            z-index: 30;
            min-width: 160px;
            padding: 0.35rem 0;
        }
        .parent-admin-page .admin-kid-menu-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            padding: 0.55rem 0.85rem;
            font-size: 0.9rem;
            color: #1f2950;
            cursor: pointer;
        }
        .parent-admin-page .admin-kid-menu-item-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .parent-admin-page .admin-kid-menu-item:hover {
            background: #f3f5fb;
        }
        .parent-admin-page .admin-kid-menu-item.danger {
            color: #c4493a;
        }

        @media (max-width: 600px) {
            .parent-admin-page .admin-action-grid {
                gap: 0.5rem;
            }
            .parent-admin-page .admin-action-grid.admin-action-grid--two {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .parent-admin-page .admin-action-card {
                padding: 0.5rem 0.55rem;
                gap: 0.4rem;
            }
            .parent-admin-page .admin-action-card-icon {
                width: 30px;
                height: 30px;
                flex: 0 0 30px;
            }
            .parent-admin-page .admin-action-card-icon span {
                width: 16px;
                height: 16px;
            }
            .parent-admin-page .admin-action-card-label {
                font-size: 0.72rem;
                line-height: 1.15;
            }
            .parent-admin-page .admin-action-card-badge {
                font-size: 0.6rem;
                min-width: 15px;
                height: 15px;
                padding: 0 4px;
                top: -5px;
                right: -5px;
                border-radius: 8px;
                box-shadow: 0 0 0 2px #fff, 0 1px 3px rgba(239, 64, 104, 0.35);
            }
            .parent-admin-page .admin-matrix th.admin-matrix-subject-head {
                min-width: 132px;
                font-size: 0.85rem;
            }
            .parent-admin-page .admin-matrix-title-block {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.4rem;
            }
            .parent-admin-page .admin-matrix-title-main {
                font-size: 0.95rem;
            }
            .parent-admin-page .admin-matrix-title-sub {
                font-size: 0.72rem;
            }
            .parent-admin-page .admin-optin-edit-btn {
                padding: 0.25rem 0.55rem;
                font-size: 0.72rem;
                min-height: 26px;
            }
            .parent-admin-page .admin-matrix-kid-head {
                min-width: 64px;
            }
            .parent-admin-page .admin-matrix-kid-avatar {
                width: 36px;
                height: 36px;
                font-size: 0.85rem;
            }
            .parent-admin-page .admin-matrix-kid-name {
                font-size: 0.75rem;
            }
            .parent-admin-page .admin-matrix-subject-tile {
                --subj-size: 30px;
                flex: 0 0 30px;
            }
            .parent-admin-page .admin-matrix-subject-name {
                font-size: 0.85rem;
            }
            .parent-admin-page .admin-matrix-value {
                min-width: 50px;
                min-height: 30px;
                font-size: 0.85rem;
                padding: 0.22rem 0.4rem;
            }
        }
    </style>
</head>
<body class="parent-admin-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1><span class="icon page-title-icon" data-icon="user-cog" data-icon-size="28"></span> Parent Admin</h1>
                <div class="page-header-actions page-header-actions--admin">
                    <button
                        id="newKidBtn"
                        class="btn-secondary header-action-btn"
                        type="button"
                        aria-label="Add Kid"
                        title="Add Kid"
                    >
                        <span class="header-action-icon" aria-hidden="true">
                            <span class="icon" data-icon="user-round-plus"></span>
                        </span>
                        <span class="header-action-label">Add Kid</span>
                    </button>
                    <a
                        href="/parent-settings.html"
                        class="btn-secondary header-action-btn"
                        aria-label="Settings"
                        title="Settings"
                    >
                        <span class="header-action-icon" aria-hidden="true">
                            <span class="icon" data-icon="settings"></span>
                        </span>
                        <span class="header-action-label">Settings</span>
                    </a>
                    <a href="/" class="back-btn btn-secondary page-header-back-btn header-action-btn" aria-label="Kid Mode" title="Kid Mode">
                        <span class="header-action-icon" aria-hidden="true">
                            <span class="icon" data-icon="smile"></span>
                        </span>
                        <span class="header-action-label">Kid Mode</span>
                    </a>
                </div>
            </div>
        </header>

        <main>
            <div id="adminActionGrid" class="admin-action-grid"></div>

            <div id="adminOptinPanel" class="admin-optin-panel hidden">
                <div class="admin-matrix-wrap">
                    <table id="adminMatrix" class="admin-matrix"></table>
                </div>
            </div>

            <div id="adminEditActions" class="admin-edit-bar hidden" inert>
                <div class="admin-edit-bar-info">
                    <span class="admin-edit-bar-title">Editing subjects</span>
                    <span id="adminEditHint" class="admin-edit-bar-hint" data-default-text="Tap cells to opt subjects in or out">Tap cells to opt subjects in or out</span>
                </div>
                <div class="admin-edit-bar-actions">
                    <button type="button" id="cancelEditBtn" class="admin-edit-bar-btn admin-edit-bar-btn--ghost"><span class="icon" data-icon="x" data-icon-size="18" aria-hidden="true"></span>Cancel</button>
                    <button type="button" id="saveEditBtn" class="admin-edit-bar-btn admin-edit-bar-btn--primary"><span class="icon" data-icon="check" data-icon-size="18" aria-hidden="true"></span>Save</button>
                </div>
            </div>

            <div id="adminEmptyState" class="admin-empty-state hidden">
                <h3>No kids yet</h3>
                <p>Tap <span class="icon" data-icon="user-round-plus" data-icon-size="16"></span> Add Kid to add your first learner.</p>
            </div>

            <!-- New Kid Form Modal -->
            <div id="kidModal" class="modal hidden">
                <div class="modal-content">
                    <h2>Add Kid</h2>
                    <form id="kidForm">
                        <div class="form-group">
                            <input type="text" id="kidName" required placeholder="Enter kid's name">
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="kidFormSaveBtn" class="btn-primary" disabled>Save</button>
                            <button type="button" id="cancelBtn" class="btn-secondary">Close</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <!-- PWA Install Prompt (iOS Safari only, shown once) -->
    <div id="pwaInstallOverlay" class="modal hidden">
        <div class="modal-content pwa-install-modal">
            <img src="apple-touch-icon.png" alt="" class="pwa-install-icon">
            <h2>Install App</h2>
            <p class="pwa-install-desc">Add Kids Daily Chores to your home screen for easy fullscreen access.</p>
            <p class="pwa-install-step">Press <strong>"Share"</strong> <svg class="pwa-install-share-icon" width="17" height="17" viewBox="0 0 50 50"><path fill="#007AFF" d="M25 1L15 12h7v18h6V12h7L25 1z"/><path fill="#007AFF" d="M10 22v22h30V22h-6v16H16V22h-6z"/></svg> below</p>
            <p class="pwa-install-step">Then <strong>"Add to Home Screen"</strong> <span class="pwa-install-plus-icon">+</span></p>
            <button type="button" id="pwaInstallDismiss" class="btn-primary pwa-install-dismiss">Dismiss</button>
        </div>
    </div>
    <style>
        .pwa-install-modal {
            text-align: center;
            max-width: 340px;
            padding: 1.8rem 1.5rem 1.5rem;
        }
        .pwa-install-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }
        .pwa-install-modal h2 {
            color: #e8437f;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .pwa-install-desc {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.45;
            margin-bottom: 1rem;
        }
        .pwa-install-step {
            font-size: 0.88rem;
            color: #444;
            margin-bottom: 0.5rem;
        }
        .pwa-install-share-icon {
            vertical-align: middle;
            margin: 0 0.1rem;
        }
        .pwa-install-plus-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border: 1.5px solid #333;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 700;
            vertical-align: middle;
            margin-left: 0.15rem;
        }
        .pwa-install-dismiss {
            margin-top: 1rem;
            width: 100%;
            max-width: 200px;
        }
    </style>
    <script>
    (function() {
        var isIosSafari = /iP(hone|od|ad)/.test(navigator.userAgent) &&
            /Safari/.test(navigator.userAgent) &&
            !navigator.standalone;
        if (!isIosSafari) return;
        if (localStorage.getItem('pwa-install-dismissed')) return;

        var overlay = document.getElementById('pwaInstallOverlay');
        var btn = document.getElementById('pwaInstallDismiss');
        setTimeout(function() {
            overlay.classList.remove('hidden');
        }, 2000);
        btn.addEventListener('click', function() {
            overlay.classList.add('hidden');
            localStorage.setItem('pwa-install-dismissed', '1');
        });
    })();
    </script>

    <script src="icons.js"></script>
    <script src="subject-icons.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="admin.js"></script>
</body>
</html>
