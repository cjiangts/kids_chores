<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
    <link rel="stylesheet" href="deck-tree-view.css">
    <style>
        .parent-admin-page .admin-optin-panel {
            background: #fff;
            border-radius: 16px;
            border: 1px solid rgba(125, 138, 184, 0.18);
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
            padding: 0.7rem 1rem 1.1rem;
        }
        .parent-admin-page .admin-matrix-title-block {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .parent-admin-page .admin-matrix-title-header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            min-width: 0;
        }
        .parent-admin-page .admin-matrix-title-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .parent-admin-page .admin-panel-menu-btn {
            appearance: none;
            -webkit-appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            background: none;
            border: none;
            color: #6c7794;
            border-radius: 8px;
            cursor: pointer;
            line-height: 0;
            flex: 0 0 auto;
        }
        .parent-admin-page .admin-panel-menu-btn:hover,
        .parent-admin-page .admin-panel-menu-btn:focus-visible {
            background: #f3f5fb;
            color: #2f4cb5;
            outline: none;
        }
        .parent-admin-page .admin-panel-menu-btn.is-hidden {
            visibility: hidden;
            pointer-events: none;
        }
        .parent-admin-page .admin-matrix-title-main {
            font-size: 1.05rem;
            font-weight: 400;
            color: #1f2950;
            line-height: 1.15;
        }
        .parent-admin-page .admin-matrix-title-sub {
            font-size: 0.78rem;
            color: #6c7794;
            margin-top: 0.12rem;
            font-weight: 400;
        }
        .parent-admin-page .admin-matrix-title-actions {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }
        .parent-admin-page .admin-optin-edit-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.28rem;
            padding: 0.3rem 0.7rem;
            font-size: 0.78rem;
            font-weight: 400;
            border-radius: 8px;
            min-height: 30px;
            line-height: 1;
            flex: 0 0 auto;
            text-decoration: none;
        }

        .parent-admin-page .admin-matrix-wrap {
            overflow-x: auto;
            margin: 0 -0.4rem;
            padding: 0 0.4rem;
        }
        .parent-admin-page .admin-matrix {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: 100%;
        }
        .parent-admin-page .admin-matrix th,
        .parent-admin-page .admin-matrix td {
            padding: 0.5rem 0.35rem;
            border-bottom: 1px solid rgba(125, 138, 184, 0.18);
            vertical-align: middle;
        }
        .parent-admin-page .admin-matrix thead th {
            padding-top: 0.2rem;
            vertical-align: top;
        }
        .parent-admin-page .admin-matrix tbody tr:last-child th,
        .parent-admin-page .admin-matrix tbody tr:last-child td {
            border-bottom: none;
        }
        .parent-admin-page .admin-matrix th.admin-matrix-subject-head {
            text-align: left;
            font-size: 0.95rem;
            color: #1f2950;
            font-weight: 400;
            min-width: 132px;
        }
        .parent-admin-page .admin-matrix-kid-head {
            text-align: center;
            min-width: 78px;
        }
        .parent-admin-page .admin-matrix-kid-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 400;
            font-size: 1rem;
            margin: 0 auto 0.25rem;
        }
        .parent-admin-page .admin-matrix-kid-avatar--tone-0 { background: linear-gradient(135deg, #8b5cf6, #6f55d8); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-1 { background: linear-gradient(135deg, #4d84e3, #3b66c2); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-2 { background: linear-gradient(135deg, #ec5fa1, #c83f86); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-3 { background: linear-gradient(135deg, #34b89c, #1e8a73); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-4 { background: linear-gradient(135deg, #f0a23a, #d27a18); }
        .parent-admin-page .admin-matrix-kid-avatar--tone-5 { background: linear-gradient(135deg, #ed6f5c, #c4493a); }
        .parent-admin-page .admin-matrix-kid-head-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 0.18rem;
            background: none;
            border: none;
            padding: 0.15rem 0.25rem;
            border-radius: 10px;
            cursor: pointer;
            color: inherit;
            text-decoration: none;
        }
        .parent-admin-page .admin-matrix-kid-head-btn:hover,
        .parent-admin-page .admin-matrix-kid-head-btn:focus-visible {
            background: #f3f5fb;
            outline: none;
        }
        .parent-admin-page .admin-matrix-kid-head-btn .admin-matrix-kid-avatar {
            margin: 0;
        }
        .parent-admin-page .admin-matrix-kid-name {
            font-size: 0.85rem;
            color: #2c3347;
            font-weight: 400;
            line-height: 1.1;
        }
        .parent-admin-page .admin-matrix-kid-ring-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
        }
        .parent-admin-page .admin-matrix-kid-ring-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
        }
        .parent-admin-page .admin-matrix-kid-ring-track {
            fill: none;
            stroke: #e4e8f1;
            stroke-width: 3.5;
        }
        .parent-admin-page .admin-matrix-kid-ring-seg {
            fill: none;
            stroke-width: 3.5;
            stroke-linecap: round;
            transition: stroke-dasharray 0.18s ease;
        }
        .parent-admin-page .admin-matrix-kid-ring-seg.complete { stroke: #34b89c; }
        .parent-admin-page .admin-matrix-kid-ring-seg.in-progress { stroke: #f0a23a; }
        .parent-admin-page .admin-matrix-kid-delete-btn {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(196, 73, 58, 0.82);
            color: #fff;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            line-height: 0;
            box-shadow: 0 2px 6px rgba(196, 73, 58, 0.35);
            z-index: 2;
        }
        .parent-admin-page .admin-matrix-kid-delete-btn:hover,
        .parent-admin-page .admin-matrix-kid-delete-btn:focus-visible {
            background: #a8392c;
            outline: none;
        }
        .parent-admin-page .admin-review-banner {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1rem;
            background: #fff;
            border-radius: 14px;
            border: 1px solid rgba(125, 138, 184, 0.18);
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
            margin: 0 0 0.7rem;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .parent-admin-page .admin-review-banner:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(54, 71, 138, 0.14);
        }
        .parent-admin-page .admin-review-banner-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f3e8ff;
            color: #7848d3;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 36px;
        }
        .parent-admin-page .admin-review-banner-text {
            flex: 1 1 auto;
            color: #1f2950;
            font-size: 0.95rem;
        }
        .parent-admin-page .admin-review-banner-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            color: #4d84e3;
            font-weight: 500;
            font-size: 0.95rem;
            flex: 0 0 auto;
        }
        .parent-admin-page .admin-matrix-subject-cell {
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }
        .parent-admin-page .admin-matrix-subject-tile {
            --subj-size: 36px;
            flex: 0 0 36px;
        }
        .parent-admin-page .admin-matrix-subject-name {
            font-weight: 400;
            color: #1f2950;
            line-height: 1.2;
        }
        .parent-admin-page .admin-matrix-subject-menu-btn {
            appearance: none;
            -webkit-appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.15rem;
            padding: 0.15rem;
            background: none;
            border: none;
            color: #6c7794;
            border-radius: 6px;
            cursor: pointer;
            line-height: 0;
            flex: 0 0 auto;
        }
        .parent-admin-page .admin-matrix-subject-menu-btn:hover,
        .parent-admin-page .admin-matrix-subject-menu-btn:focus-visible {
            background: #f3f5fb;
            color: #2f4cb5;
            outline: none;
        }
        .parent-admin-page .admin-subject-menu {
            position: absolute;
            background: #fff;
            border-radius: 12px;
            border: 1px solid rgba(125, 138, 184, 0.24);
            box-shadow: 0 8px 24px rgba(31, 41, 80, 0.18);
            z-index: 30;
            min-width: 200px;
            padding: 0.35rem 0;
        }
        .parent-admin-page .admin-subject-menu-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            padding: 0.55rem 0.85rem;
            font-size: 0.9rem;
            color: #1f2950;
            text-decoration: none;
            cursor: pointer;
        }
        .parent-admin-page .admin-subject-menu-item:hover {
            background: #f3f5fb;
        }
        .parent-admin-page .admin-subject-menu-item-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            color: #4d84e3;
        }
        .parent-admin-page .admin-matrix-cell {
            text-align: center;
        }
        .parent-admin-page .admin-matrix-value {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 56px;
            min-height: 34px;
            padding: 0.32rem 0.6rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            background: #e8f3ea;
            color: #1d6c30;
            border: 1px solid transparent;
        }
        .parent-admin-page .admin-matrix-value.is-off {
            background: #eceff5;
            color: #6c7794;
        }
        .parent-admin-page button.admin-matrix-value {
            appearance: none;
            -webkit-appearance: none;
            font-family: inherit;
            cursor: pointer;
        }
        .parent-admin-page a.admin-matrix-value--link {
            text-decoration: none;
            cursor: pointer;
            gap: 0.18rem;
            padding-right: 0.42rem;
        }
        .parent-admin-page a.admin-matrix-value--link:hover {
            background: #d6ebda;
        }
        .parent-admin-page .admin-matrix-value-chev {
            display: inline-flex;
            align-items: center;
            color: #2f8a48;
            margin-right: -0.1rem;
        }
        /* Edit-mode visual treatment — make it obvious the user is in edit mode. */
        .parent-admin-page .admin-optin-panel.is-editing {
            background: linear-gradient(180deg, #f4f6ff 0%, #eef1ff 100%);
            border-color: #4f6bd9;
            box-shadow: 0 0 0 3px rgba(79, 107, 217, 0.18), 0 6px 18px rgba(54, 71, 138, 0.16);
        }
        .parent-admin-page .admin-matrix-title-sub--edit {
            color: #4f6bd9;
            font-weight: 600;
        }
        .parent-admin-page .admin-optin-edit-btn--space-keeper {
            visibility: hidden;
            pointer-events: none;
        }
        .parent-admin-page .admin-optin-edit-btn--done {
            background: #4f6bd9;
            color: #fff;
            border-color: #4f6bd9;
        }
        .parent-admin-page .admin-optin-edit-btn--done:hover:not(:disabled) {
            background: #3f57b8;
            border-color: #3f57b8;
            color: #fff;
        }
        .parent-admin-page .admin-matrix.is-editable .admin-matrix-value {
            border-color: rgba(79, 107, 217, 0.55);
            border-width: 1.5px;
            box-shadow: 0 1px 0 rgba(79, 107, 217, 0.08);
        }
        .parent-admin-page .admin-matrix.is-editable button.admin-matrix-value:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(79, 107, 217, 0.22);
        }
        .parent-admin-page .admin-matrix.is-editable button.admin-matrix-value:active {
            transform: translateY(0);
        }
        .parent-admin-page .admin-matrix-kid-head.is-saving .admin-matrix-kid-avatar {
            box-shadow: 0 0 0 2px #4f6bd9;
        }

        .parent-admin-page .admin-empty-state {
            background: #fff;
            border-radius: 16px;
            border: 1px solid rgba(125, 138, 184, 0.18);
            box-shadow: 0 2px 10px rgba(54, 71, 138, 0.08);
            padding: 1.6rem 1rem;
            text-align: center;
            color: #6c7794;
        }
        .parent-admin-page .admin-empty-state h3 {
            margin: 0 0 0.45rem;
            color: #1f2950;
            font-size: 1.05rem;
            font-weight: 600;
        }
        .parent-admin-page .admin-empty-state p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.45;
        }
        .parent-admin-page .admin-empty-state p .icon {
            display: inline-flex;
            vertical-align: -3px;
            margin: 0 0.15rem;
            color: #4d84e3;
        }
        .parent-admin-page .admin-empty-state-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .parent-admin-page .admin-matrix th.admin-matrix-subject-head {
                min-width: 132px;
                font-size: 0.85rem;
            }
            .parent-admin-page .admin-matrix-title-block {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.4rem;
            }
            .parent-admin-page .admin-matrix-title-header {
                width: 100%;
            }
            .parent-admin-page .admin-panel-menu-btn {
                margin-left: auto;
            }
            .parent-admin-page .admin-matrix-title-main {
                font-size: 0.95rem;
            }
            .parent-admin-page .admin-matrix-title-sub {
                font-size: 0.72rem;
            }
            .parent-admin-page .admin-optin-edit-btn {
                padding: 0.25rem 0.55rem;
                font-size: 0.72rem;
                min-height: 26px;
            }
            .parent-admin-page .admin-matrix-kid-head {
                min-width: 64px;
            }
            .parent-admin-page .admin-matrix-kid-avatar {
                width: 36px;
                height: 36px;
                font-size: 0.85rem;
            }
            .parent-admin-page .admin-matrix-kid-ring-wrap {
                width: 50px;
                height: 50px;
            }
            .parent-admin-page .admin-matrix-kid-name {
                font-size: 0.75rem;
            }
            .parent-admin-page .admin-matrix-subject-tile {
                --subj-size: 30px;
                flex: 0 0 30px;
            }
            .parent-admin-page .admin-matrix-subject-name {
                font-size: 0.85rem;
            }
            .parent-admin-page .admin-matrix-subject-menu-btn {
                margin-left: auto;
            }
            .parent-admin-page .admin-matrix-value {
                min-width: 50px;
                min-height: 30px;
                font-size: 0.85rem;
                padding: 0.22rem 0.4rem;
            }
        }
    </style>
</head>
<body class="parent-admin-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1><span class="page-title-icon" aria-hidden="true">🧸</span> Kids Daily Chores</h1>
                <div class="page-header-actions">
                    <a href="/parent-settings.html" class="back-btn btn-secondary page-header-back-btn" aria-label="Settings" title="Settings"><span class="icon" data-icon="settings" data-icon-size="18"></span> Settings</a>
                </div>
            </div>
        </header>

        <main>
            <div id="adminReviewBanner" class="hidden"></div>

            <div id="adminOptinPanel" class="admin-optin-panel hidden">
                <div id="adminMatrixWrap" class="admin-matrix-wrap">
                    <table id="adminMatrix" class="admin-matrix"></table>
                </div>

                <a href="/" class="admin-start-practice-btn" id="startPracticeBtn">
                    <span class="icon" data-icon="play" data-icon-size="18" data-icon-stroke="2.4"></span>
                    <span class="admin-start-practice-btn-label">Start Practice</span>
                </a>
            </div>

            <div id="adminEmptyState" class="admin-empty-state hidden">
                <h3>No kids yet</h3>
                <p>Add your first learner to get started.</p>
                <button type="button" class="btn-secondary admin-empty-state-btn" data-action="add-kid"><span class="icon" data-icon="user-round-plus" data-icon-size="16"></span> Add Kid</button>
            </div>

            <!-- New Kid Form Modal -->
            <div id="kidModal" class="modal hidden">
                <div class="modal-content">
                    <h2><span class="icon" data-icon="user-round-plus" data-icon-size="22"></span> Add Kid</h2>
                    <form id="kidForm">
                        <div class="form-group">
                            <input type="text" id="kidName" required placeholder="Enter kid's name">
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="kidFormSaveBtn" class="btn-primary" disabled><span class="icon" data-icon="check" data-icon-size="16" data-icon-stroke="2.2"></span> <span class="btn-label">Save</span></button>
                            <button type="button" id="cancelBtn" class="btn-secondary"><span class="icon" data-icon="x" data-icon-size="16" data-icon-stroke="2.2"></span> Close</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <div id="deckBrowseModal" class="modal hidden manage-popup-modal deck-tree-modal" aria-hidden="true">
        <div class="modal-content modal-large" role="dialog" aria-modal="true" aria-labelledby="deckBrowseHeading">
            <div class="deck-tree-header">
                <div class="deck-tree-header-left">
                    <h2 id="deckBrowseHeading" style="margin:0"><span class="icon" data-icon="layers" data-icon-size="22"></span> <span id="deckBrowseTitle">Browse Decks</span></h2>
                    <span id="deckBrowseCounter" class="deck-tree-counter"></span>
                </div>
                <div class="deck-tree-search-row">
                    <div class="search-bar deck-tree-search-wrap">
                        <input id="deckBrowseSearchInput" type="text" class="search-bar-input" placeholder="Search decks or card content...">
                    </div>
                    <button id="deckBrowseNewDeckBtn" type="button" class="deck-tree-icon-btn deck-tree-icon-btn-primary" title="Create a new deck at the subject root" aria-label="New deck"><span data-icon="plus" data-icon-size="14" data-icon-stroke="2.4"></span><span class="deck-tree-icon-btn-label">New deck</span></button>
                    <button id="deckBrowseExpandAllBtn" type="button" class="deck-tree-icon-btn" title="Expand all" aria-label="Expand all"><span data-icon="chevrons-up-down" data-icon-size="14" data-icon-stroke="2.2"></span><span class="deck-tree-icon-btn-label">Expand</span></button>
                    <button id="deckBrowseCollapseAllBtn" type="button" class="deck-tree-icon-btn" title="Collapse all" aria-label="Collapse all"><span data-icon="chevrons-down-up" data-icon-size="14" data-icon-stroke="2.2"></span><span class="deck-tree-icon-btn-label">Collapse</span></button>
                </div>
            </div>
            <div class="manage-popup-modal-body">
                <div id="deckBrowseContainer" class="deck-tree-container"></div>
                <div class="deck-v2-actions deck-tree-actions">
                    <div class="deck-v2-action-row deck-tree-action-row-secondary">
                        <button id="closeDeckBrowseModalBtn" type="button" class="btn-secondary"><span data-icon="x" data-icon-size="16" data-icon-stroke="2.2"></span><span>Close</span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PWA Install Prompt (iOS Safari only, shown once) -->
    <div id="pwaInstallOverlay" class="modal hidden">
        <div class="modal-content pwa-install-modal">
            <img src="apple-touch-icon.png" alt="" class="pwa-install-icon">
            <h2>Install App</h2>
            <p class="pwa-install-desc">Add Kids Daily Chores to your home screen for easy fullscreen access.</p>
            <p class="pwa-install-step">Press <strong>"Share"</strong> <svg class="pwa-install-share-icon" width="17" height="17" viewBox="0 0 50 50"><path fill="#007AFF" d="M25 1L15 12h7v18h6V12h7L25 1z"/><path fill="#007AFF" d="M10 22v22h30V22h-6v16H16V22h-6z"/></svg> below</p>
            <p class="pwa-install-step">Then <strong>"Add to Home Screen"</strong> <span class="pwa-install-plus-icon">+</span></p>
            <button type="button" id="pwaInstallDismiss" class="btn-primary pwa-install-dismiss">Dismiss</button>
        </div>
    </div>
    <style>
        .pwa-install-modal {
            text-align: center;
            max-width: 340px;
            padding: 1.8rem 1.5rem 1.5rem;
        }
        .pwa-install-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }
        .pwa-install-modal h2 {
            color: #e8437f;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .pwa-install-desc {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.45;
            margin-bottom: 1rem;
        }
        .pwa-install-step {
            font-size: 0.88rem;
            color: #444;
            margin-bottom: 0.5rem;
        }
        .pwa-install-share-icon {
            vertical-align: middle;
            margin: 0 0.1rem;
        }
        .pwa-install-plus-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border: 1.5px solid #333;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 700;
            vertical-align: middle;
            margin-left: 0.15rem;
        }
        .pwa-install-dismiss {
            margin-top: 1rem;
            width: 100%;
            max-width: 200px;
        }
    </style>
    <script>
    (function() {
        var isIosSafari = /iP(hone|od|ad)/.test(navigator.userAgent) &&
            /Safari/.test(navigator.userAgent) &&
            !navigator.standalone;
        if (!isIosSafari) return;
        if (localStorage.getItem('pwa-install-dismissed')) return;

        var overlay = document.getElementById('pwaInstallOverlay');
        var btn = document.getElementById('pwaInstallDismiss');
        setTimeout(function() {
            overlay.classList.remove('hidden');
        }, 2000);
        btn.addEventListener('click', function() {
            overlay.classList.add('hidden');
            localStorage.setItem('pwa-install-dismissed', '1');
        });
    })();
    </script>
