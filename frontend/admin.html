<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Admin - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home-redesign-v4.css">
</head>
<body class="parent-admin-page">
    <div class="container">
        <header class="page-header-with-back page-header-with-actions">
            <div class="page-header-row">
                <h1>👨‍👩‍👧 Parent Admin</h1>
                <div class="page-header-actions page-header-actions--admin">
                    <button
                        id="newKidBtn"
                        class="btn-secondary header-action-btn header-action-btn--compact"
                        type="button"
                        aria-label="Add New Kid"
                        title="Add New Kid"
                    >
                        <span class="header-action-icon" aria-hidden="true">➕️</span>
                        <span class="header-action-label">Add New Kid</span>
                    </button>
                    <a
                        href="/parent-settings.html"
                        class="btn-secondary header-action-btn header-action-btn--compact"
                        aria-label="Settings"
                        title="Settings"
                    >
                        <span class="header-action-icon" aria-hidden="true">⚙️</span>
                        <span class="header-action-label">Settings</span>
                    </a>
                    <a
                        id="manageDecksLink"
                        href="/deck-manage.html"
                        class="btn-secondary header-action-btn header-action-btn--compact"
                        aria-label="Manage Decks"
                        title="Manage Decks"
                    >
                        <span class="header-action-icon" aria-hidden="true">🗂️</span>
                        <span class="header-action-label">Manage Decks</span>
                    </a>
                    <a href="/" class="back-btn btn-secondary page-header-back-btn header-action-btn">
                        <span class="header-action-icon" aria-hidden="true">👦👧</span>
                        <span class="header-action-label">Kid Mode</span>
                    </a>
                    <a href="#" id="parentLogoutLink" class="back-btn btn-secondary header-action-btn">
                        <span class="header-action-icon" aria-hidden="true">🚪</span>
                        <span class="header-action-label">Log Out</span>
                    </a>
                </div>
            </div>
        </header>

        <main>
            <div id="kidsList" class="kids-grid">
                <!-- Kids will be loaded here -->
            </div>

            <!-- New Kid Form Modal -->
            <div id="kidModal" class="modal hidden">
                <div class="modal-content">
                    <h2>Add New Kid</h2>
                    <form id="kidForm">
                        <div class="form-group">
                            <label for="kidName">Name:</label>
                            <input type="text" id="kidName" required placeholder="Enter kid's name">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-secondary">Save</button>
                            <button type="button" id="cancelBtn" class="btn-secondary">Close</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Deck Category Opt-in Modal -->
            <div id="deckCategoryModal" class="modal hidden">
                <div class="modal-content modal-large">
                    <h2>Opt-in Deck Categories</h2>
                    <p id="deckCategoryKidLabel" class="modal-subtitle"></p>
                    <p class="modal-subtitle">Click a category to move between Available and Opted-in.</p>
                    <div class="deck-category-grid">
                        <div class="deck-category-column">
                            <h3 id="deckCategoryAvailableTitle">Available Deck Categories (0)</h3>
                            <div id="deckCategoryAvailableBubbles" class="deck-category-bubble-wrap"></div>
                            <p id="deckCategoryAvailableEmpty" class="deck-category-empty hidden">No available deck category.</p>
                        </div>
                        <div class="deck-category-column">
                            <h3 id="deckCategoryOptedTitle">Opted-in Deck Categories (0)</h3>
                            <div id="deckCategoryOptedBubbles" class="deck-category-bubble-wrap"></div>
                            <p id="deckCategoryOptedEmpty" class="deck-category-empty">No deck category opted in.</p>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="deckCategoryConfirmBtn" class="btn-secondary">Confirm</button>
                        <button type="button" id="deckCategoryCancelBtn" class="btn-secondary">Close</button>
                    </div>
                </div>
            </div>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <script src="deck-category-common.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="admin.js"></script>
</body>
</html>
