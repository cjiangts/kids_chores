<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Decks - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .deck-page {
            max-width: 1000px;
            margin: 0 auto;
        }

        .deck-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .deck-tags {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }

        .deck-tag {
            background: #eef3ff;
            color: #2f3c7e;
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
            font-size: 0.82rem;
        }

        .deck-empty {
            color: #666;
            font-size: 0.95rem;
            padding: 0.4rem 0;
        }

        .available-filter {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin: 0.6rem 0 0.9rem 0;
            flex-wrap: wrap;
        }

        .available-filter .form-group {
            flex: 1;
            margin-bottom: 0;
            min-width: 240px;
        }

        .bulk-actions {
            display: flex;
            gap: 0.55rem;
            align-items: center;
            margin: 0.35rem 0 0.9rem 0;
            flex-wrap: wrap;
        }

        .bulk-actions label {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.92rem;
            color: #333;
        }

        .bulk-selection-meta {
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="manage-page">
    <div class="container deck-page">
        <header>
            <h1>🗂️ Manage Decks</h1>
            <p>View decks created by this family, or create a new shared deck.</p>
        </header>

        <main>
            <div class="actions admin-actions">
                <a href="/admin.html" class="btn-secondary">← Back to Admin</a>
            </div>

            <section class="deck-panel">
                <h2 style="margin: 0 0 0.7rem 0; color: #2f3c7e;">My Created Decks</h2>
                <div class="actions">
                    <button id="createDeckNavBtn" type="button" class="btn-primary">Create New Deck</button>
                    <button id="createDeckBulkNavBtn" type="button" class="btn-secondary">Bulk Create New Decks</button>
                </div>

                <div class="available-filter">
                    <div class="form-group">
                        <select id="deckTagFilter" class="sort-select">
                            <option value="">Add filter tag...</option>
                        </select>
                    </div>
                </div>

                <div class="bulk-actions">
                    <label>
                        <input id="selectAllVisibleCheckbox" type="checkbox">
                        Select all visible
                    </label>
                    <button id="deleteSelectedBtn" type="button" class="btn-secondary">Delete Selected</button>
                    <span id="bulkSelectionMeta" class="bulk-selection-meta">0 selected</span>
                </div>

                <div id="emptyState" class="deck-empty hidden">No decks yet. Create your first one.</div>

                <div id="tableWrap" class="shared-report-table-wrap hidden">
                    <table class="shared-report-table">
                        <thead>
                            <tr>
                                <th style="width: 90px;">Deck ID</th>
                                <th>Tags</th>
                                <th style="width: 110px;">Cards</th>
                                <th class="shared-report-table-action-cell">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="deckTableBody"></tbody>
                    </table>
                </div>
            </section>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-manage.js"></script>
</body>
</html>
