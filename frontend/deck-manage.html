<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Decks - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .deck-page {
            max-width: 1000px;
            margin: 0 auto;
        }

        .deck-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .deck-tags {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }

        .deck-tag {
            background: #eef3ff;
            color: #2f3c7e;
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
            font-size: 0.82rem;
        }

        .deck-empty {
            color: #666;
            font-size: 0.95rem;
            padding: 0.4rem 0;
        }

        .deck-tags-col {
            width: 240px;
        }

        .deck-id-col {
            width: 70px;
        }

        .available-filter {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin: 0.6rem 0 0.9rem 0;
            flex-wrap: wrap;
        }

        .available-filter .form-group {
            flex: 1;
            margin-bottom: 0;
            min-width: 240px;
        }

        .bulk-actions {
            display: flex;
            gap: 0.55rem;
            align-items: center;
            margin: 0.35rem 0 0.9rem 0;
            flex-wrap: wrap;
        }

        .deck-category-filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.55rem;
            margin: 0.35rem 0 0.8rem;
        }

        .deck-category-filter-btn {
            border: 1px solid #c8d1e1;
            border-radius: 10px;
            background: #fff;
            color: #233044;
            text-align: left;
            cursor: pointer;
            padding: 0.68rem 0.75rem;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .deck-category-filter-btn:hover {
            border-color: #4f83ff;
            transform: translateY(-1px);
        }

        .deck-category-filter-btn.active {
            border-color: #4f83ff;
            box-shadow: 0 0 0 3px rgba(79, 131, 255, 0.16);
            background: #f7faff;
        }

        .deck-category-filter-title {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: #233044;
            margin-bottom: 0.18rem;
            word-break: break-word;
        }

        .deck-category-filter-desc {
            display: block;
            font-size: 0.82rem;
            line-height: 1.35;
            color: #4b5a70;
        }

        .deck-category-manage-btn {
            border-style: dashed;
            border-color: #86a6ee;
            background: #f7faff;
        }

        .deck-category-manage-btn:hover {
            border-color: #4f83ff;
            box-shadow: 0 0 0 3px rgba(79, 131, 255, 0.12);
        }

        .deck-category-filter-plus {
            display: inline-block;
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1;
            margin-right: 0.42rem;
            color: #2f5fc6;
            vertical-align: -0.05em;
        }

    </style>
</head>
<body class="manage-page">
    <div class="container deck-page">
        <header class="page-header-with-back">
            <div class="page-header-row">
                <h1>🗂️ Manage Decks</h1>
                <a href="/admin.html" class="back-btn btn-secondary page-header-back-btn">← Back</a>
            </div>
        </header>

        <main>
            <section class="deck-panel">
                <h2 class="deck-section-title">My Created Decks</h2>
                <div class="actions">
                    <button id="createDeckNavBtn" type="button" class="btn-primary">Create New Deck</button>
                    <button id="createDeckBulkNavBtn" type="button" class="btn-primary">Bulk Create New Decks</button>
                </div>

                <div id="deckCategoryFilterWrap" class="deck-category-filter-row"></div>

                <div class="available-filter">
                    <div class="form-group">
                        <select id="deckTagFilter" class="sort-select">
                            <option value="">Filter by secondary tag...</option>
                        </select>
                    </div>
                </div>

                <div class="bulk-actions">
                    <button id="deleteSelectedBtn" type="button" class="btn-danger">Delete Shown (0)</button>
                </div>

                <div id="emptyState" class="deck-empty hidden">No decks yet. Create your first one.</div>

                <div id="tableWrap" class="shared-report-table-wrap hidden">
                    <table class="shared-report-table">
                        <thead>
                            <tr>
                                <th class="shared-report-table-action-cell">Actions</th>
                                <th class="deck-id-col">Deck ID</th>
                                <th class="deck-tags-col">Tags</th>
                                <th class="table-col-110">Cards</th>
                            </tr>
                        </thead>
                        <tbody id="deckTableBody"></tbody>
                    </table>
                </div>
            </section>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="deck-manage.js"></script>
</body>
</html>
