<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Decks - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subject-icons.css">
    <style>

        @media (max-width: 520px) {
            .deck-manage-page .deck-panel {
                margin-bottom: 6px;
            }
        }

        .deck-empty {
            color: #666;
            font-size: 0.95rem;
            padding: 0.4rem 0;
        }

        .deck-manage-page .actions {
            gap: 0.75rem;
        }

        @media (max-width: 520px) {
            .deck-manage-page .actions {
                gap: 0.4rem;
                margin-bottom: 6px;
            }

            .deck-manage-page .deck-category-filter-row {
                gap: 0.4rem;
                margin-bottom: 6px;
                padding: var(--mobile-panel-padding);
            }

            .deck-manage-page .deck-category-filter-row:empty {
                display: none;
            }
        }

        .deck-manage-page .actions .btn-secondary,
        .deck-manage-page .bulk-actions .btn-secondary {
            min-height: var(--control-height);
        }

        .deck-category-filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.55rem;
            margin: 0 0 0.8rem;
            padding: 0.75rem;
            background: var(--dashboard-panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 12px;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
        }

        .deck-category-filter-btn {
            border: 1px solid #c8d1e1;
            border-radius: 10px;
            background: #fff;
            color: #233044;
            text-align: left;
            cursor: pointer;
            padding: 0.68rem 0.75rem;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .deck-category-filter-btn:hover {
            border-color: #4f83ff;
            transform: translateY(-1px);
        }

        .deck-category-filter-btn.active {
            border-color: #4f83ff;
            box-shadow: 0 0 0 3px rgba(79, 131, 255, 0.16);
            background: #f7faff;
        }

        .deck-category-filter-title {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: #233044;
            margin-bottom: 0.18rem;
            word-break: break-word;
        }

        .deck-category-filter-desc {
            display: block;
            font-size: 0.82rem;
            line-height: 1.35;
            color: #4b5a70;
        }

        .deck-category-manage-btn {
            border-style: dashed;
            border-color: #86a6ee;
            background: #f7faff;
        }

        .deck-category-manage-btn:hover {
            border-color: #4f83ff;
            box-shadow: 0 0 0 3px rgba(79, 131, 255, 0.12);
        }

        .deck-category-filter-plus {
            display: inline-block;
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1;
            margin-right: 0.42rem;
            color: #2f5fc6;
            vertical-align: -0.05em;
        }

        .deck-tree-toolbar {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 0.78rem;
            flex-wrap: nowrap;
        }

        .deck-tree-search-wrap {
            display: flex;
            align-items: center;
            flex: 1 1 0;
            min-width: 0;
        }

        .deck-tree-search-input {
            width: 100%;
            min-width: 0;
            min-height: 36px;
            height: 36px;
            padding: 0.35rem 0.76rem;
            border: 1px solid #ccd3e0;
            border-radius: 10px;
            font-size: 0.92rem;
            background: #f8f9fb;
            color: #334;
            outline: none;
        }

        .deck-tree-search-input:focus {
            border-color: #3d7ee6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(61, 126, 230, 0.12);
        }

        .deck-tree-toolbar-btn {
            flex: 0 0 auto;
            min-height: 36px;
            height: 36px;
            padding: 0.35rem 0.72rem;
            border: 1px solid #d7dbe3;
            border-radius: 10px;
            background: #fff;
            color: #333;
            font-size: 0.88rem;
            line-height: 1;
            white-space: nowrap;
            cursor: pointer;
            transition: background 0.12s ease, border-color 0.12s ease;
        }

        .deck-tree-toolbar-btn:hover {
            background: #f6f7f9;
            border-color: #c7ccd6;
        }

        .deck-tree-toolbar-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .deck-tree-toolbar-actions {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            flex: 0 0 auto;
        }

        .deck-tree-container {
            overflow: visible;
            padding: 0.18rem 0 0;
            border-top: 1px solid #e9ecef;
        }

        .deck-tree-node {
            user-select: none;
        }

        .deck-tree-node.search-hidden {
            display: none;
        }

        .deck-tree-row {
            display: flex;
            align-items: center;
            gap: 0;
            min-height: 42px;
        }

        .deck-tree-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 42px;
            flex: 0 0 36px;
            border: 0;
            background: none;
            color: #888;
            font-size: 0.78rem;
            cursor: pointer;
            transition: transform 0.16s ease, color 0.16s ease;
        }

        .deck-tree-toggle:hover {
            color: #444;
        }

        .deck-tree-toggle.expanded {
            transform: rotate(90deg);
        }

        .deck-tree-toggle.leaf-spacer {
            visibility: hidden;
            width: 20px;
            flex-basis: 20px;
        }

        .deck-tree-leaf-toggle {
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            color: #999;
            font-size: 0.7rem;
        }

        .deck-tree-leaf-cards.collapsed {
            display: none;
        }

        .deck-tree-row-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.45rem;
            flex: 1 1 auto;
            min-width: 0;
            min-height: 42px;
            padding: 0.25rem 0.6rem 0.25rem 0.35rem;
            border: 0;
            border-radius: 8px;
            background: transparent;
            text-align: left;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: background 0.12s ease, box-shadow 0.12s ease;
        }

        .deck-tree-row-body:hover {
            background: #f0f3ff;
        }

        .deck-tree-row-body:focus-visible {
            outline: none;
            background: #f0f3ff;
            box-shadow: 0 0 0 2px rgba(61, 126, 230, 0.12);
        }

        .deck-tree-branch-body {
            cursor: default;
        }

        .deck-tree-branch-body:hover {
            background: transparent;
        }

        .deck-tree-copy {
            min-width: 0;
            flex: 1 1 auto;
        }

        .deck-tree-label {
            font-size: 0.92rem;
            color: #334;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .deck-tree-label-tag {
            font-weight: 600;
        }

        .deck-tree-row-meta {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            flex: 0 0 auto;
            min-width: 0;
            font-size: 0.78rem;
            color: #888;
            white-space: nowrap;
        }

        .deck-tree-printable-emoji {
            font-size: 0.95rem;
            line-height: 1;
        }

        .deck-tree-children {
            margin-left: 1.05rem;
            padding-left: 0.7rem;
            border-left: 1px solid #e8ecf2;
        }

        .deck-tree-children.collapsed {
            display: none;
        }

        .deck-tree-leaf-actions {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            flex: 0 0 auto;
        }

        .deck-tree-leaf-btn {
            border: 1px solid #d0d7e3;
            border-radius: 6px;
            background: #f8f9fb;
            color: #4b5a70;
            font-size: 0.76rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            cursor: pointer;
            white-space: nowrap;
            line-height: 1.3;
        }

        .deck-tree-leaf-btn:hover {
            background: #eef3ff;
            border-color: #4f83ff;
            color: #2f5fc6;
        }

        .deck-tree-preview-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            padding: 0.35rem 0 0.35rem 56px;
        }

        .deck-tree-preview-pill {
            display: inline-block;
            background: #eef3ff;
            color: #2a345d;
            border: 1px solid #d0daf0;
            border-radius: 999px;
            padding: 0.18rem 0.55rem;
            font-size: 0.78rem;
            line-height: 1.3;
            white-space: nowrap;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .deck-tree-preview-loading {
            color: #888;
            font-size: 0.8rem;
            padding: 0.35rem 0 0.35rem 56px;
        }

        @media (max-width: 720px) {
            .deck-tree-toolbar {
                gap: 0.35rem;
            }

            .deck-tree-search-wrap {
                flex: 1 1 0;
            }

            .deck-tree-toolbar-actions {
                gap: 0.25rem;
            }

            .deck-tree-toolbar-btn {
                min-height: 34px;
                height: 34px;
                padding: 0.32rem 0.5rem;
                font-size: 0.8rem;
            }

            .deck-tree-row-body {
                padding: 0.32rem 0.62rem 0.32rem 0.38rem;
            }
        }

        @media (max-width: 520px) {
            .deck-tree-search-input {
                min-height: 34px;
                height: 34px;
                padding: 0.32rem 0.68rem;
                font-size: 0.9rem;
            }

            .deck-tree-row {
                min-height: 44px;
            }

            .deck-tree-toggle {
                width: 34px;
                height: 44px;
                flex-basis: 34px;
            }

            .deck-tree-row-body {
                min-height: 44px;
                border-radius: 10px;
            }

            .deck-tree-children {
                margin-left: 0.95rem;
                padding-left: 0.58rem;
            }
        }

    </style>
</head>
<body class="manage-page deck-manage-page">
    <div class="container deck-page">
        <header class="page-header-with-back">
            <div class="page-header-row">
                <h1>🗂️ Manage Decks</h1>
                <a href="/parent-settings.html" class="back-btn btn-secondary page-header-back-btn"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back</a>
            </div>
        </header>

        <main>
            <div class="actions">
                <button id="createDeckNavBtn" type="button" class="btn-secondary">Create New Deck</button>
                <button id="createDeckBulkNavBtn" type="button" class="btn-secondary">Bulk Create New Decks</button>
            </div>

            <div id="deckCategoryFilterWrap" class="deck-category-filter-row"></div>

            <section class="deck-panel settings-section deck-list-section">
                <div id="deckTreeToolbar" class="deck-tree-toolbar hidden">
                    <label class="deck-tree-search-wrap">
                        <input
                            id="deckTreeSearchInput"
                            type="text"
                            class="deck-tree-search-input"
                            placeholder="Search decks or tags..."
                            aria-label="Search decks or tags"
                        >
                    </label>
                    <div id="deckTreeToolbarActions" class="deck-tree-toolbar-actions hidden">
                        <button id="deckTreeExpandAllBtn" type="button" class="deck-tree-toolbar-btn">Expand All</button>
                        <button id="deckTreeCollapseAllBtn" type="button" class="deck-tree-toolbar-btn">Collapse All</button>
                    </div>
                </div>

                <div id="emptyState" class="deck-empty hidden">No decks yet. Create your first one.</div>
                <div id="deckTreeContainer" class="deck-tree-container hidden"></div>
            </section>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <script src="icons.js"></script>
    <script src="subject-icons.js"></script>
    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="deck-manage.js"></script>
</body>
</html>
