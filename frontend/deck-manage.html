<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Decks - Kids Daily Chores</title>
    <link rel="stylesheet" href="fonts-local.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .deck-page {
            max-width: 1000px;
            margin: 0 auto;
        }

        .deck-manage-page .deck-panel {
            margin-bottom: 1rem;
        }


        @media (max-width: 520px) {
            .deck-manage-page .deck-panel {
                margin-bottom: 6px;
            }
        }

        .deck-tags {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }

        .deck-tag {
            background: #eef3ff;
            color: #2f3c7e;
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
            font-size: 0.82rem;
        }

        .deck-empty {
            color: #666;
            font-size: 0.95rem;
            padding: 0.4rem 0;
        }

        .deck-tags-col {
            width: 190px;
        }


        .deck-cards-col {
            width: 118px;
        }

        .deck-single-front {
            color: #2f3c7e;
            font-weight: 600;
            word-break: break-word;
        }

        .deck-print-marker {
            font-size: 0.9rem;
            line-height: 1;
            opacity: 0.9;
        }

        .filter-delete-row {
            display: flex;
            gap: 0.55rem;
            align-items: center;
            margin: 0.35rem 0 0.55rem;
            flex-wrap: wrap;
        }

        .filter-delete-row .form-group {
            flex: 1;
            margin-bottom: 0;
            min-width: 200px;
        }

        .deck-manage-page .actions {
            gap: 0.75rem;
        }

        @media (max-width: 520px) {
            .deck-manage-page .actions {
                gap: 0.4rem;
                margin-bottom: 6px;
            }

            .deck-manage-page .deck-category-filter-row {
                gap: 0.4rem;
                margin-bottom: 6px;
                padding: var(--mobile-panel-padding);
            }

            .deck-manage-page .deck-category-filter-row:empty {
                display: none;
            }

            .deck-manage-page .filter-delete-row {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                align-items: start;
                gap: 0.4rem;
                margin: 0 0 6px;
            }

            .deck-manage-page .filter-delete-row .form-group {
                min-width: 0;
            }

            .deck-manage-page .deck-tags-col {
                width: 150px;
            }

            .deck-manage-page .deck-cards-col {
                width: 96px;
            }
        }

        .deck-manage-page .actions .btn-secondary,
        .deck-manage-page .bulk-actions .btn-secondary {
            min-height: var(--control-height);
        }

        .deck-category-filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.55rem;
            margin: 0 0 0.8rem;
            padding: 0.75rem;
            background: var(--dashboard-panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 12px;
            box-shadow: 0 14px 34px rgba(31, 45, 98, 0.16);
        }

        .deck-category-filter-btn {
            border: 1px solid #c8d1e1;
            border-radius: 10px;
            background: #fff;
            color: #233044;
            text-align: left;
            cursor: pointer;
            padding: 0.68rem 0.75rem;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .deck-category-filter-btn:hover {
            border-color: #4f83ff;
            transform: translateY(-1px);
        }

        .deck-category-filter-btn.active {
            border-color: #4f83ff;
            box-shadow: 0 0 0 3px rgba(79, 131, 255, 0.16);
            background: #f7faff;
        }

        .deck-category-filter-title {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: #233044;
            margin-bottom: 0.18rem;
            word-break: break-word;
        }

        .deck-category-filter-desc {
            display: block;
            font-size: 0.82rem;
            line-height: 1.35;
            color: #4b5a70;
        }

        .deck-category-manage-btn {
            border-style: dashed;
            border-color: #86a6ee;
            background: #f7faff;
        }

        .deck-category-manage-btn:hover {
            border-color: #4f83ff;
            box-shadow: 0 0 0 3px rgba(79, 131, 255, 0.12);
        }

        .deck-category-filter-plus {
            display: inline-block;
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1;
            margin-right: 0.42rem;
            color: #2f5fc6;
            vertical-align: -0.05em;
        }

        .deck-delete-btn {
            background: #fff;
            color: #cc3528;
            border: 1px solid #efb0a8;
        }

        .deck-delete-btn:hover {
            background: #fff6f5;
            border-color: #e78b82;
            transform: translateY(-1px);
        }

    </style>
</head>
<body class="manage-page deck-manage-page">
    <div class="container deck-page">
        <header class="page-header-with-back">
            <div class="page-header-row">
                <h1>🗂️ Manage Decks</h1>
                <a href="/parent-settings.html" class="back-btn btn-secondary page-header-back-btn">← Back</a>
            </div>
        </header>

        <main>
            <div class="actions">
                <button id="createDeckNavBtn" type="button" class="btn-secondary">Create New Deck</button>
                <button id="createDeckBulkNavBtn" type="button" class="btn-secondary">Bulk Create New Decks</button>
            </div>

            <div id="deckCategoryFilterWrap" class="deck-category-filter-row"></div>

            <section class="deck-panel settings-section deck-list-section">
                <div class="filter-delete-row">
                    <div class="form-group">
                        <select id="deckTagFilter" class="sort-select">
                            <option value="">Filter by secondary tag...</option>
                        </select>
                    </div>
                    <button id="deleteSelectedBtn" type="button" class="btn-secondary deck-delete-btn">Delete Shown (0)</button>
                </div>

                <div id="emptyState" class="deck-empty hidden">No decks yet. Create your first one.</div>

                <div id="tableWrap" class="shared-report-table-wrap hidden">
                    <table class="shared-report-table">
                        <thead>
                            <tr>
                                <th class="shared-report-table-action-cell">Actions</th>
                                <th class="deck-tags-col">Tags</th>
                                <th class="deck-cards-col">Cards</th>
                            </tr>
                        </thead>
                        <tbody id="deckTableBody"></tbody>
                    </table>
                </div>
            </section>

            <div id="errorMessage" class="error hidden"></div>
        </main>
    </div>

    <script src="practice-manage-common.js"></script>
    <script src="deck-category-common.js"></script>
    <script src="deck-manage.js"></script>
</body>
</html>
